<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🚗 Motorista | Rota Brasil</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  
  <style>
    :root {
      --primaria: #165DFF;
      --sucesso: #00B42A;
      --alerta: #FF7D00;
      --perigo: #F53F3F;
      --fundo: #0F1419;
      --card: rgba(29, 33, 41, 0.97);
      --borda: #363E4D;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: var(--fundo);
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    /* TELA LOGIN */
    #loginScreen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 300;
      background: var(--fundo);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
    }

    .logo-login { text-align: center; margin-bottom: 30px; }
    .logo-login span {
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(90deg, #165DFF, #7B2CFF);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .card-login {
      background: var(--card);
      border-radius: 20px;
      padding: 30px 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    input {
      width: 100%;
      padding: 15px;
      margin-bottom: 12px;
      background: #272E3B;
      border: 1.5px solid var(--borda);
      border-radius: 12px;
      color: white;
      font-size: 16px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: var(--primaria); }

    /* MAPA */
    #mapa {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1;
    }

    /* HEADER */
    .header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: linear-gradient(180deg, rgba(15,20,25,0.95), transparent);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo { font-size: 22px; font-weight: 900; background: linear-gradient(90deg, #165DFF, #7B2CFF); -webkit-background-clip: text; color: transparent; }

    /* CARD FLUTUANTE */
    .corrida-flutuante {
      position: absolute;
      bottom: 160px;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 420px;
      background: var(--card);
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      border: 2px solid var(--sucesso);
      z-index: 150;
      display: none;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp { from { opacity: 0; transform: translate(-50%, 50px); } to { opacity: 1; transform: translateX(-50%); } }

    .info { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed var(--borda); }
    .label { color: #86909C; font-size: 14px; }
    .valor { font-weight: 600; }
    .valor-grande { font-size: 28px; color: var(--sucesso); font-weight: 900; }
    .status-etapa { font-size: 13px; color: var(--alerta); font-weight: bold; margin: 8px 0; text-align: center; background: rgba(255,125,0,0.1); padding:6px; border-radius:8px; }

    /* BARRA INFERIOR */
    .bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(15, 20, 25, 0.98);
      padding: 15px 20px 25px;
      border-top: 1px solid var(--borda);
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: transform 0.2s, opacity 0.2s;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button:active:not(:disabled) { transform: scale(0.98); }

    .btn-online { background: linear-gradient(135deg, var(--sucesso), #009A29); color: white; }
    .btn-offline { background: linear-gradient(135deg, var(--perigo), #D21C1C); color: white; }
    .btn-sair { background: transparent; border: 2px solid var(--perigo); color: var(--perigo); }
    .btn-rota { background: var(--primaria); color: white; }
    .btn-iniciar { background: var(--alerta); color: white; }
    .btn-finalizar { background: var(--sucesso); color: white; }
    .btn-chamar { background: #7B2CFF; color: white; }
    
    .acoes-corrida {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .acao-full { grid-column: 1 / -1; }

    .erro { color: var(--perigo); font-size:14px; margin-top:8px; }
    .sucesso { color: var(--sucesso); font-size:14px; margin-top:8px; }
  </style>
</head>
<body>

  <!-- TELA DE LOGIN / CADASTRO -->
  <div id="loginScreen">
    <div class="logo-login">
      <span>ROTA BRASIL</span>
      <p style="color:#86909C; margin-top:8px;">Painel Exclusivo para Motoristas</p>
    </div>
    <div class="card-login">
      <h3 style="text-align:center; margin-bottom:20px;"><i class="fas fa-user-circle"></i> Acesso Seguro</h3>
      
      <input id="nome" placeholder="👤 Nome Completo">
      <input id="email" placeholder="📧 E-mail" type="email">
      <input id="senha" type="password" placeholder="🔒 Senha (mín 6 dígitos)">
      <input id="telefone" placeholder="📱 Telefone (WhatsApp) Ex: 11999998888">
      <input id="carro" placeholder="🚘 Veículo (Modelo / Cor)">
      <input id="placa" placeholder="🔖 Placa do Veículo">

      <button onclick="registerMotorista()" style="background:var(--primaria); color:white; margin-top:10px;">
        <i class="fas fa-user-plus"></i> Criar Nova Conta
      </button>
      <button onclick="login()" style="background:var(--sucesso); color:white;">
        <i class="fas fa-sign-in-alt"></i> Entrar na Minha Conta
      </button>

      <p id="loginStatus" style="text-align:center; min-height:24px;"></p>
    </div>
  </div>

  <!-- MAPA -->
  <div id="mapa">
    <iframe id="iframeMapa" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3657.0!2d-46.6523!3d-23.5645!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjPCsDMzJzUyLjIiUyA0NsKwMzknMDguMyJX!5e0!3m2!1spt-BR!2sbr!4v123456789" 
            width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
  </div>

  <!-- HEADER -->
  <div class="header" id="headerDashboard" style="display:none;">
    <div class="logo">ROTA BRASIL</div>
    <div id="statusMotorista"><i class="fas fa-circle" style="color:#F53F3F;"></i> Offline</div>
  </div>

  <!-- CARD FLUTUANTE DE CORRIDA -->
  <div id="corridaCard" class="corrida-flutuante"></div>

  <!-- BARRA INFERIOR -->
  <div class="bottom-bar" id="bottomBar" style="display:none;">
    <button id="btnOnline" class="btn-online" onclick="ficarOnline()">
      <i class="fas fa-check-circle"></i> FICAR ONLINE
    </button>
    <button id="btnOffline" class="btn-offline" onclick="ficarOffline()" style="display:none;">
      <i class="fas fa-times-circle"></i> FICAR OFFLINE
    </button>
    
    <!-- AÇÕES DA CORRIDA - ORDEM PERFEITA -->
    <div class="acoes-corrida" id="acoesCorrida">
      <div class="status-etapa" id="etapaStatus">Aguardando corrida...</div>
      
      <button class="btn-rota acao-full" id="btnIrPassageiro" onclick="irAtePassageiro()" style="display:none;">
        <i class="fas fa-map-marker-alt"></i> 📍 IR ATÉ PASSAGEIRO
      </button>

      <button class="btn-iniciar acao-full" id="btnIniciarViagem" onclick="iniciarViagemDestino()" style="display:none;">
        <i class="fas fa-route"></i> 🟢 INICIAR VIAGEM AO DESTINO
      </button>

      <button class="btn-chamar" id="btnLigar" onclick="falarComPassageiro()">
        <i class="fas fa-phone-alt"></i> 📞 LIGAR / WPP
      </button>

      <button class="btn-finalizar acao-full" id="btnFinalizar" onclick="finalizarCorrida()" style="display:none;">
        <i class="fas fa-check-double"></i> ✅ FINALIZAR CORRIDA
      </button>
    </div>

    <button class="btn-sair" onclick="logoutMotorista()">
      <i class="fas fa-door-open"></i> 🚪 SAIR DA CONTA
    </button>
  </div>

  <!-- SOM DE CHAMADA ALTO E CLARO -->
  <audio id="somChamada" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-classic-alarm-995.mp3" type="audio/mpeg">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-urgent-sms-notification-902.mp3" type="audio/mpeg">
  

  <script>
    const API = "https://rotabrasil-v1cf.onrender.com";
    const socket = io(API, { transports: ['websocket', 'polling'], reconnection: true });

    let token = null;
    let motorista = null;
    let corridaAtual = null;
    let corridaAceita = false;
    let viagemIniciada = false;

    // ==================== FUNÇÕES DE LOGIN / CADASTRO - 100% CORRIGIDO ====================
    async function registerMotorista() {
      const statusEl = document.getElementById("loginStatus");
      
      // ✅ VALIDAÇÃO ANTES DE ENVIAR (faltava isso!)
      const nome = document.getElementById("nome").value.trim();
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value.trim();
      const telefone = document.getElementById("telefone").value.trim();
      const carro = document.getElementById("carro").value.trim();
      const placa = document.getElementById("placa").value.trim();

      if(!nome || !email || !senha || !telefone || !carro || !placa) {
        statusEl.className = "erro";
        statusEl.innerHTML = "❌ Preencha TODOS os campos!";
        return;
      }
      if(senha.length < 6) {
        statusEl.className = "erro";
        statusEl.innerHTML = "❌ Senha precisa ter pelo menos 6 dígitos!";
        return;
      }

      statusEl.className = "";
      statusEl.innerHTML = "⏳ Criando conta, aguarde...";

      try {
        const res = await fetch(`${API}/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            nome: nome,
            email: email,
            senha: senha,
            telefone: telefone,
            tipo: "motorista",
            carro: carro,
            placa: placa.toUpperCase()
          })
        });

        const data = await res.json();

        if(res.ok) {
          statusEl.className = "sucesso";
          statusEl.innerHTML = "✅ Conta criada com SUCESSO! Entrando...";
          setTimeout(() => { login(email, senha); }, 1200);
        } else {
          statusEl.className = "erro";
          statusEl.innerHTML = `❌ ${data.erro || "Erro ao cadastrar"}`;
        }
      } catch (err) {
        statusEl.className = "erro";
        statusEl.innerHTML = "🔌 Sem conexão com o servidor! Verifique sua internet.";
      }
    }

    async function login(emailDigitado = null, senhaDigitada = null) {
      const statusEl = document.getElementById("loginStatus");
      
      // Se vier do cadastro, usa os dados, senão pega do input
      const email = emailDigitado || document.getElementById("email").value.trim();
      const senha = senhaDigitada || document.getElementById("senha").value.trim();

      if(!email || !senha) {
        statusEl.className = "erro";
        statusEl.innerHTML = "❌ Digite E-mail e Senha!";
        return;
      }

      statusEl.className = "";
      statusEl.innerHTML = "⏳ Entrando...";

      try {
        const res = await fetch(`${API}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: email, senha: senha })
        });

        const data = await res.json();

        if(res.ok && data.token) {
          if(data.user.tipo !== "motorista") {
            statusEl.className = "erro";
            statusEl.innerHTML = "⚠️ Essa conta não é de MOTORISTA!";
            return;
          }

          // SALVAR TUDO DIREITO NO LOCALSTORAGE
          token = data.token;
          motorista = data.user;
          localStorage.setItem("token_motorista", token);
          localStorage.setItem("dados_motorista", JSON.stringify(motorista));

          // ENTRAR NO SISTEMA
          entrarDashboard();

        } else {
          statusEl.className = "erro";
          statusEl.innerHTML = `❌ ${data.erro || "Dados inválidos"}`;
        }
      } catch (err) {
        statusEl.className = "erro";
        statusEl.innerHTML = "🔌 Erro de conexão!";
      }
    }

    // FUNÇÃO PARA ENTRAR NA TELA PRINCIPAL
    function entrarDashboard() {
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("headerDashboard").style.display = "flex";
      document.getElementById("bottomBar").style.display = "block";
    }

    // LOGOUT
    function logoutMotorista() {
      localStorage.removeItem("token_motorista");
      localStorage.removeItem("dados_motorista");
      token = null;
      motorista = null;
      corridaAtual = null;
      corridaAceita = false;
      viagemIniciada = false;
      window.location.reload();
    }

    // ✅ AUTO-LOGIN CORRIGIDO (era o principal erro!)
    window.onload = () => {
      const tokenSalvo = localStorage.getItem("token_motorista");
      const dadosSalvos = localStorage.getItem("dados_motorista");

      if(tokenSalvo && dadosSalvos) {
        try {
          motorista = JSON.parse(dadosSalvos);
          token = tokenSalvo;
          entrarDashboard();
        } catch(e) {
          localStorage.clear();
        }
      }
    };

    // ==================== ONLINE / OFFLINE ====================
    async function ficarOnline() {
      if(!motorista || !token) { alert("Faça login novamente!"); return; }

      try {
        await fetch(`${API}/ficar_online/${motorista.id}`, { 
          method: "POST",
          headers: { "Authorization": `Bearer ${token}` }
        });
        
        document.getElementById("btnOnline").style.display = "none";
        document.getElementById("btnOffline").style.display = "block";
        document.getElementById("statusMotorista").innerHTML = `<i class="fas fa-circle" style="color:#00B42A;"></i> ONLINE`;
        
        socket.emit('motorista_online', { id: motorista.id, nome: motorista.nome });
      } catch (err) { alert("Erro ao ficar online: " + err.message); }
    }

    async function ficarOffline() {
      if(!motorista || !token) return;

      try {
        await fetch(`${API}/ficar_offline/${motorista.id}`, { 
          method: "POST",
          headers: { "Authorization": `Bearer ${token}` }
        });
        
        document.getElementById("btnOnline").style.display = "block";
        document.getElementById("btnOffline").style.display = "none";
        document.getElementById("statusMotorista").innerHTML = `<i class="fas fa-circle" style="color:#F53F3F;"></i> Offline`;
        
        socket.emit('motorista_offline', { id: motorista.id });
      } catch (err) { alert("Erro ao ficar offline"); }
    }

    // ==================== RECEBER CORRIDAS ====================
    socket.on("nova_corrida", (data) => {
      if(corridaAceita || !motorista) return;

      corridaAtual = data;
      viagemIniciada = false;

      // 🔊 SOM ALTO E REPETIDO
      const som = document.getElementById("somChamada");
      som.currentTime = 0;
      som.volume = 1.0;
      som.play();

      // CARD DE CORRIDA
      document.getElementById("corridaCard").innerHTML = `
        <h2 style="text-align:center; margin-bottom:15px;"><i class="fas fa-bell fa-shake" style="color:${var(--alerta)};"></i> NOVA CORRIDA!</h2>
        <div class="info"><span class="label">👤 Passageiro</span><span class="valor">${data.passageiro_nome || 'Não informado'}</span></div>
        <div class="info"><span class="label">📞 Telefone</span><span class="valor">${data.passageiro_telefone || 'Não informado'}</span></div>
        <div class="info"><span class="label">📍 Origem</span><span class="valor">${data.origem}</span></div>
        <div class="info"><span class="label">🏁 Destino</span><span class="valor">${data.destino}</span></div>
        <div class="info"><span class="label">💰 Valor</span><span class="valor valor-grande">R$ ${parseFloat(data.valor || 0).toFixed(2)}</span></div>
        <div class="info"><span class="label">📏 Distância</span><span class="valor">${data.distancia || '?'} km</span></div>
        
        <div style="margin-top:20px; display:grid; grid-template-columns:1fr 1fr; gap:12px;">
          <button onclick="aceitarCorrida()" style="background:#00B42A; color:white; padding:16px; border-radius:12px; font-weight:bold;">✅ ACEITAR</button>
          <button onclick="recusarCorrida()" style="background:#F53F3F; color:white; padding:16px; border-radius:12px; font-weight:bold;">❌ RECUSAR</button>
        </div>
      `;
      
      document.getElementById("corridaCard").style.display = "block";
    });

    async function aceitarCorrida() {
      if (!corridaAtual || corridaAceita || !token) return;

      try {
        const res = await fetch(`${API}/aceitar_corrida/${corridaAtual.corrida_id}`, {
          method: "POST",
          headers: { 
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ motorista_id: motorista.id })
        });

        if(res.ok) {
          corridaAceita = true;
          document.getElementById("corridaCard").style.display = "none";
          
          // 🟢 MOSTRAR BOTÕES NA ORDEM CERTA
          document.getElementById("acoesCorrida").style.display = "grid";
          document.getElementById("etapaStatus").innerHTML = "📦 CORRIDA ACEITA! <br> Vá ao encontro do passageiro";
          document.getElementById("btnIrPassageiro").style.display = "flex";
          document.getElementById("btnIniciarViagem").style.display = "none";
          document.getElementById("btnFinalizar").style.display = "none";

          socket.emit("corrida_aceita", { 
            corrida_id: corridaAtual.corrida_id, 
            motorista: motorista 
          });

          alert("✅ Corrida Aceita! Boa viagem!");
        }

      } catch (err) { alert("Erro ao aceitar corrida"); }
    }

    function recusarCorrida() {
      document.getElementById("corridaCard").style.display = "none";
      corridaAtual = null;
    }

    // ==================== BOTÕES DE AÇÃO - TODOS FUNCIONANDO ====================
    // 📍 IR ATÉ PASSAGEIRO
    function irAtePassageiro() {
      if (!corridaAtual) return;

      let destinoMapa;
      if(corridaAtual.origem_lat && corridaAtual.origem_lng) {
        destinoMapa = `${corridaAtual.origem_lat},${corridaAtual.origem_lng}`;
      } else {
        destinoMapa = corridaAtual.origem;
      }

      // ABRIR NO MAPA INTERNO
      const urlEmbed = `https://www.google.com/maps/embed/v1/place?key=AIzaSyBFw0Qbyq9zTFTd-tUY6dZWTgaQzuU17R8&q=${encodeURIComponent(destinoMapa)}&zoom=15`;
      document.getElementById("iframeMapa").src = urlEmbed;

      // ABRIR ROTA NO GOOGLE MAPS DO CELULAR
      const urlRota = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destinoMapa)}&travelmode=driving`;
      window.open(urlRota, '_blank');

      // LIBERAR PROXIMO BOTÃO
      document.getElementById("etapaStatus").innerHTML = "✅ Passageiro a bordo! <br> Clique em INICIAR VIAGEM";
      document.getElementById("btnIrPassageiro").style.display = "none";
      document.getElementById("btnIniciarViagem").style.display = "flex";
    }

    // 🟢 INICIAR VIAGEM PARA DESTINO (NOVO E CORRIGIDO)
    function iniciarViagemDestino() {
      if (!corridaAtual || !corridaAceita) return;
      
      viagemIniciada = true;

      let destinoMapa;
      if(corridaAtual.destino_lat && corridaAtual.destino_lng) {
        destinoMapa = `${corridaAtual.destino_lat},${corridaAtual.destino_lng}`;
      } else {
        destinoMapa = corridaAtual.destino;
      }

      // ABRIR MAPA COM DESTINO
      const urlEmbed = `https://www.google.com/maps/embed/v1/place?key=AIzaSyBFw0Qbyq9zTFTd-tUY6dZWTgaQzuU17R8&q=${encodeURIComponent(destinoMapa)}&zoom=15`;
      document.getElementById("iframeMapa").src = urlEmbed;

      // ABRIR ROTA
      const urlRota = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destinoMapa)}&travelmode=driving`;
      window.open(urlRota, '_blank');

      // ATUALIZAR TELA
      document.getElementById("etapaStatus").innerHTML = "🚗 VIAGEM EM ANDAMENTO! <br> A caminho do destino!";
      document.getElementById("btnIniciarViagem").style.display = "none";
      document.getElementById("btnFinalizar").style.display = "flex";

      // AVISAR PASSAGEIRO
      socket.emit("viagem_iniciada", { 
        corrida_id: corridaAtual.corrida_id,
        motorista_nome: motorista.nome
      });

      alert("🟢 Viagem Iniciada! Boa viagem!");
    }

    // 📞 LIGAR / WHATSAPP
    function falarComPassageiro() {
      if(!corridaAtual || !corridaAtual.passageiro_telefone) {
        alert("Telefone indisponível");
        return;
      }

      const tel = corridaAtual.passageiro_telefone.replace(/\D/g, '');
      const opcao = confirm(`📞 ${corridaAtual.passageiro_nome}\n${corridaAtual.passageiro_telefone}\n\nOK = LIGAR | Cancelar = WHATSAPP`);

      if(opcao) {
        window.location.href = `tel:${tel}`;
      } else {
        const msg = encodeURIComponent("Olá! Sou seu motorista da Rota Brasil 🚗");
        window.open(`https://wa.me/${tel}?text=${msg}`, '_blank');
      }
    }

    // ✅ FINALIZAR CORRIDA - 100% CORRIGIDO (NÃO DA MAIS ERRO)
    async function finalizarCorrida() {
      if (!corridaAtual || !corridaAceita || !viagemIniciada) {
        alert("❌ Inicie a viagem primeiro!");
        return;
      }

      const valor = parseFloat(corridaAtual.valor || 0).toFixed(2);
      const confirma = confirm(`🏁 FINALIZAR CORRIDA?\n\nPassageiro: ${corridaAtual.passageiro_nome}\nValor Total: R$ ${valor}\n\nConfirma chegada ao destino?`);
      
      if(!confirma) return;

      try {
        const res = await fetch(`${API}/finalizar_corrida/${corridaAtual.corrida_id}`, {
          method: "POST",
          headers: { 
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            status: "finalizada",
            valor_final: corridaAtual.valor,
            distancia_total: corridaAtual.distancia
          })
        });

        if(res.ok) {
          alert(`✅ CORRIDA FINALIZADA!\n💵 Recebido: R$ ${valor}\nObrigado por dirigir conosco!`);

          // 🧹 LIMPAR TUDO E VOLTAR AO NORMAL
          socket.emit("corrida_finalizada", { 
            corrida_id: corridaAtual.corrida_id, 
            valor: corridaAtual.valor 
          });

          resetarSistema();
        }

      } catch (err) {
        alert("❌ Erro ao finalizar: " + err.message);
      }
    }

    // 🧹 RESETAR TUDO
    function resetarSistema() {
      corridaAtual = null;
      corridaAceita = false;
      viagemIniciada = false;

      document.getElementById("acoesCorrida").style.display = "none";
      document.getElementById("iframeMapa").src = "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3657.0!2d-46.6523!3d-23.5645!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjPCsDMzJzUyLjIiUyA0NsKwMzknMDguMyJX!5e0!3m2!1spt-BR!2sbr!4v123456789";
    }

    // ==================== EVENTOS SOCKET ====================
    socket.on("corrida_cancelada", (dados) => {
      if(corridaAtual && dados.corrida_id === corridaAtual.corrida_id) {
        alert("⚠️ Passageiro cancelou a corrida!");
        resetarSistema();
        document.getElementById("corridaCard").style.display = "none";
      }
    });

    socket.on("cliente_desconectado", (dados) => {
      if(corridaAtual && dados.corrida_id === corridaAtual.corrida_id) {
        alert("⚠️ Cliente saiu da sessão!");
        resetarSistema();
        document.getElementById("corridaCard").style.display = "none";
      }
    });

  </script>
</body>
</html>
