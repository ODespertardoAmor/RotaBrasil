<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚗 Motorista | Rota Brasil - TESTE 🧪</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primaria: #165DFF;
            --sucesso: #00B42A;
            --alerta: #FF7D00;
            --perigo: #F53F3F;
            --fundo: #0F1419;
            --card: #1D2129;
            --borda: #363E4D;
            --texto: #F5F7FA;
            --voz-cor: #7B2CFF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--fundo); color: var(--texto); height: 100vh; overflow: hidden; }

        #loginScreen {
            position: absolute; inset: 0; background: var(--fundo);
            display: flex; flex-direction: column; justify-content: center; padding: 20px;
            z-index: 9999;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 38px; font-weight: 900; background: linear-gradient(90deg, #165DFF, #7B2CFF); -webkit-background-clip: text; color: transparent; }
        .card { background: var(--card); border-radius: 16px; padding: 25px; border: 1px solid var(--borda); box-shadow: 0 8px 32px #00000040; }
        input {
            width: 100%; padding: 14px 16px; margin-bottom: 12px;
            background: #272E3B; border: 1.5px solid var(--borda);
            border-radius: 10px; color: white; font-size: 15px; outline: none;
        }
        input:focus { border-color: var(--primaria); }
        button {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.2s ease;
        }
        button:active { transform: scale(0.97); }
        .btn-primary { background: var(--primaria); color: white; margin: 8px 0; }
        .btn-success { background: var(--sucesso); color: white; margin: 8px 0; }
        .btn-danger { background: var(--perigo); color: white; }
        .btn-warning { background: var(--alerta); color: white; }
        .btn-purple { background: #7B2CFF; color: white; }
        .status-text { font-size: 14px; text-align: center; margin-top: 8px; min-height: 20px; }
        .erro { color: var(--perigo); font-weight: 600; }
        .ok { color: var(--sucesso); font-weight: 600; }

        #mapa { position: absolute; inset: 0; z-index: 1; }
        iframe { width: 100%; height: 100%; border: none; }

        .header {
            position: absolute; top: 0; left: 0; right: 0; padding: 15px 20px;
            background: linear-gradient(180deg, var(--fundo), transparent);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }
        .status-bolinha { display: flex; align-items: center; gap: 6px; font-weight: 600; font-size: 15px; }
        .online { color: var(--sucesso); }
        .offline { color: var(--perigo); }
        .ouvindo { color: var(--voz-cor); animation: pulsaVoz 1s infinite alternate; }
        @keyframes pulsaVoz { from { text-shadow: 0 0 5px var(--voz-cor); } to { text-shadow: 0 0 15px var(--voz-cor); } }

        .card-corrida {
            position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 400px; background: var(--card);
            border-radius: 16px; padding: 20px; border: 2px solid var(--sucesso);
            z-index: 200; display: none;
            animation: sobe 0.3s ease;
            box-shadow: 0 0 25px #00b42a40;
        }
        @keyframes sobe { from { opacity:0; transform: translateX(-50%) translateY(30px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
        .linha { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--borda); font-size: 15px; }
        .valor-grande { font-size: 26px; font-weight: 800; color: var(--sucesso); }
        .selo-status { padding:4px 12px; border-radius:20px; font-size:11px; font-weight:bold; margin-left:8px; text-transform:uppercase; }
        .selo-pago { background: var(--sucesso); color:white; box-shadow: 0 0 8px var(--sucesso); }
        .selo-pendente { background: var(--alerta); color:white; }
        
        .indicador-voz {
            background: linear-gradient(45deg, #7B2CFF, #B14AED);
            color: white; padding: 8px 12px; border-radius: 8px; text-align: center;
            font-weight: bold; font-size: 14px; margin: 10px 0; display: none;
            animation: pulsaVoz 0.8s infinite alternate; border: 1px solid #D6B8FF;
        }
        .contador-segundos { font-size: 18px; font-weight:900; }

        .grupo-botoes { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }

        .barra-inferior {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 15px 20px 25px;
            background: var(--card); border-top: 1px solid var(--borda);
            z-index: 300;
        }
        .acoes { display: none; margin-top: 10px; gap: 10px; grid-template-columns: 1fr 1fr; }
        .acao-full { grid-column: 1 / -1; }
        .etapa {
            text-align: center; padding: 10px; border-radius: 8px; font-weight: 700; font-size: 15px; margin-bottom: 12px;
            border: 2px solid transparent;
        }
        .etapa1 { background: #FFF7E8; color: #BC6C00; border-color: #FFD591; }
        .etapa2 { background: #E8F3FF; color: #0050B3; border-color: #91D2FF; }
        .etapa3 { background: #E8FFEA; color: #007828; border-color: #97F0AE; }

        .alerta-cancelamento {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--perigo); color: white; padding: 25px; border-radius: 16px;
            z-index: 99999; text-align: center; width: 85%; max-width: 320px;
            box-shadow: 0 0 30px rgba(245, 63, 63, 0.5); display: none;
            animation: tremer 0.5s ease infinite alternate;
        }
        @keyframes tremer { from { transform: translate(-50%, -50%) scale(1); } to { transform: translate(-50%, -50%) scale(1.03); } }
        .alerta-cancelamento h2 { margin-bottom: 10px; font-size: 22px; }
    </style>
</head>
<body>

    <div id="alertaCancel" class="alerta-cancelamento">
        <h2><i class="fas fa-times-circle"></i> CORRIDA CANCELADA!</h2>
        <p>O passageiro cancelou ou desconectou.</p>
        <button onclick="fecharAlertaCancel()" style="background:white; color:var(--perigo); margin-top:15px; padding:10px 20px; border:none; font-weight:bold;">OK, ENTENDI</button>
    </div>

    <div id="loginScreen">
        <div class="logo">
            <h1>ROTA BRASIL</h1>
            <p style="color:#86909C; margin-top:5px;">Painel do Motorista 🧪 MODO TESTE</p>
        </div>
        <div class="card">
            <input type="text" id="nome" placeholder="👤 Nome Completo">
            <input type="email" id="email" placeholder="📧 E-mail">
            <input type="password" id="senha" placeholder="🔒 Senha">
            <input type="tel" id="telefone" placeholder="📱 WhatsApp">
            <input type="text" id="carro" placeholder="🚘 Modelo / Cor">
            <input type="text" id="placa" placeholder="🔖 Placa">

            <button class="btn-primary" onclick="cadastrar()"><i class="fas fa-user-plus"></i> Criar Conta</button>
            <button class="btn-success" onclick="entrar()"><i class="fas fa-sign-in-alt"></i> Entrar</button>
            <div id="statusLogin" class="status-text"></div>

            <div style="margin-top:15px; padding-top:15px; border-top:1px solid var(--borda);">
                <label style="color:#86909C; font-size:14px; display:flex; align-items:center; gap:8px;">
                    <input type="checkbox" id="ativarVoz" checked style="width:auto; margin:0;"> 
                    🎤 Ativar Comando de Voz (Aceitar/Recusar por voz)
                </label>
            </div>
        </div>
    </div>

    <div id="mapa">
        <iframe id="mapaFrame" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3657.0!2d-46.6523!3d-23.5645!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjPCsDMzJzUyLjIiUyA0NsKwMzknMDguMyJX!5e0!3m2!1spt-BR!2sbr!4v123456789"></iframe>
    </div>

    <div class="header" id="header" style="display:none;">
        <div style="font-weight:800; font-size:18px;">ROTA BRASIL</div>
        <div id="statusMotorista" class="status-bolinha offline">
            <i class="fas fa-circle"></i> <span>Offline</span>
        </div>
        <div id="statusMicrofone" style="font-size:20px; display:none; color:var(--voz-cor);"><i class="fas fa-microphone-alt"></i></div>
    </div>

    <div id="cardCorrida" class="card-corrida">
        <h3 style="text-align:center; margin-bottom:10px;">
            <i class="fas fa-bell fa-shake" style="color:var(--alerta);"></i> NOVA CORRIDA 
            <span id="seloPagamento" class="selo-status selo-pago">✅ TESTE</span>
        </h3>
        
        <div class="linha"><span>Passageiro</span> <span id="cPassageiro">-</span></div>
        <div class="linha"><span>Telefone</span> <span id="cTelefone">-</span></div>
        <div class="linha"><span>Origem</span> <span id="cOrigem">-</span></div>
        <div class="linha"><span>Destino</span> <span id="cDestino">-</span></div>
        <div class="linha"><span>Valor</span> <span id="cValor" class="valor-grande">-</span></div>

        <div id="indicadorVoz" class="indicador-voz">
            <i class="fas fa-microphone-alt"></i> OUVINDO... <br>
            <span id="contadorTempo" class="contador-segundos">10</span>s
        </div>

        <div class="grupo-botoes">
            <button class="btn-success" onclick="aceitarCorrida()">✅ ACEITAR</button>
            <button class="btn-danger" onclick="recusarCorrida()">❌ RECUSAR</button>
        </div>
    </div>

    <div class="barra-inferior" id="barra" style="display:none;">
        <button id="btnOnline" class="btn-success" onclick="ficarOnline()"><i class="fas fa-power-off"></i> FICAR ONLINE</button>
        <button id="btnOffline" class="btn-danger" onclick="ficarOffline()" style="display:none;"><i class="fas fa-power-off"></i> FICAR OFFLINE</button>

        <div id="areaAcoes" class="acoes">
            <div id="etapaTexto" class="etapa etapa1">📦 PASSO 1: Corrida Aceita! Vá até o passageiro</div>

            <button id="btnIrPassageiro" class="btn-primary acao-full" onclick="irAoPassageiro()" style="display:none;">
                <i class="fas fa-location-arrow"></i> 📍 CHEGUEI NO PASSAGEIRO
            </button>

            <button id="btnIniciarViagem" class="btn-warning acao-full" onclick="iniciarViagem()" style="display:none;">
                <i class="fas fa-route"></i> 🟢 INICIAR VIAGEM (LIBERA FINALIZAR)
            </button>

            <button id="btnFinalizar" class="btn-success acao-full" onclick="finalizarAgora()" style="display:none;">
                <i class="fas fa-check-double"></i> ✅ FINALIZAR & RECEBER
            </button>

            <button id="btnLigar" class="btn-purple" onclick="ligarCliente()" style="display:none;">
                <i class="fas fa-phone-alt"></i> LIGAR / WPP
            </button>
        </div>

        <button class="btn-danger" style="margin-top:12px; background:transparent; border:1px solid var(--perigo); color:var(--perigo);" onclick="sair()">
            <i class="fas fa-door-open"></i> SAIR
        </button>
    </div>

    <audio id="somAlerta" preload="auto"><source src="https://assets.mixkit.co/sfx/preview/mixkit-classic-alarm-995.mp3">
    <audio id="somSucesso" preload="auto"><source src="https://assets.mixkit.co/sfx/preview/mixkit-positive-notification-951.mp3">
    <audio id="somErro" preload="auto"><source src="https://assets.mixkit.co/sfx/preview/mixkit-hard-error-tone-2873.mp3">

    <script>
        const API_URL = "https://rotabrasil-v1cf.onrender.com";
        const socket = io(API_URL, { transports: ['websocket', 'polling'], reconnection: true, timeout: 10000 });

        let usuario = null;
        let token = null;
        let corrida = null;
        let estado = { aceito: false, pegouPassageiro: false, viagemIniciada: false };
        
        let reconhecimentoVoz;
        let tempoContador;
        let tempoRestante = 10;
        let corridaAtualVoz = null;

        const sintetizador = window.speechSynthesis;
        function falar(texto) {
            if(!sintetizador) return;
            sintetizador.cancel();
            const mensagem = new SpeechSynthesisUtterance(texto);
            mensagem.lang = 'pt-BR'; mensagem.volume = 1.0; mensagem.rate = 1.0; mensagem.pitch = 1.2;
            sintetizador.speak(mensagem);
        }

        function iniciarReconhecimento() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) return;
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            reconhecimentoVoz = new SpeechRecognition();
            reconhecimentoVoz.lang = 'pt-BR';
            reconhecimentoVoz.continuous = false;
            reconhecimentoVoz.interimResults = false;

            reconhecimentoVoz.onresult = (evento) => {
                const frase = evento.results[0][0].transcript.toLowerCase().trim();
                const palavrasSim = ['sim', 'aceito', 'quero', 'pode', 'claro', 'vou', 'aceitar', 'ok', 'tá', 'blz', 'aceita', 'isso'];
                const palavrasNao = ['não', 'nao', 'nao quero', 'recusar', 'rejeito', 'nao aceito', 'nem', 'recusa', 'nao aceita'];
                let aceitou = false, recusou = false;

                for(let palavra of palavrasSim) if(frase.includes(palavra)) { aceitou = true; break; }
                if(!aceitou) for(let palavra of palavrasNao) if(frase.includes(palavra)) { recusou = true; break; }

                if(aceitou) { pararContador(); document.getElementById('somSucesso').play(); falar("Corrida aceita!"); aceitarCorrida(); }
                else if(recusou) { pararContador(); document.getElementById('somErro').play(); falar("Corrida recusada!"); recusarCorrida(); }
            };

            reconhecimentoVoz.onend = () => { if(corridaAtualVoz) reconhecimentoVoz.start(); };
            reconhecimentoVoz.onerror = (erro) => { if(erro.error === 'not-allowed') { pararContador(); recusarCorrida(); } };
        }

        function iniciarContador() {
            tempoRestante = 10;
            document.getElementById('contadorTempo').textContent = tempoRestante;
            document.getElementById('indicadorVoz').style.display = 'block';
            document.getElementById('statusMicrofone').style.display = 'block';
            document.getElementById('statusMotorista').className = 'status-bolinha ouvindo';

            tempoContador = setInterval(() => {
                tempoRestante--;
                document.getElementById('contadorTempo').textContent = tempoRestante;
                if(tempoRestante <= 0) { pararContador(); falar("Tempo esgotado!"); document.getElementById('somErro').play(); recusarCorrida(); }
            }, 1000);
        }

        function pararContador() {
            clearInterval(tempoContador); corridaAtualVoz = null;
            if(reconhecimentoVoz) reconhecimentoVoz.stop();
            document.getElementById('indicadorVoz').style.display = 'none';
            document.getElementById('statusMicrofone').style.display = 'none';
            if(document.getElementById('statusMotorista').classList.contains('ouvindo')) {
                document.getElementById('statusMotorista').className = 'status-bolinha online';
            }
        }

        function statusLogin(texto, tipo) { const el = document.getElementById('statusLogin'); el.textContent = texto; el.className = `status-text ${tipo}`; }

        async function cadastrar() {
            const dados = { nome: document.getElementById('nome').value.trim(), email: document.getElementById('email').value.trim().toLowerCase(), senha: document.getElementById('senha').value.trim(), telefone: document.getElementById('telefone').value.trim(), carro: document.getElementById('carro').value.trim(), placa: document.getElementById('placa').value.trim().toUpperCase(), tipo: "motorista" };
            if(Object.values(dados).some(v => !v)) return statusLogin("❌ Preencha tudo!", "erro");
            if(dados.senha.length <6) return statusLogin("❌ Senha > 6 dígitos", "erro");
            statusLogin("⏳ Cadastrando...", "");
            try {
                const res = await fetch(`${API_URL}/register`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(dados) });
                const retorno = await res.json();
                if(!res.ok) throw new Error(retorno.erro || "Falha");
                statusLogin("✅ Conta criada! Entrando...", "ok");
                setTimeout(()=> entrar(dados.email, dados.senha), 1000);
            } catch(e) { statusLogin(`❌ ${e.message}`, "erro"); }
        }

        async function entrar(emailTxt = null, senhaTxt = null) {
            const email = emailTxt || document.getElementById('email').value.trim().toLowerCase();
            const senha = senhaTxt || document.getElementById('senha').value.trim();
            if(!email || !senha) return statusLogin("❌ Digite e-mail e senha", "erro");
            statusLogin("⏳ Entrando...", "");
            try {
                const res = await fetch(`${API_URL}/login`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email, senha}) });
                const retorno = await res.json();
                if(!res.ok) throw new Error(retorno.erro || "Falha login");
                if(retorno.user.tipo !== "motorista") throw new Error("Não é conta motorista");
                token = retorno.token; usuario = retorno.user;
                localStorage.setItem("token_motorista", token); localStorage.setItem("dados_motorista", JSON.stringify(usuario));
                if(document.getElementById('ativarVoz').checked) iniciarReconhecimento();
                telaPrincipal();
            } catch(e) { statusLogin(`❌ ${e.message}`, "erro"); }
        }

        function telaPrincipal() { document.getElementById('loginScreen').style.display = 'none'; document.getElementById('header').style.display = 'flex'; document.getElementById('barra').style.display = 'block'; }
        function sair() { pararContador(); localStorage.clear(); limparTudo(); window.location.reload(); }
        window.onload = () => { const t = localStorage.getItem("token_motorista"); const d = localStorage.getItem("dados_motorista"); if(t && d) try { usuario = JSON.parse(d); token = t; telaPrincipal(); } catch { localStorage.clear(); } };

        async function ficarOnline() {
            if(!usuario || !token) return alert("Faça login!");
            try {
                await fetch(`${API_URL}/ficar_online/${usuario.id}`, { method:'POST', headers: {'Authorization': `Bearer ${token}`} });
                document.getElementById('btnOnline').style.display = 'none'; document.getElementById('btnOffline').style.display = 'block';
                document.getElementById('statusMotorista').className = 'status-bolinha online';
                document.getElementById('statusMotorista').innerHTML = `<i class="fas fa-circle"></i> <span>Online</span>`;
                socket.emit('motorista_online', {id: usuario.id, nome: usuario.nome});
                falar("Você está online. Aguardando corridas.");
            } catch(e) { alert("Erro conexão"); }
        }

        async function ficarOffline() {
            try {
                await fetch(`${API_URL}/ficar_offline/${usuario.id}`, { method:'POST', headers: {'Authorization': `Bearer ${token}`} });
                document.getElementById('btnOnline').style.display = 'block'; document.getElementById('btnOffline').style.display = 'none';
                document.getElementById('statusMotorista').className = 'status-bolinha offline';
                document.getElementById('statusMotorista').innerHTML = `<i class="fas fa-circle"></i> <span>Offline</span>`;
                socket.emit('motorista_offline', {id: usuario.id});
                pararContador();
                falar("Você está offline.");
            } catch(e) {}
        }

        // 🚨 MODO TESTE LIBERADO - ACEITA QUALQUER CORRIDA 🧪✅🩷
        socket.on('nova_corrida', (dados) => {
            // ✅ LINHA DE PAGAMENTO COMENTADA = ACEITA TUDO 🚫💳🆓
            // if(!dados.pago || dados.status_pagamento !== 'aprovado') { return; }

            corrida = dados; corridaAtualVoz = dados.id;
            document.getElementById('somAlerta').currentTime = 0; document.getElementById('somAlerta').play();
            document.getElementById('cPassageiro').textContent = dados.passageiro_nome;
            document.getElementById('cTelefone').textContent = dados.passageiro_telefone;
            document.getElementById('cOrigem').textContent = dados.origem;
            document.getElementById('cDestino').textContent = dados.destino;
            document.getElementById('cValor').textContent = `R$ ${dados.valor.toFixed(2)}`;
            document.getElementById('cardCorrida').style.display = 'block';

            const mensagemVoz = `Atenção! Você recebeu uma corrida. Passageiro ${dados.passageiro_nome}. Origem ${dados.origem}. Valor ${dados.valor.toFixed(2)} reais. Deseja aceitar?`;
            falar(mensagemVoz);

            if(document.getElementById('ativarVoz').checked) { iniciarContador(); if(reconhecimentoVoz) reconhecimentoVoz.start(); }
        });

        // ✅✅✅ FUNÇÃO ACEITAR 100% CORRIGIDA E FUNCIONANDO 🩷🔥🟢
        function aceitarCorrida() {
            if(!corrida) return; 
            pararContador();

            fetch(`${API_URL}/aceitar_corrida`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${token}`, 
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    corrida_id: corrida.id,
                    motorista_id: usuario.id,
                    motorista_nome: usuario.nome,
                    carro: usuario.carro,
                    placa: usuario.placa
                })
            })
            .then(res => res.json())
            .then(data => {
                if(data.sucesso) {
                    estado.aceito = true;
                    document.getElementById('cardCorrida').style.display = 'none';
                    document.getElementById('areaAcoes').style.display = 'grid';
                    document.getElementById('etapaTexto').className = 'etapa etapa1';
                    document.getElementById('etapaTexto').textContent = "📦 PASSO 1: Corrida Aceita! Vá até o passageiro";
                    document.getElementById('btnIrPassageiro').style.display = 'block';
                    falar("Corrida aceita! Vá ao encontro do passageiro.");
                } else {
                    alert("Erro: " + (data.erro || "Não aceitou"));
                    falar("Erro ao aceitar corrida");
                }
            })
            .catch(() => {
                alert("📶 Sem conexão com servidor!");
                falar("Erro de conexão");
            });
        }

        // ❌❌❌ RECUSAR CONTINUA FUNCIONANDO PERFEITO ✅
        function recusarCorrida() {
            if(!corrida) return; pararContador();
            fetch(`${API_URL}/recusar_corrida`, { 
                method: 'POST', 
                headers: {'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json'}, 
                body: JSON.stringify({corrida_id: corrida.id, motorista_id: usuario.id}) 
            })
            .then(res => res.json())
            .then(() => {
                limparTudo(); 
                falar("Corrida recusada.");
            });
        }

        function irAoPassageiro() {
            estado.pegouPassageiro = true;
            document.getElementById('etapaTexto').className = 'etapa etapa2';
            document.getElementById('etapaTexto').textContent = "📍 PASSO 2: Você chegou ao passageiro! Inicie a viagem";
            document.getElementById('btnIrPassageiro').style.display = 'none';
            document.getElementById('btnIniciarViagem').style.display = 'block';
            document.getElementById('btnLigar').style.display = 'block';
            falar("Você chegou ao passageiro. Inicie a viagem.");
        }

        function iniciarViagem() {
            estado.viagemIniciada = true;
            document.getElementById('etapaTexto').className = 'etapa etapa3';
            document.getElementById('etapaTexto').textContent = "🟢 VIAGEM INICIADA! Você pode FINALIZAR a qualquer momento 🟢✅";
            document.getElementById('btnIniciarViagem').style.display = 'none';
            document.getElementById('btnFinalizar').style.display = 'block';
            falar("Viagem iniciada. Finalize quando quiser.");
        }

        function finalizarAgora() {
            if(!estado.viagemIniciada) { alert("❌ Inicie a viagem primeiro!"); falar("Erro, inicie a viagem primeiro."); return; }
            if(confirm("🏁 CONFIRMAR FINALIZAÇÃO?\nValor: R$ " + corrida.valor.toFixed(2))) {
                fetch(`${API_URL}/finalizar_corrida`, { method: 'POST', headers: {'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json'}, body: JSON.stringify({corrida_id: corrida.id, valor: corrida.valor}) }).then(() => {
                    falar("Corrida finalizada. Aguardando próxima."); limparTudo();
                });
            }
        }

        socket.on('corrida_cancelada', (dados) => {
            if(corrida && dados.corrida_id == corrida.id) {
                document.getElementById('somAlerta').play(); document.getElementById('somAlerta').play();
                document.getElementById('alertaCancel').style.display = 'block';
                falar("URGENTE! Corrida CANCELADA pelo passageiro!");
                setTimeout(() => { fecharAlertaCancel(); limparTudo(); }, 8000);
            }
        });

        function fecharAlertaCancel() { document.getElementById('alertaCancel').style.display = 'none'; }
        function limparTudo() {
            corrida = null; estado = { aceito: false, pegouPassageiro: false, viagemIniciada: false };
            document.getElementById('cardCorrida').style.display = 'none'; document.getElementById('areaAcoes').style.display = 'none';
            document.getElementById('btnFinalizar').style.display = 'none'; document.getElementById('btnLigar').style.display = 'none';
            pararContador();
        }

        function ligarCliente() { if(!corrida) return; const tel = corrida.passageiro_telefone.replace(/\D/g, ''); window.open(`https://wa.me/55${tel}`, '_blank'); falar("Abrindo WhatsApp."); }

    </script>

</body>
</html>
