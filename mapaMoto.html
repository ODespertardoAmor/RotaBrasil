<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚗 Motorista | Rota Brasil</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primaria: #165DFF;
            --sucesso: #00B42A;
            --alerta: #FF7D00;
            --perigo: #F53F3F;
            --fundo: #0F1419;
            --card: #1D2129;
            --borda: #363E4D;
            --texto: #F5F7FA;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; }
        body { background: var(--fundo); color: var(--texto); height: 100vh; overflow: hidden; }

        /* === TELA LOGIN === */
        #loginScreen {
            position: absolute; inset: 0; background: var(--fundo);
            display: flex; flex-direction: column; justify-content: center; padding: 20px;
            z-index: 9999;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 38px; font-weight: 900; background: linear-gradient(90deg, #165DFF, #7B2CFF); -webkit-background-clip: text; color: transparent; }
        .card { background: var(--card); border-radius: 16px; padding: 25px; border: 1px solid var(--borda); box-shadow: 0 8px 32px #00000040; }
        input {
            width: 100%; padding: 14px 16px; margin-bottom: 12px;
            background: #272E3B; border: 1.5px solid var(--borda);
            border-radius: 10px; color: white; font-size: 15px; outline: none;
        }
        input:focus { border-color: var(--primaria); }
        button {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.2s ease;
        }
        button:active { transform: scale(0.97); }
        .btn-primary { background: var(--primaria); color: white; margin: 8px 0; }
        .btn-success { background: var(--sucesso); color: white; margin: 8px 0; }
        .btn-danger { background: var(--perigo); color: white; }
        .btn-warning { background: var(--alerta); color: white; }
        .btn-purple { background: #7B2CFF; color: white; }
        .status-text { font-size: 14px; text-align: center; margin-top: 8px; min-height: 20px; }
        .erro { color: var(--perigo); }
        .ok { color: var(--sucesso); }

        /* === MAPA === */
        #mapa { position: absolute; inset: 0; z-index: 1; }
        iframe { width: 100%; height: 100%; border: none; }

        /* === HEADER === */
        .header {
            position: absolute; top: 0; left: 0; right: 0; padding: 15px 20px;
            background: linear-gradient(180deg, var(--fundo), transparent);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }
        .status-bolinha { display: flex; align-items: center; gap: 6px; font-weight: 600; font-size: 15px; }
        .online { color: var(--sucesso); }
        .offline { color: var(--perigo); }

        /* === CARD CORRIDA === */
        .card-corrida {
            position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 400px; background: var(--card);
            border-radius: 16px; padding: 20px; border: 2px solid var(--sucesso);
            z-index: 200; display: none;
            animation: sobe 0.3s ease;
        }
        @keyframes sobe { from { opacity:0; transform: translateX(-50%) translateY(30px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
        .linha { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--borda); font-size: 15px; }
        .valor-grande { font-size: 26px; font-weight: 800; color: var(--sucesso); }
        .grupo-botoes { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }

        /* === BARRA INFERIOR === */
        .barra-inferior {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 15px 20px 25px;
            background: var(--card); border-top: 1px solid var(--borda);
            z-index: 300;
        }
        .acoes { display: none; margin-top: 10px; gap: 10px; grid-template-columns: 1fr 1fr; }
        .acao-full { grid-column: 1 / -1; }
        .etapa {
            text-align: center; padding: 8px; border-radius: 8px; font-weight: 600; font-size: 14px; margin-bottom: 10px;
        }
        .etapa1 { background: #FFF7E8; color: #BC6C00; border: 1px solid #FFD591; }
        .etapa2 { background: #E8F3FF; color: #0050B3; border: 1px solid #91D2FF; }
        .etapa3 { background: #E8FFEA; color: #007828; border: 1px solid #97F0AE; }
    </style>
</head>
<body>

    <!-- TELA LOGIN / CADASTRO -->
    <div id="loginScreen">
        <div class="logo">
            <h1>ROTA BRASIL</h1>
            <p style="color:#86909C; margin-top:5px;">Painel do Motorista</p>
        </div>
        <div class="card">
            <input type="text" id="nome" placeholder="👤 Nome Completo">
            <input type="email" id="email" placeholder="📧 E-mail">
            <input type="password" id="senha" placeholder="🔒 Senha">
            <input type="tel" id="telefone" placeholder="📱 WhatsApp">
            <input type="text" id="carro" placeholder="🚘 Modelo / Cor">
            <input type="text" id="placa" placeholder="🔖 Placa">

            <button class="btn-primary" onclick="cadastrar()"><i class="fas fa-user-plus"></i> Criar Conta</button>
            <button class="btn-success" onclick="entrar()"><i class="fas fa-sign-in-alt"></i> Entrar</button>
            <div id="statusLogin" class="status-text"></div>
        </div>
    </div>

    <!-- MAPA -->
    <div id="mapa">
        <iframe id="mapaFrame" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3657.0!2d-46.6523!3d-23.5645!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjPCsDMzJzUyLjIiUyA0NsKwMzknMDguMyJX!5e0!3m2!1spt-BR!2sbr!4v123456789"></iframe>
    </div>

    <!-- HEADER -->
    <div class="header" id="header" style="display:none;">
        <div style="font-weight:800; font-size:18px;">ROTA BRASIL</div>
        <div id="statusMotorista" class="status-bolinha offline">
            <i class="fas fa-circle"></i> <span>Offline</span>
        </div>
    </div>

    <!-- CARD DE CORRIDA ENTRANDO -->
    <div id="cardCorrida" class="card-corrida">
        <h3 style="text-align:center; margin-bottom:15px; color:var(--alerta);"><i class="fas fa-bell fa-shake"></i> NOVA CORRIDA</h3>
        <div class="linha"><span>Passageiro</span> <span id="cPassageiro">-</span></div>
        <div class="linha"><span>Telefone</span> <span id="cTelefone">-</span></div>
        <div class="linha"><span>Origem</span> <span id="cOrigem">-</span></div>
        <div class="linha"><span>Destino</span> <span id="cDestino">-</span></div>
        <div class="linha"><span>Valor</span> <span id="cValor" class="valor-grande">-</span></div>
        <div class="grupo-botoes">
            <button class="btn-success" onclick="aceitarCorrida()">✅ ACEITAR</button>
            <button class="btn-danger" onclick="recusarCorrida()">❌ RECUSAR</button>
        </div>
    </div>

    <!-- BARRA DE CONTROLES -->
    <div class="barra-inferior" id="barra" style="display:none;">
        <button id="btnOnline" class="btn-success" onclick="ficarOnline()"><i class="fas fa-power-off"></i> FICAR ONLINE</button>
        <button id="btnOffline" class="btn-danger" onclick="ficarOffline()" style="display:none;"><i class="fas fa-power-off"></i> FICAR OFFLINE</button>

        <!-- 🟡 ÁREA DE AÇÕES (AQUI É O CORAÇÃO DO PROBLEMA RESOLVIDO) -->
        <div id="areaAcoes" class="acoes">
            <!-- ETAPA DINAMICA -->
            <div id="etapaTexto" class="etapa etapa1">📦 Corrida Aceita! Vá ao passageiro</div>

            <!-- PASSO 1 -->
            <button id="btnIrPassageiro" class="btn-primary acao-full" onclick="irAoPassageiro()" style="display:none;">
                <i class="fas fa-location-arrow"></i> 📍 IR ATÉ PASSAGEIRO
            </button>

            <!-- PASSO 2 (O FALTOSO - AGORA 100% FUNCIONAL E OBRIGATÓRIO) -->
            <button id="btnIniciarViagem" class="btn-warning acao-full" onclick="iniciarViagem()" style="display:none;">
                <i class="fas fa-route"></i> 🟢 INICIAR VIAGEM AO DESTINO
            </button>

            <!-- TELEFONE -->
            <button id="btnLigar" class="btn-purple" onclick="ligarCliente()" style="display:none;">
                <i class="fas fa-phone-alt"></i> LIGAR / WPP
            </button>

            <!-- PASSO 3 (FINALIZAR - 100% CORRIGIDO SEM ERRO TECH) -->
            <button id="btnFinalizar" class="btn-success acao-full" onclick="finalizarAgora()" style="display:none;">
                <i class="fas fa-check-double"></i> ✅ FINALIZAR CORRIDA
            </button>
        </div>

        <button class="btn-danger" style="margin-top:12px; background:transparent; border:1px solid var(--perigo); color:var(--perigo);" onclick="sair()">
            <i class="fas fa-door-open"></i> SAIR
        </button>
    </div>

    <!-- SOM -->
    <audio id="somAlerta" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-classic-alarm-995.mp3">
    

    <script>
        // ==============================================
        // ⚙️ CONFIGURAÇÕES E VARIAVEIS GLOBAIS (FIXAS)
        // ==============================================
        const API_URL = "https://rotabrasil-v1cf.onrender.com";
        const socket = io(API_URL, { transports: ['websocket', 'polling'], reconnection: true, timeout: 10000 });

        // Variaveis de estado - TODAS INICIALIZADAS = NÃO UNDEFINED! 🔴🚫
        let usuario = null;
        let token = null;
        let corrida = null;
        let estado = {
            aceito: false,
            pegouPassageiro: false,
            viagemIniciada: false // ESSA VARIAVEL É DEUS, SEM ELA DÁ ERRO
        };

        // ==============================================
        // 🔐 LOGIN / CADASTRO 100% SEGURO
        // ==============================================
        async function cadastrar() {
            const dados = {
                nome: document.getElementById('nome').value.trim(),
                email: document.getElementById('email').value.trim(),
                senha: document.getElementById('senha').value.trim(),
                telefone: document.getElementById('telefone').value.trim(),
                carro: document.getElementById('carro').value.trim(),
                placa: document.getElementById('placa').value.trim().toUpperCase(),
                tipo: "motorista"
            };

            if(Object.values(dados).some(v => !v)) return statusLogin("❌ Preencha tudo!", "erro");
            if(dados.senha.length <6) return statusLogin("❌ Senha > 6 digitos", "erro");

            statusLogin("⏳ Cadastrando...", "");
            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(dados)
                });
                const retorno = await res.json();
                if(!res.ok) throw new Error(retorno.erro || "Falha");

                statusLogin("✅ Conta criada! Entrando...", "ok");
                setTimeout(()=> entrar(dados.email, dados.senha), 1000);
            } catch(e) { statusLogin(`❌ ${e.message}`, "erro"); }
        }

        async function entrar(emailTxt = null, senhaTxt = null) {
            const email = emailTxt || document.getElementById('email').value.trim();
            const senha = senhaTxt || document.getElementById('senha').value.trim();
            if(!email || !senha) return statusLogin("❌ Digite e-mail e senha", "erro");

            statusLogin("⏳ Entrando...", "");
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, senha})
                });
                const retorno = await res.json();
                if(!res.ok) throw new Error(retorno.erro || "Falha login");
                if(retorno.user.tipo !== "motorista") throw new Error("Não é conta motorista");

                // SALVAR TUDO COM SEGURANÇA
                token = retorno.token;
                usuario = retorno.user;
                localStorage.setItem("token_motorista", token);
                localStorage.setItem("dados_motorista", JSON.stringify(usuario));

                // ENTRAR SISTEMA
                telaPrincipal();
            } catch(e) { statusLogin(`❌ ${e.message}`, "erro"); }
        }

        function statusLogin(texto, tipo) {
            const el = document.getElementById('statusLogin');
            el.textContent = texto; el.className = `status-text ${tipo}`;
        }

        function telaPrincipal() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('header').style.display = 'flex';
            document.getElementById('barra').style.display = 'block';
        }

        function sair() {
            localStorage.clear(); limparTudo(); window.location.reload();
        }

        // AUTO LOGIN
        window.onload = () => {
            const t = localStorage.getItem("token_motorista");
            const d = localStorage.getItem("dados_motorista");
            if(t && d) {
                try {
                    usuario = JSON.parse(d);
                    token = t;
                    telaPrincipal();
                } catch { localStorage.clear(); }
            }
        };

        // ==============================================
        // 🟢 ONLINE / OFFLINE
        // ==============================================
        async function ficarOnline() {
            if(!usuario || !token) return alert("Faça login!");
            try {
                await fetch(`${API_URL}/ficar_online/${usuario.id}`, { 
                    method:'POST', 
                    headers: {'Authorization': `Bearer ${token}`} 
                });
                document.getElementById('btnOnline').style.display = 'none';
                document.getElementById('btnOffline').style.display = 'block';
                document.getElementById('statusMotorista').className = 'status-bolinha online';
                document.getElementById('statusMotorista').innerHTML = `<i class="fas fa-circle"></i> <span>Online</span>`;
                socket.emit('motorista_online', {id: usuario.id, nome: usuario.nome});
            } catch(e) { alert("Erro conexão"); }
        }

        async function ficarOffline() {
            try {
                await fetch(`${API_URL}/ficar_offline/${usuario.id}`, { 
                    method:'POST', 
                    headers: {'Authorization': `Bearer ${token}`} 
                });
                document.getElementById('btnOnline').style.display = 'block';
                document.getElementById('btnOffline').style.display = 'none';
                document.getElementById('statusMotorista').className = 'status-bolinha offline';
                document.getElementById('statusMotorista').innerHTML = `<i class="fas fa-circle"></i> <span>Offline</span>`;
                socket.emit('motorista_offline', {id: usuario.id});
            } catch(e) {}
        }

        // ==============================================
        // 🚨 RECEBER CORRIDA
        // ==============================================
        socket.on('nova_corrida', (dados) => {
            if(estado.aceito) return; // Ignora se já tem corrida

            // RESET TOTAL PARA NOVA CORRIDA
            corrida = dados;
            estado = { aceito: false, pegouPassageiro: false, viagemIniciada: false };

            // SOM ALTO
            const som = document.getElementById('somAlerta');
            som.currentTime = 0; som.volume = 1; som.play();

            // PREENCHER CARD
            document.getElementById('cPassageiro').textContent = dados.passageiro_nome || "Cliente";
            document.getElementById('cTelefone').textContent = dados.passageiro_telefone || "---";
            document.getElementById('cOrigem').textContent = dados.origem;
            document.getElementById('cDestino').textContent = dados.destino;
            document.getElementById('cValor').textContent = `R$ ${parseFloat(dados.valor).toFixed(2)}`;
            
            // MOSTRAR
            document.getElementById('cardCorrida').style.display = 'block';
        });

        // ==============================================
        // ✅ ACEITAR CORRIDA
        // ==============================================
        async function aceitarCorrida() {
            if(!corrida || !token) return;

            try {
                const res = await fetch(`${API_URL}/aceitar_corrida/${corrida.corrida_id}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({motorista_id: usuario.id})
                });

                if(!res.ok) throw new Error("Servidor recusou");

                // ✅ MUDANÇA DE ESTADO - TUDO COMEÇA AQUI
                estado.aceito = true;
                document.getElementById('cardCorrida').style.display = 'none';
                document.getElementById('areaAcoes').style.display = 'grid';
                document.getElementById('btnLigar').style.display = 'flex';

                // 🟡 PASSO 1: APARECE SÓ O BOTÃO DE IR ATE ELE
                atualizarEtapa(1);
                document.getElementById('btnIrPassageiro').style.display = 'flex';
                document.getElementById('btnIniciarViagem').style.display = 'none';
                document.getElementById('btnFinalizar').style.display = 'none';

                socket.emit('corrida_aceita', {corrida_id: corrida.corrida_id, motorista: usuario});

            } catch(e) { alert("❌ Erro: " + e.message); }
        }

        function recusarCorrida() {
            document.getElementById('cardCorrida').style.display = 'none';
            corrida = null;
        }

        // ==============================================
        // 📍 PASSO 1: IR ATÉ PASSAGEIRO
        // ==============================================
        function irAoPassageiro() {
            if(!estado.aceito) return alert("Aceite a corrida primeiro!");

            // MARCA COMO FEITO
            estado.pegouPassageiro = true;

            // ABRE MAPA
            const destino = (corrida.origem_lat && corrida.origem_lng) 
                ? `${corrida.origem_lat},${corrida.origem_lng}` 
                : corrida.origem;

            document.getElementById('mapaFrame').src = `https://www.google.com/maps/embed/v1/place?key=AIzaSyBFw0Qbyq9zTFTd-tUY6dZWTgaQzuU17R8&q=${encodeURIComponent(destino)}`;
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destino)}&travelmode=driving`, '_blank');

            // 🔵 PASSO 2: BLOQUEIO E LIBERAÇÃO DO BOTÃO INICIAR 🟢 (O PRINCIPAL)
            atualizarEtapa(2);
            document.getElementById('btnIrPassageiro').style.display = 'none'; // ESCODE O 1
            document.getElementById('btnIniciarViagem').style.display = 'flex'; // APARECE O 2 !!!
        }

        // ==============================================
        // 🟢 PASSO 2: INICIAR VIAGEM (CHAVE MESTRA)
        // ==============================================
        function iniciarViagem() {
            // 🛑 BLOQUEIO ABSOLUTO: SÓ PODE INICIAR SE PASSOU PELO PASSO 1
            if(!estado.aceito || !estado.pegouPassageiro) {
                return alert("❌ Você PRECISA ir buscar o passageiro antes de iniciar a viagem!");
            }

            // ✅ MARCA A VARIÁVEL MAIS IMPORTANTE DE TODAS (AGORA SIM PODE FINALIZAR)
            estado.viagemIniciada = true;

            // ABRE MAPA DESTINO
            const destino = (corrida.destino_lat && corrida.destino_lng) 
                ? `${corrida.destino_lat},${corrida.destino_lng}` 
                : corrida.destino;

            document.getElementById('mapaFrame').src = `https://www.google.com/maps/embed/v1/place?key=AIzaSyBFw0Qbyq9zTFTd-tUY6dZWTgaQzuU17R8&q=${encodeURIComponent(destino)}`;
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destino)}&travelmode=driving`, '_blank');

            // 🟢 PASSO 3: LIBERA FINALIZAR
            atualizarEtapa(3);
            document.getElementById('btnIniciarViagem').style.display = 'none'; // ESCODE O 2
            document.getElementById('btnFinalizar').style.display = 'flex';   // APARECE O 3 ✅

            // AVISA PASSAGEIRO
            socket.emit('viagem_iniciada', {corrida_id: corrida.corrida_id});
            alert("🟢 VIAGEM INICIADA COM SUCESSO!");
        }

        // ==============================================
        // 📞 LIGAR
        // ==============================================
        function ligarCliente() {
            if(!corrida || !corrida.passageiro_telefone) return alert("Sem telefone");
            const tel = corrida.passageiro_telefone.replace(/\D/g,'');
            if(confirm("Ligar ou WhatsApp?\nOK = LIGAR | CANCELAR = WPP")) {
                window.location.href = `tel:${tel}`;
            } else {
                const msg = encodeURIComponent("Olá, sou seu motorista! 🚗");
                window.open(`https://wa.me/${tel}?text=${msg}`, '_blank');
            }
        }

        // ==============================================
        // 🏁 PASSO 3: FINALIZAR - VERSÃO A PROVA DE BOMBA 💣🛡️
        // ==============================================
        async function finalizarAgora() {
            // 🚨 1ª LINHA DE DEFESA: VERIFICAÇÃO DE ESTADO (IMPEDIU O ERRO TECH)
            if(!corrida) return alert("❌ Nenhuma corrida ativa.");
            if(!estado.aceito) return alert("❌ Corrida não aceita.");
            if(!estado.pegouPassageiro) return alert("❌ Vá buscar o passageiro primeiro.");
            // ⭐⭐⭐⭐⭐ ESSA LINHA AQUI É O QUE FALTAVA SEMPRE: ⭐⭐⭐⭐⭐
            if(!estado.viagemIniciada) return alert("❌ 🟢 CLIQUE EM 'INICIAR VIAGEM AO DESTINO' PRIMEIRO! (Etapa obrigatória)");

            // CONFIRMAÇÃO
            if(!confirm(`🏁 FINALIZAR CORRIDA?\nValor: R$ ${parseFloat(corrida.valor).toFixed(2)}\n\nAo confirmar, a corrida acaba.`)) {
                return;
            }

            // 🔧 2ª LINHA DE DEFESA: TRATAMENTO DE ERRO TOTAL (NÃO DEIXA TRAVAR NUNCA)
            try {
                // DADOS LIMPOS E GARANTIDOS
                const dadosEnvio = {
                    status: "finalizada",
                    valor_final: parseFloat(corrida.valor || 0),
                    distancia_total: parseFloat(corrida.distancia || 0),
                    finalizado_por: usuario.id
                };

                // 🚀 ENVIO COM HEADER CORRETO (O ERRO TECH MAIS COMUM ERA AQUI NO HEADER)
                const resposta = await fetch(`${API_URL}/finalizar_corrida/${corrida.corrida_id}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`, // <- SEMPRE PRESENTE
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(dadosEnvio)
                });

                // 🧩 LER RESPOSTA COM SEGURANÇA (MESMO QUE O SERVIDOR ENVIE LIXO, NÃO QUEBRA)
                let retornoServidor = {};
                try { retornoServidor = await resposta.json(); } catch(e) {}

                if(!resposta.ok) {
                    throw new Error(retornoServidor.erro || `Er ${resposta.status}`);
                }

                // ✅ SUCESSO TOTAL!
                alert(`✅ CORRIDA FINALIZADA!\n💵 Valor: R$ ${parseFloat(corrida.valor).toFixed(2)}\nObrigado!`);

                // AVISA O PASSAGEIRO
                socket.emit('corrida_finalizada', {
                    corrida_id: corrida.corrida_id,
                    valor: corrida.valor,
                    motorista: usuario.nome
                });

                // 🧹 LIMPAR TUDO E VOLTAR AO NORMAL
                limparTudo();

            } catch (erro) {
                // ❌ TRATA QUALQUER ERRO SEM TRAVAR O SISTEMA
                console.error(erro);
                alert(`🔴 FALHA AO FINALIZAR:\n${erro.message}\n\n📌 O que fazer?\n1. Verifique internet\n2. Tente novamente em 10seg\n\n⚠️ SE APARECER "UNDEFINED", SIGNIFICA QUE VOCÊ NÃO CLICOU EM "INICIAR VIAGEM" ANTES!`);
            }
        }

        // ==============================================
        // 🧹 FUNÇÕES AUXILIARES
        // ==============================================
        function atualizarEtapa(num) {
            const el = document.getElementById('etapaTexto');
            el.className = `etapa etapa${num}`;
            if(num === 1) el.innerHTML = "📦 PASSO 1: Corrida Aceita! Vá ao encontro do passageiro";
            if(num === 2) el.innerHTML = "👌 PASSO 2: Passageiro a bordo! <strong style='color:#BC6C00'>CLIQUE ABAIXO PARA INICIAR VIAGEM</strong>";
            if(num === 3) el.innerHTML = "🚗 PASSO 3: VIAGEM EM ANDAMENTO! Ao chegar, finalize.";
        }

        function limparTudo() {
            corrida = null;
            estado = { aceito: false, pegouPassageiro: false, viagemIniciada: false };
            document.getElementById('areaAcoes').style.display = 'none';
            document.getElementById('btnIrPassageiro').style.display = 'none';
            document.getElementById('btnIniciarViagem').style.display = 'none';
            document.getElementById('btnFinalizar').style.display = 'none';
            document.getElementById('btnLigar').style.display = 'none';
            document.getElementById('mapaFrame').src = "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3657.0!2d-46.6523!3d-23.5645!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjPCsDMzJzUyLjIiUyA0NsKwMzknMDguMyJX!5e0!3m2!1spt-BR!2sbr!4v123456789";
        }

        // ==============================================
        // 🔌 SOCKET EVENTOS (CANCELAMENTOS)
        // ==============================================
        socket.on('corrida_cancelada', (dados) => {
            if(corrida && dados.corrida_id === corrida.corrida_id) {
                alert("⚠️ Passageiro cancelou a corrida!");
                limparTudo();
                document.getElementById('cardCorrida').style.display = 'none';
            }
        });

        socket.on('corrida_finalizada_passageiro', (dados) => {
            if(corrida && dados.corrida_id === corrida.corrida_id) {
                alert("🏁 Passageiro finalizou a corrida!");
                limparTudo();
            }
        });
    </script>

</body>
</html>
