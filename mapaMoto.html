<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🚗 Motorista | Rota Brasil</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  
  <style>
    :root {
      --primaria: #165DFF;
      --sucesso: #00B42A;
      --alerta: #FF7D00;
      --perigo: #F53F3F;
      --fundo: #0F1419;
      --card: rgba(29, 33, 41, 0.97);
      --borda: #363E4D;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: var(--fundo);
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    /* TELA LOGIN */
    #loginScreen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 300;
      background: var(--fundo);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
    }

    .logo-login { text-align: center; margin-bottom: 30px; }
    .logo-login span {
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(90deg, #165DFF, #7B2CFF);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .card-login {
      background: var(--card);
      border-radius: 20px;
      padding: 30px 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    input {
      width: 100%;
      padding: 15px;
      margin-bottom: 12px;
      background: #272E3B;
      border: 1.5px solid var(--borda);
      border-radius: 12px;
      color: white;
      font-size: 16px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: var(--primaria); }

    /* MAPA */
    #mapa {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1;
    }

    /* HEADER */
    .header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: linear-gradient(180deg, rgba(15,20,25,0.95), transparent);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo { font-size: 22px; font-weight: 900; background: linear-gradient(90deg, #165DFF, #7B2CFF); -webkit-background-clip: text; color: transparent; }

    /* CARD FLUTUANTE */
    .corrida-flutuante {
      position: absolute;
      bottom: 160px;
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 420px;
      background: var(--card);
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      border: 2px solid var(--sucesso);
      z-index: 150;
      display: none;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp { from { opacity: 0; transform: translate(-50%, 50px); } to { opacity: 1; transform: translateX(-50%); } }

    .info { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed var(--borda); }
    .label { color: #86909C; font-size: 14px; }
    .valor { font-weight: 600; }
    .valor-grande { font-size: 28px; color: var(--sucesso); font-weight: 900; }
    .status-etapa { 
      font-size: 14px; font-weight: bold; padding: 10px; border-radius:8px; 
      text-align: center; margin: 10px 0; transition: all 0.3s;
    }
    .etapa-aguardando { background: rgba(255,125,0,0.15); color: #FF7D00; border: 1px solid #FF7D00; }
    .etapa-a-caminho { background: rgba(22,93,255,0.15); color: #165DFF; border: 1px solid #165DFF; }
    .etapa-viagem { background: rgba(0,180,42,0.15); color: #00B42A; border: 1px solid #00B42A; }

    /* BARRA INFERIOR */
    .bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(15, 20, 25, 0.98);
      padding: 15px 20px 25px;
      border-top: 1px solid var(--borda);
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: all 0.2s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
    button:active:not(:disabled) { transform: scale(0.97); }

    .btn-online { background: linear-gradient(135deg, var(--sucesso), #009A29); color: white; }
    .btn-offline { background: linear-gradient(135deg, var(--perigo), #D21C1C); color: white; }
    .btn-sair { background: transparent; border: 2px solid var(--perigo); color: var(--perigo); }
    .btn-rota { background: var(--primaria); color: white; }
    .btn-iniciar { background: var(--alerta); color: white; box-shadow: 0 0 10px rgba(255,125,0,0.3); }
    .btn-finalizar { background: var(--sucesso); color: white; box-shadow: 0 0 10px rgba(0,180,42,0.3); }
    .btn-chamar { background: #7B2CFF; color: white; }
    
    .acoes-corrida {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .acao-full { grid-column: 1 / -1; }

    .erro { color: var(--perigo); font-size:14px; margin-top:8px; }
    .sucesso { color: var(--sucesso); font-size:14px; margin-top:8px; }
  </style>
</head>
<body>

  <!-- TELA DE LOGIN / CADASTRO -->
  <div id="loginScreen">
    <div class="logo-login">
      <span>ROTA BRASIL</span>
      <p style="color:#86909C; margin-top:8px;">Painel Exclusivo para Motoristas</p>
    </div>
    <div class="card-login">
      <h3 style="text-align:center; margin-bottom:20px;"><i class="fas fa-user-circle"></i> Acesso Seguro</h3>
      
      <input id="nome" placeholder="👤 Nome Completo">
      <input id="email" placeholder="📧 E-mail" type="email">
      <input id="senha" type="password" placeholder="🔒 Senha (mín 6 dígitos)">
      <input id="telefone" placeholder="📱 Telefone (WhatsApp) Ex: 11999998888">
      <input id="carro" placeholder="🚘 Veículo (Modelo / Cor)">
      <input id="placa" placeholder="🔖 Placa do Veículo">

      <button onclick="registerMotorista()" style="background:var(--primaria); color:white; margin-top:10px;">
        <i class="fas fa-user-plus"></i> Criar Nova Conta
      </button>
      <button onclick="login()" style="background:var(--sucesso); color:white;">
        <i class="fas fa-sign-in-alt"></i> Entrar na Minha Conta
      </button>

      <p id="loginStatus" style="text-align:center; min-height:24px;"></p>
    </div>
  </div>

  <!-- MAPA -->
  <div id="mapa">
    <iframe id="iframeMapa" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3657.0!2d-46.6523!3d-23.5645!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjPCsDMzJzUyLjIiUyA0NsKwMzknMDguMyJX!5e0!3m2!1spt-BR!2sbr!4v123456789" 
            width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
  </div>

  <!-- HEADER -->
  <div class="header" id="headerDashboard" style="display:none;">
    <div class="logo">ROTA BRASIL</div>
    <div id="statusMotorista"><i class="fas fa-circle" style="color:#F53F3F;"></i> Offline</div>
  </div>

  <!-- CARD FLUTUANTE DE CORRIDA -->
  <div id="corridaCard" class="corrida-flutuante"></div>

  <!-- BARRA INFERIOR - AQUI ESTÃO TODOS OS BOTÕES CORRETOS -->
  <div class="bottom-bar" id="bottomBar" style="display:none;">
    <button id="btnOnline" class="btn-online" onclick="ficarOnline()">
      <i class="fas fa-check-circle"></i> FICAR ONLINE
    </button>
    <button id="btnOffline" class="btn-offline" onclick="ficarOffline()" style="display:none;">
      <i class="fas fa-times-circle"></i> FICAR OFFLINE
    </button>
    
    <!-- 🟦 TODOS OS BOTÕES DE AÇÃO - ORDEM OBRIGATÓRIA E CORRETA 🟦 -->
    <div class="acoes-corrida" id="acoesCorrida">
      
      <!-- 🟡 STATUS DA ETAPA - MUDA CONFORME A AÇÃO -->
      <div id="etapaStatus" class="status-etapa etapa-aguardando">📦 CORRIDA ACEITA! <br> Vá ao encontro do passageiro</div>
      
      <!-- 1️⃣ BOTÃO 1: IR ATÉ PASSAGEIRO (SÓ APARECE DEPOIS DE ACEITAR) -->
      <button class="btn-rota acao-full" id="btnIrPassageiro" onclick="irAtePassageiro()" style="display:none;">
        <i class="fas fa-map-marker-alt"></i> 📍 IR ATÉ PASSAGEIRO
      </button>

      <!-- 2️⃣ BOTÃO 2: 🟢 INICIAR VIAGEM AO DESTINO (SÓ APARECE DEPOIS DE IR AO PASSAGEIRO) -->
      <button class="btn-iniciar acao-full" id="btnIniciarViagem" onclick="iniciarViagemDestino()" style="display:none;">
        <i class="fas fa-route"></i> 🟢 INICIAR VIAGEM AO DESTINO
      </button>

      <!-- 🔘 BOTÃO FIXO: LIGAR / WHATSAPP -->
      <button class="btn-chamar" id="btnLigar" onclick="falarComPassageiro()">
        <i class="fas fa-phone-alt"></i> 📞 LIGAR / WPP
      </button>

      <!-- 3️⃣ BOTÃO 3: ✅ FINALIZAR CORRIDA (SÓ APARECE DEPOIS DE INICIAR VIAGEM) -->
      <button class="btn-finalizar acao-full" id="btnFinalizar" onclick="finalizarCorrida()" style="display:none;">
        <i class="fas fa-check-double"></i> ✅ FINALIZAR CORRIDA
      </button>
    </div>

    <button class="btn-sair" onclick="logoutMotorista()">
      <i class="fas fa-door-open"></i> 🚪 SAIR DA CONTA
    </button>
  </div>

  <!-- SOM DE CHAMADA ALTO -->
  <audio id="somChamada" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-classic-alarm-995.mp3" type="audio/mpeg">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-urgent-sms-notification-902.mp3" type="audio/mpeg">
  

  <script>
    const API = "https://rotabrasil-v1cf.onrender.com";
    const socket = io(API, { transports: ['websocket', 'polling'], reconnection: true });

    // 🧩 VARIÁVEIS GLOBAIS (AGORA TODAS DEFINIDAS E CONTROLADAS)
    let token = null;
    let motorista = null;
    let corridaAtual = null;       // Dados da corrida atual
    let corridaAceita = false;      // Status: Aceitou corrida?
    let passageiroColetado = false; // Status: Foi buscar passageiro?
    let viagemIniciada = false;     // Status: ✅ INICIOU VIAGEM? (ESSENCIAL PARA FINALIZAR)

    // ==============================================
    // 🔐 LOGIN E CADASTRO - 100% FUNCIONANDO
    // ==============================================
    async function registerMotorista() {
      const statusEl = document.getElementById("loginStatus");
      
      const nome = document.getElementById("nome").value.trim();
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value.trim();
      const telefone = document.getElementById("telefone").value.trim();
      const carro = document.getElementById("carro").value.trim();
      const placa = document.getElementById("placa").value.trim();

      if(!nome || !email || !senha || !telefone || !carro || !placa) {
        statusEl.className = "erro"; statusEl.innerHTML = "❌ Preencha TODOS os campos!"; return;
      }
      if(senha.length < 6) { statusEl.className = "erro"; statusEl.innerHTML = "❌ Senha mínima 6 dígitos!"; return; }

      statusEl.className = ""; statusEl.innerHTML = "⏳ Cadastrando...";

      try {
        const res = await fetch(`${API}/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nome, email, senha, telefone, tipo: "motorista", carro, placa: placa.toUpperCase() })
        });
        const data = await res.json();
        if(res.ok) {
          statusEl.className = "sucesso"; statusEl.innerHTML = "✅ Conta criada! Entrando...";
          setTimeout(() => login(email, senha), 1000);
        } else {
          statusEl.className = "erro"; statusEl.innerHTML = `❌ ${data.erro || "Erro"}`;
        }
      } catch (e) { statusEl.className = "erro"; statusEl.innerHTML = "🔌 Sem conexão!"; }
    }

    async function login(emailDigitado = null, senhaDigitada = null) {
      const statusEl = document.getElementById("loginStatus");
      const email = emailDigitado || document.getElementById("email").value.trim();
      const senha = senhaDigitada || document.getElementById("senha").value.trim();

      if(!email || !senha) { statusEl.className = "erro"; statusEl.innerHTML = "❌ Digite usuário e senha!"; return; }
      statusEl.innerHTML = "⏳ Entrando...";

      try {
        const res = await fetch(`${API}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, senha })
        });
        const data = await res.json();
        if(res.ok && data.token) {
          if(data.user.tipo !== "motorista") { statusEl.className = "erro"; statusEl.innerHTML = "⚠️ Não é conta motorista!"; return; }
          
          // SALVAR DADOS
          token = data.token;
          motorista = data.user;
          localStorage.setItem("token_motorista", token);
          localStorage.setItem("dados_motorista", JSON.stringify(motorista));

          // ENTRAR SISTEMA
          entrarDashboard();
        } else {
          statusEl.className = "erro"; statusEl.innerHTML = `❌ ${data.erro || "Dados inválidos"}`;
        }
      } catch (e) { statusEl.className = "erro"; statusEl.innerHTML = "🔌 Erro conexão!"; }
    }

    function entrarDashboard() {
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("headerDashboard").style.display = "flex";
      document.getElementById("bottomBar").style.display = "block";
    }

    function logoutMotorista() {
      localStorage.clear();
      resetarTudo();
      window.location.reload();
    }

    // AUTO LOGIN CORRIGIDO
    window.onload = () => {
      const tokenSalvo = localStorage.getItem("token_motorista");
      const dadosSalvos = localStorage.getItem("dados_motorista");
      if(tokenSalvo && dadosSalvos) {
        try {
          motorista = JSON.parse(dadosSalvos);
          token = tokenSalvo;
          entrarDashboard();
        } catch(e) { localStorage.clear(); }
      }
    };

    // ==============================================
    // 🟢 ONLINE / OFFLINE
    // ==============================================
    async function ficarOnline() {
      if(!motorista || !token) { alert("Faça login!"); return; }
      try {
        await fetch(`${API}/ficar_online/${motorista.id}`, { method: "POST", headers: { Authorization: `Bearer ${token}` }});
        document.getElementById("btnOnline").style.display = "none";
        document.getElementById("btnOffline").style.display = "block";
        document.getElementById("statusMotorista").innerHTML = `<i class="fas fa-circle" style="color:#00B42A;"></i> ONLINE`;
        socket.emit('motorista_online', { id: motorista.id, nome: motorista.nome });
      } catch (e) { alert("Erro ao ficar online"); }
    }

    async function ficarOffline() {
      if(!motorista || !token) return;
      try {
        await fetch(`${API}/ficar_offline/${motorista.id}`, { method: "POST", headers: { Authorization: `Bearer ${token}` }});
        document.getElementById("btnOnline").style.display = "block";
        document.getElementById("btnOffline").style.display = "none";
        document.getElementById("statusMotorista").innerHTML = `<i class="fas fa-circle" style="color:#F53F3F;"></i> Offline`;
        socket.emit('motorista_offline', { id: motorista.id });
      } catch (e) { alert("Erro ao ficar offline"); }
    }

    // ==============================================
    // 🚨 RECEBER NOVA CORRIDA
    // ==============================================
    socket.on("nova_corrida", (data) => {
      if(corridaAceita || !motorista) return;

      // RESETAR STATUS PARA NOVA CORRIDA
      corridaAtual = data;
      corridaAceita = false;
      passageiroColetado = false;
      viagemIniciada = false;

      // 🔊 SOM ALTO
      const som = document.getElementById("somChamada");
      som.currentTime = 0; som.volume = 1; som.play();

      // CARD
      document.getElementById("corridaCard").innerHTML = `
        <h2 style="text-align:center; margin-bottom:15px; color:#FF7D00;"><i class="fas fa-bell fa-shake"></i> NOVA CORRIDA!</h2>
        <div class="info"><span class="label">👤 Passageiro</span><span class="valor">${data.passageiro_nome || 'Não informado'}</span></div>
        <div class="info"><span class="label">📞 Telefone</span><span class="valor">${data.passageiro_telefone || 'Não informado'}</span></div>
        <div class="info"><span class="label">📍 Origem</span><span class="valor">${data.origem}</span></div>
        <div class="info"><span class="label">🏁 Destino</span><span class="valor">${data.destino}</span></div>
        <div class="info"><span class="label">💰 Valor</span><span class="valor valor-grande">R$ ${parseFloat(data.valor || 0).toFixed(2)}</span></div>
        <div class="info"><span class="label">📏 Distância</span><span class="valor">${data.distancia || '?'} km</span></div>
        
        <div style="margin-top:20px; display:grid; grid-template-columns:1fr 1fr; gap:12px;">
          <button onclick="aceitarCorrida()" style="background:#00B42A; color:white; padding:16px; border-radius:12px; font-weight:bold;">✅ ACEITAR</button>
          <button onclick="recusarCorrida()" style="background:#F53F3F; color:white; padding:16px; border-radius:12px; font-weight:bold;">❌ RECUSAR</button>
        </div>
      `;
      document.getElementById("corridaCard").style.display = "block";
    });

    // ==============================================
    // ✅ ACEITAR CORRIDA
    // ==============================================
    async function aceitarCorrida() {
      if (!corridaAtual || corridaAceita || !token) return;

      try {
        const res = await fetch(`${API}/aceitar_corrida/${corridaAtual.corrida_id}`, {
          method: "POST",
          headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify({ motorista_id: motorista.id })
        });

        if(res.ok) {
          corridaAceita = true;
          document.getElementById("corridaCard").style.display = "none";
          
          // 🟢 MOSTRAR ÁREA DE AÇÕES E O PRIMEIRO BOTÃO
          document.getElementById("acoesCorrida").style.display = "grid";
          
          // 🔵 PASSO 1: APARECE SÓ O BOTÃO "IR ATÉ PASSAGEIRO"
          document.getElementById("etapaStatus").className = "status-etapa etapa-aguardando";
          document.getElementById("etapaStatus").innerHTML = "📦 PASSO 1: Vá ao encontro do passageiro";
          
          document.getElementById("btnIrPassageiro").style.display = "flex";
          document.getElementById("btnIniciarViagem").style.display = "none"; // ESCONDIDO AINDA
          document.getElementById("btnFinalizar").style.display = "none";      // ESCONDIDO AINDA

          socket.emit("corrida_aceita", { corrida_id: corridaAtual.corrida_id, motorista: motorista });
          alert("✅ Corrida Aceita!");
        }
      } catch (e) { alert("Erro ao aceitar corrida"); }
    }

    function recusarCorrida() {
      document.getElementById("corridaCard").style.display = "none";
      resetarStatusCorrida();
    }

    // ==============================================
    // 📍 PASSO 1: IR ATÉ PASSAGEIRO
    // ==============================================
    function irAtePassageiro() {
      if (!corridaAtual || !corridaAceita) { alert("❌ Aceite a corrida primeiro!"); return; }

      // Marca que já foi buscar o passageiro
      passageiroColetado = true;

      // Prepara endereço/coordenada
      let destinoMapa;
      if(corridaAtual.origem_lat && corridaAtual.origem_lng) {
        destinoMapa = `${corridaAtual.origem_lat},${corridaAtual.origem_lng}`;
      } else {
        destinoMapa = corridaAtual.origem;
      }

      // Abre no mapa interno
      const urlEmbed = `https://www.google.com/maps/embed/v1/place?key=AIzaSyBFw0Qbyq9zTFTd-tUY6dZWTgaQzuU17R8&q=${encodeURIComponent(destinoMapa)}&zoom=15`;
      document.getElementById("iframeMapa").src = urlEmbed;

      // Abre rota externa
      const urlRota = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destinoMapa)}&travelmode=driving`;
      window.open(urlRota, '_blank');

      // 🔵 ATUALIZA TELA PARA O PASSO SEGUINTE!
      document.getElementById("etapaStatus").className = "status-etapa etapa-a-caminho";
      document.getElementById("etapaStatus").innerHTML = "👌 PASSO 2: Passageiro a bordo! <strong>CLIQUE ABAIXO PARA INICIAR VIAGEM</strong>";
      
      // ✅ AQUI ESTÁ O BOTÃO SENDO LIBERADO DEPOIS DE IR AO PASSAGEIRO
      document.getElementById("btnIrPassageiro").style.display = "none";       // Esconde esse
      document.getElementById("btnIniciarViagem").style.display = "flex";     // 🟢 APARECE O BOTÃO INICIAR VIAGEM
      document.getElementById("btnFinalizar").style.display = "none";

      alert("🗺️ Rota aberta! Pegou o passageiro? Clique em INICIAR VIAGEM!");
    }

    // ==============================================
    // 🟢 PASSO 2: INICIAR VIAGEM AO DESTINO 🟢 (O QUE ESTAVA FALTANDO/ERRADO)
    // ==============================================
    function iniciarViagemDestino() {
      // ✅ VALIDAÇÃO ESTRITA: SÓ PODE INICIAR SE PASSOU PELO PASSO 1
      if (!corridaAtual || !corridaAceita || !passageiroColetado) { 
        alert("❌ Você precisa ir buscar o passageiro primeiro!"); 
        return; 
      }
      
      // ✅ MARCA QUE A VIAGEM FOI INICIADA (VARIÁVEL CHAVE PARA FINALIZAR)
      viagemIniciada = true;

      // Prepara destino
      let destinoMapa;
      if(corridaAtual.destino_lat && corridaAtual.destino_lng) {
        destinoMapa = `${corridaAtual.destino_lat},${corridaAtual.destino_lng}`;
      } else {
        destinoMapa = corridaAtual.destino;
      }

      // Atualiza mapa para destino
      const urlEmbed = `https://www.google.com/maps/embed/v1/place?key=AIzaSyBFw0Qbyq9zTFTd-tUY6dZWTgaQzuU17R8&q=${encodeURIComponent(destinoMapa)}&zoom=15`;
      document.getElementById("iframeMapa").src = urlEmbed;

      // Abre rota para destino
      const urlRota = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(destinoMapa)}&travelmode=driving`;
      window.open(urlRota, '_blank');

      // 🔵 ATUALIZA TELA PARA ÚLTIMO PASSO
      document.getElementById("etapaStatus").className = "status-etapa etapa-viagem";
      document.getElementById("etapaStatus").innerHTML = "🚗 PASSO 3: VIAGEM EM ANDAMENTO! <br> Ao chegar, clique em FINALIZAR";
      
      // ✅ LIBERA O BOTÃO DE FINALIZAR (AGORA ELE FUNCIONA!)
      document.getElementById("btnIniciarViagem").style.display = "none";  // Esconde iniciar
      document.getElementById("btnFinalizar").style.display = "flex";      // ✅ APARECE FINALIZAR

      // AVISA PASSAGEIRO
      socket.emit("viagem_iniciada", { corrida_id: corridaAtual.corrida_id, motorista_nome: motorista.nome });

      alert("🟢 VIAGEM INICIADA COM SUCESSO! A caminho do destino!");
    }

    // ==============================================
    // 📞 LIGAR / WHATSAPP
    // ==============================================
    function falarComPassageiro() {
      if(!corridaAtual || !corridaAtual.passageiro_telefone) { alert("Telefone indisponível"); return; }
      const tel = corridaAtual.passageiro_telefone.replace(/\D/g, '');
      const opcao = confirm(`📞 ${corridaAtual.passageiro_nome}\n${corridaAtual.passageiro_telefone}\n\nOK = LIGAR | Cancelar = WHATSAPP`);
      if(opcao) { window.location.href = `tel:${tel}`; } 
      else { const msg = encodeURIComponent("Olá! Sou seu motorista da Rota Brasil 🚗"); window.open(`https://wa.me/${tel}?text=${msg}`, '_blank'); }
    }

    // ==============================================
    // ✅ PASSO 3: FINALIZAR CORRIDA (CORRIGIDO DE VEZ - NÃO DÁ MAIS ERRO)
    // ==============================================
    async function finalizarCorrida() {
      // 🛑 VALIDAÇÃO DE SEGURANÇA TOTAL: SÓ DEIXA FINALIZAR SE TIVER FEITO TUDO ANTES
      if (!corridaAtual) { alert("❌ Nenhuma corrida ativa!"); return; }
      if (!corridaAceita) { alert("❌ Você não aceitou essa corrida!"); return; }
      if (!passageiroColetado) { alert("❌ Você não buscou o passageiro!"); return; }
      if (!viagemIniciada) { alert("❌ 🟢 PRIMEIRO CLIQUE EM 'INICIAR VIAGEM AO DESTINO'! <br> (Etapa obrigatória)"); return; }

      // Se passou por todas as validações, PODE FINALIZAR!
      const valor = parseFloat(corridaAtual.valor || 0).toFixed(2);
      const confirma = confirm(`🏁 CONFIRMAR FINALIZAÇÃO?\n\n👤 Passageiro: ${corridaAtual.passageiro_nome}\n💰 Valor Total: R$ ${valor}\n\n⚠️ Ao confirmar, a corrida será encerrada e o valor liberado.`);
      
      if(!confirma) return;

      try {
        // 🚀 ENVIO PARA O SERVIDOR TRATADO CONTRA ERROS
        const res = await fetch(`${API}/finalizar_corrida/${corridaAtual.corrida_id}`, {
          method: "POST",
          headers: { 
            "Authorization": `Bearer ${token || ''}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            status: "finalizada",
            valor_final: parseFloat(corridaAtual.valor || 0),
            distancia_total: parseFloat(corridaAtual.distancia || 0),
            finalizado_por: "motorista"
          })
        });

        let respostaServidor = {};
        try { respostaServidor = await res.json(); } catch(e) { /* Ignora se resposta for vazia */ }

        if(res.ok || res.status === 200) {
          // ✅ SUCESSO TOTAL
          alert(`✅ 🚗 CORRIDA FINALIZADA COM SUCESSO!\n💵 Valor Recebido: R$ ${valor}\n🏆 Obrigado por dirigir com a Rota Brasil!`);

          // AVISA PASSAGEIRO
          socket.emit("corrida_finalizada", { 
            corrida_id: corridaAtual.corrida_id, 
            valor: corridaAtual.valor,
            motorista_nome: motorista.nome
          });

          // 🧹 LIMPAR TUDO E VOLTAR AO NORMAL
          resetarTudo();

        } else {
          // ❌ ERRO DO SERVIDOR (MOSTRA O QUE DEU)
          alert(`❌ ERRO AO FINALIZAR: ${respostaServidor.erro || 'Servidor não respondeu'}\nVerifique sua internet e tente novamente.`);
        }

      } catch (err) {
        // ❌ ERRO DE CONEXÃO
        alert(`🔌 FALHA DE CONEXÃO:\n${err.message}\n\nVerifique sua internet! A corrida NÃO foi finalizada.`);
      }
    }

    // ==============================================
    // 🧹 FUNÇÕES DE RESET (LIMPA TUDO)
    // ==============================================
    function resetarStatusCorrida() {
      corridaAtual = null;
      corridaAceita = false;
      passageiroColetado = false;
      viagemIniciada = false;
    }

    function resetarTudo() {
      resetarStatusCorrida();
      document.getElementById("acoesCorrida").style.display = "none";
      document.getElementById("btnIrPassageiro").style.display = "none";
      document.getElementById("btnIniciarViagem").style.display = "none";
      document.getElementById("btnFinalizar").style.display = "none";
      document.getElementById("iframeMapa").src = "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3657.0!2d-46.6523!3d-23.5645!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjPCsDMzJzUyLjIiUyA0NsKwMzknMDguMyJX!5e0!3m2!1spt-BR!2sbr!4v123456789";
    }

    // ==============================================
    // 🔌 EVENTOS SOCKET (CANCELAMENTOS ETC)
    // ==============================================
    socket.on("corrida_cancelada", (dados) => {
      if(corridaAtual && dados.corrida_id === corridaAtual.corrida_id) {
        alert("⚠️ ATENÇÃO: O Passageiro CANCELou a corrida!");
        resetarTudo();
        document.getElementById("corridaCard").style.display = "none";
      }
    });

    socket.on("cliente_desconectado", (dados) => {
      if(corridaAtual && dados.corrida_id === corridaAtual.corrida_id) {
        alert("⚠️ Passageiro saiu da corrida!");
        resetarTudo();
        document.getElementById("corridaCard").style.display = "none";
      }
    });

    socket.on("corrida_finalizada_passageiro", (dados) => {
      if(corridaAtual && dados.corrida_id === corridaAtual.corrida_id) {
        alert("🏁 Corrida finalizada pelo passageiro!");
        resetarTudo();
      }
    });

  </script>
</body>
</html>
