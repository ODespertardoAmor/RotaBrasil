<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚕 Passageiro | Rota Brasil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <!-- ✅ CONFIGURAÇÃO DE CORES EXATAS DO SEU DESENHO 🎨🖌️ -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        escuro: '#12151A',
                        card: '#1E2228',
                        verde: '#22C55E',
                        vermelho: '#EF4444',
                        cinza: '#2D3139',
                        texto: '#F8FAFC',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .botao-gradient {
                background: linear-gradient(145deg, #22C55E, #16A34A);
            }
            .botao-vermelho {
                background: linear-gradient(145deg, #EF4444, #DC2626);
            }
            .sombra-personalizada {
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            }
            .mapa-fundo {
                background-color: #12151A;
                background-image: url('https://i.imgur.com/7Z8XkL2.png'); <!-- 🗺️ MAPA ESTÁTICO (OFFLINE) IGUAL SEU DESENHO -->
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
            }
        }
    </style>
</head>
<body class="bg-escuro text-texto font-sans overflow-hidden h-screen w-screen">

    <!-- 🗺️ FUNDO MAPA (OFFLINE / ESTÁTICO) - IGUAL SUA IMAGEM 🖼️✅ -->
    <div class="absolute inset-0 mapa-fundo">
        <!-- LINHA DE ROTA VERDE DESENHADA IGUAL AO SEU DESENHO 🟢📍 -->
        <svg viewBox="0 0 400 800" class="absolute inset-0 w-full h-full pointer-events-none">
            <path d="M280,200 Q220,280 180,350 Q150,390 120,420" stroke="#22C55E" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="0"/>
            <circle cx="280" cy="200" r="4" fill="#22C55E"/>
            <path d="M120,420 L90,450" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
            <circle cx="90" cy="450" r="3" fill="#FFFFFF"/>
            <!-- PINO VERMELHO DESTINO 📍🔴 -->
            <path d="M310,250 L310,300 C310,310 300,315 290,315 C280,315 270,310 270,300 L270,250 C270,235 290,225 290,225 S310,235 310,250 Z" fill="#EF4444"/>
            <circle cx="290" cy="265" r="8" fill="#FFFFFF"/>
        </svg>
    </div>

    <!-- 🔍 CAMPO DE BUSCA: "AONDE VAMOS?" - TOPO EXATO ✅🔝 -->
    <div class="absolute top-6 left-4 right-4 z-10">
        <div class="bg-card/95 backdrop-blur-md rounded-2xl px-5 py-4 flex items-center justify-between sombra-personalizada border border-cinza/50">
            <div class="flex items-center gap-3">
                <i class="fa fa-user-circle-o text-xl text-gray-400"></i>
                <input type="text" placeholder="Aonde vamos?" class="bg-transparent outline-none text-lg font-medium w-[80%] placeholder:text-gray-400">
            </div>
            <i class="fa fa-chevron-down text-gray-400"></i>
        </div>
    </div>

    <!-- 🟩🟥🟩🟥 PAINEL DE BOTÕES - CENTRO BAIXO, EXATAMENTE IGUAL SEU DESENHO 🎛️✅👇 -->
    <div class="absolute bottom-40 left-4 right-4 z-10">
        <div class="bg-card/90 backdrop-blur-lg rounded-3xl p-4 sombra-personalizada border border-cinza/60">
            <div class="grid grid-cols-2 gap-3">

                <!-- 🟩 BOTÃO 1: CALCULAR CORRIDA (ESQUERDA CIMA) ✅📍 -->
                <button id="btnCalcular" class="bg-cinza/80 hover:bg-cinza active:scale-[0.97] transition-all duration-200 rounded-2xl py-5 flex flex-col items-center justify-center gap-2 border border-green-500/40">
                    <i class="fa fa-map-marker text-2xl text-verte"></i>
                    <span class="font-bold text-lg">CALCULAR CORRIDA</span>
                </button>

                <!-- 🟩 BOTÃO 2: PREÇO (DIREITA CIMA) ✅💰 -->
                <button id="btnPreco" class="botao-gradient hover:brightness-110 active:scale-[0.97] transition-all duration-200 rounded-2xl py-5 flex flex-col items-center justify-center gap-2">
                    <i class="fa fa-tag text-2xl text-white"></i>
                    <span class="font-bold text-lg">PREÇO</span>
                </button>

                <!-- 🟩 BOTÃO 3: CANCELAR (ESQUERDA BAIXO) ✅❌ -->
                <button id="btnCancelar" class="botao-gradient hover:brightness-110 active:scale-[0.97] transition-all duration-200 rounded-2xl py-5 flex flex-col items-center justify-center gap-2">
                    <i class="fa fa-times-circle text-2xl text-white"></i>
                    <span class="font-bold text-lg">CANCELAR</span>
                </button>

                <!-- 🟥 BOTÃO 4: CHAMAR CORRIDA (DIREITA BAIXO) ✅🚕 - PRINCIPAL VERMELHO -->
                <button id="btnChamar" class="botao-vermelho hover:brightness-110 active:scale-[0.97] transition-all duration-200 rounded-2xl py-5 flex flex-col items-center justify-center gap-2">
                    <i class="fa fa-taxi text-2xl text-white"></i>
                    <span class="font-bold text-lg">CHAMAR CORRIDA</span>
                </button>

            </div>
        </div>
    </div>

    <!-- 📢 ESPAÇO EXCLUSIVO PARA PUBLICIDADE - RODAPÉ, COMO VOCÊ PEDIU 🟦🟧✅👇 -->
    <div class="absolute bottom-0 left-0 right-0 h-32 z-10 bg-card/95 backdrop-blur-md border-t border-cinza/50 px-4 py-3">
        <p class="text-xs text-gray-400 font-medium mb-2">📢 Publicidade / Parceiros</p>
        <!-- 🃏 CARD DE ANÚNCIO (ESPAÇO PRONTO PRA VOCÊ COLOCAR O QUE QUISER) -->
        <div class="w-full h-[70%] bg-cinza/70 rounded-xl flex items-center justify-center border border-cinza overflow-hidden">
            <span class="text-gray-500 font-semibold">ÁREA DE PROPAGANDA</span>
            <!-- VOCÊ PODE COLOCAR IMAGENS, BANNERS, LINKS AQUI 🖼️📎 -->
        </div>
    </div>

    <!-- ⚡ JAVASCRIPT SIMPLES E FUNCIONAL 🧠🛠️ -->
    <script>
        // 💵 VALOR DA CORRIDA (VOCÊ EDITA AQUI QUANDO QUISER)
        let valorCorrida = "R$ 18,50";
        let corridaCalculada = false;

        // 🧮 FUNÇÃO CALCULAR CORRIDA
        document.getElementById('btnCalcular').addEventListener('click', () => {
            corridaCalculada = true;
            alert("✅ Rota calculada!\nDistância: 4.2km\nTempo estimado: 12min");
            // Muda cor do botão preço pra mostrar valor
            document.getElementById('btnPreco').innerHTML = `<i class="fa fa-money text-2xl text-white"></i><span class="font-bold text-lg">${valorCorrida}</span>`;
        });

        // 💰 FUNÇÃO VER PREÇO
        document.getElementById('btnPreco').addEventListener('click', () => {
            if(!corridaCalculada) {
                alert("⚠️ Primeiro calcule a corrida!");
            } else {
                alert(`💵 Valor Total: ${valorCorrida}\n💳 Aceita: Dinheiro, Cartão, Pix`);
            }
        });

        // ❌ FUNÇÃO CANCELAR
        document.getElementById('btnCancelar').addEventListener('click', () => {
            if(confirm("⚠️ Tem certeza que deseja CANCELAR?")){
                corridaCalculada = false;
                document.getElementById('btnPreco').innerHTML = `<i class="fa fa-tag text-2xl text-white"></i><span class="font-bold text-lg">PREÇO</span>`;
                alert("❌ Cancelado com sucesso!");
            }
        });

        // 🚕 FUNÇÃO CHAMAR CORRIDA
        document.getElementById('btnChamar').addEventListener('click', () => {
            if(!corridaCalculada) {
                alert("⚠️ Calcule a corrida antes de chamar!");
            } else {
                alert("🚕 CORRIDA SOLICITADA!\n✅ Motorista a caminho...\n🔔 Você será avisado em instantes!");
            }
        });

        // 🗺️ MAPA OFFLINE: Não precisa de API, carrega imagem local/fixa
        // A imagem do mapa está integrada e funciona SEM INTERNET 📴✅
    </script>

</body>
</html>
