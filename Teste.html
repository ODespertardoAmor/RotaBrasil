<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚕 Passageiro | Rota Brasil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        escuro: '#12151A',
                        card: '#1E2228',
                        verde: '#22C55E',
                        vermelho: '#EF4444',
                        cinza: '#2D3139',
                        texto: '#F8FAFC',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto { content-visibility: auto; }
            .botao-gradient { background: linear-gradient(145deg, #22C55E, #16A34A); }
            .botao-vermelho { background: linear-gradient(145deg, #EF4444, #DC2626); }
            .sombra-personalizada { box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45); }
            .backdrop-blur-custom { backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
            /* 🗺️ ESTILO MAPA ROTA BRASIL (LIMPO, ESCURO, SEM MARCAS) 🇧🇷✅ */
            #mapa { 
                background-color: #12151A !important; 
                touch-action: pan-x pan-y !important;
            }
            .leaflet-control-attribution, .leaflet-control-zoom { display: none !important; }
            /* 💬 ESTILOS CHAT */
            .chat-balao-passageiro { background: #22C55E; color: white; border-radius: 20px 20px 4px 20px; padding: 10px 14px; max-width: 80%; line-height: 1.4; }
            .chat-balao-motorista { background: #2D3139; color: white; border-radius: 20px 20px 20px 4px; padding: 10px 14px; max-width: 80%; line-height: 1.4; }
            /* ✅🔥 CORREÇÃO PRINCIPAL: PERMITE CLIQUE, FOCO E TECLADO NA CAIXA DE ENDEREÇO 📲⌨️🆗 */
            .input-livre { 
                pointer-events: auto !important; 
                user-select: text !important; 
                -webkit-user-select: text !important;
                z-index: 999 !important;
                position: relative !important;
            }
            .caixa-busca {
                pointer-events: auto !important;
            }
            /* 🖱️ ÁREA DE TOQUE MAIOR PARA CELULAR */
            .botao-touch {
                min-height: 50px !important;
                cursor: pointer !important;
            }
        }
    </style>
</head>
<body class="bg-escuro text-texto font-sans overflow-hidden h-screen w-screen select-none">

    <div id="mapa" class="absolute inset-0 z-0"></div>

    <div id="aviso" class="fixed top-10 left-1/2 -translate-x-1/2 z-[9999] px-5 py-3 rounded-xl sombra-personalizada hidden backdrop-blur-custom text-center font-medium"></div>

    <div id="botoesSuperiores" class="absolute top-4 left-4 right-4 z-[500] flex justify-between items-center hidden">
        <button onclick="sair()" class="bg-card/85 backdrop-blur-custom w-11 h-11 rounded-xl flex items-center justify-center border border-cinza/70 active:scale-95 transition-all duration-150 sombra-personalizada botao-touch">
            <i class="fa fa-sign-out text-vermelho text-lg"></i>
        </button>

        <button onclick="abrirChat()" class="bg-card/85 backdrop-blur-custom w-11 h-11 rounded-xl flex items-center justify-center border border-cinza/70 active:scale-95 transition-all duration-150 sombra-personalizada relative botao-touch">
            <i class="fa fa-comments text-verde text-lg"></i>
            <span id="notifChat" class="absolute -top-1 -right-1 bg-vermelho text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full hidden animate-pulse">1</span>
        </button>
    </div>

    <div id="janelaChat" class="absolute top-16 right-3 w-[310px] h-[420px] bg-card/95 backdrop-blur-custom rounded-2xl sombra-personalizada border border-cinza/60 z-[600] flex flex-col hidden">
        <div class="p-3 border-b border-cinza flex justify-between items-center bg-verde/20 rounded-t-2xl">
            <h4 class="font-bold text-lg flex items-center gap-2"><i class="fa fa-taxi text-verde"></i> Motorista</h4>
            <button onclick="fecharChat()" class="w-8 h-8 rounded-lg bg-cinza/70 flex items-center justify-center active:scale-90 transition-all"><i class="fa fa-times"></i></button>
        </div>
        <div id="mensagensChat" class="flex-1 p-3 overflow-y-auto space-y-3 text-sm scrollbar-thin scrollbar-thumb-cinza scrollbar-track-transparent"></div>
        <div class="p-3 border-t border-cinza flex gap-2">
            <input type="text" id="textoMsg" placeholder="Digite sua mensagem..." class="flex-1 bg-cinza/70 border border-cinza rounded-xl px-3 py-2 outline-none focus:border-verde transition-all input-livre">
            <button onclick="enviarMsg()" class="bg-verde w-9 h-9 rounded-xl flex items-center justify-center active:scale-90 transition-all"><i class="fa fa-paper-plane text-white"></i></button>
        </div>
    </div>

    <div id="telaLogin" class="absolute inset-0 z-[999] flex items-center justify-center bg-escuro/75 backdrop-blur-custom px-4">
        <div class="bg-card/95 rounded-3xl p-6 w-full max-w-sm sombra-personalizada border border-cinza/50">
            <div class="text-center mb-6">
                <h1 class="text-[clamp(28px,8vw,42px)] font-black bg-gradient-to-r from-verde to-vermelho bg-clip-text text-transparent">ROTA BRASIL</h1>
                <p class="text-gray-400 text-sm">App Passageiro • Seu transporte seguro</p>
            </div>

            <input type="text" id="nome" placeholder="👤 Nome Completo" class="w-full bg-cinza/70 border border-cinza rounded-xl px-4 py-3 mb-3 outline-none focus:border-verde transition-all input-livre">
            <input type="email" id="email" placeholder="📧 E-mail" class="w-full bg-cinza/70 border border-cinza rounded-xl px-4 py-3 mb-3 outline-none focus:border-verde transition-all input-livre">
            <input type="password" id="senha" placeholder="🔒 Senha" class="w-full bg-cinza/70 border border-cinza rounded-xl px-4 py-3 mb-4 outline-none focus:border-verde transition-all input-livre">

            <button onclick="cadastrar()" class="w-full botao-gradient rounded-xl py-3 font-bold text-lg mb-2 active:scale-[0.97] transition-all sombra-personalizada botao-touch">📝 CRIAR CONTA</button>
            <button onclick="entrar()" class="w-full bg-cinza/80 hover:bg-cinza rounded-xl py-3 font-bold text-lg mb-4 border border-verde/30 active:scale-[0.97] transition-all botao-touch">🔑 ENTRAR</button>
            <p id="statusLogin" class="text-center text-sm text-gray-400 h-5"></p>
        </div>
    </div>

    <div id="barraBusca" class="absolute top-4 left-16 right-16 z-[400] hidden caixa-busca">
        <div class="bg-card/90 backdrop-blur-custom rounded-2xl px-4 py-3 flex items-center justify-between sombra-personalizada border border-cinza/50">
            <div class="flex items-center gap-3 flex-1">
                <i class="fa fa-map-marker text-xl text-verde flex-shrink-0"></i>
                <input 
                    type="text" 
                    id="destinoInput" 
                    placeholder="Aonde vamos?" 
                    class="bg-transparent outline-none text-base font-medium w-full placeholder:text-gray-400 input-livre"
                    autocomplete="street-address"
                    inputmode="text"
                    spellcheck="true"
                >
            </div>
            <i class="fa fa-chevron-down text-gray-400 flex-shrink-0"></i>
        </div>
    </div>

    <div id="painelBotoes" class="absolute bottom-40 left-4 right-4 z-[300] hidden">
        <div class="bg-card/85 backdrop-blur-custom rounded-3xl p-4 sombra-personalizada border border-cinza/60">
            <div class="grid grid-cols-2 gap-3">

                <button id="btnCalcular" class="bg-cinza/80 hover:bg-cinza rounded-2xl py-4 flex flex-col items-center justify-center gap-2 border border-green-500/40 active:scale-[0.97] transition-all botao-touch">
                    <i class="fa fa-map-marker text-2xl text-verde"></i>
                    <span class="font-bold text-lg">CALCULAR CORRIDA</span>
                </button>

                <button id="btnPreco" class="botao-gradient rounded-2xl py-4 flex flex-col items-center justify-center gap-2 active:scale-[0.97] transition-all botao-touch">
                    <i class="fa fa-tag text-2xl text-white"></i>
                    <span class="font-bold text-lg">PREÇO</span>
                </button>

                <button id="btnCancelar" class="botao-gradient rounded-2xl py-4 flex flex-col items-center justify-center gap-2 active:scale-[0.97] transition-all botao-touch">
                    <i class="fa fa-times-circle text-2xl text-white"></i>
                    <span class="font-bold text-lg">CANCELAR</span>
                </button>

                <button id="btnChamar" class="botao-vermelho rounded-2xl py-4 flex flex-col items-center justify-center gap-2 active:scale-[0.97] transition-all botao-touch">
                    <i class="fa fa-taxi text-2xl text-white"></i>
                    <span class="font-bold text-lg">CHAMAR CORRIDA</span>
                </button>

            </div>
        </div>
    </div>

    <div id="painelMotorista" class="absolute bottom-40 left-4 right-4 z-[300] hidden">
        <div class="bg-card/95 backdrop-blur-custom rounded-3xl p-4 sombra-personalizada border border-cinza/60 flex flex-col gap-3">
            <div class="text-center bg-verde/10 py-1.5 rounded-xl border border-verde/20">
                <p class="text-verde text-sm font-bold animate-pulse">✨ MOTORISTA A CAMINHO...</p>
            </div>
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-14 h-14 bg-cinza border border-verde rounded-full flex items-center justify-center overflow-hidden">
                        <i class="fa fa-user text-3xl text-gray-400 mt-2" id="fotoMotorista"></i>
                    </div>
                    <div>
                        <h3 id="nomeMotorista" class="font-bold text-lg">Nome do Motorista</h3>
                        <p class="text-gray-400 text-xs flex items-center gap-1">
                            <i class="fa fa-star text-amber-500"></i> <span id="notaMotorista">4.9</span> • Rota Brasil Pro
                        </p>
                    </div>
                </div>
                <div class="text-right">
                    <span id="placaCarro" class="bg-texto text-escuro font-mono font-bold px-3 py-1 rounded-md text-sm border-2 border-cinza tracking-wider">BRA2E19</span>
                    <p id="modeloCarro" class="text-xs text-gray-400 mt-1 font-medium">Carro Modelo</p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-2 pt-1">
                <div class="bg-cinza/50 rounded-xl p-2.5 text-center border border-cinza">
                    <p class="text-gray-400 text-[10px] font-bold uppercase">Chega em</p>
                    <p id="tempoChegada" class="text-xl font-black text-verde">-- min</p>
                </div>
                <button onclick="cancelarCorridaEmAndamento()" class="bg-vermelho/20 hover:bg-vermelho/30 border border-vermelho/40 rounded-xl font-bold text-sm text-vermelho flex items-center justify-center gap-2 active:scale-95 transition-all">
                    <i class="fa fa-times-circle"></i> CANCELAR
                </button>
            </div>
        </div>
    </div>

    <div id="areaAds" class="absolute bottom-0 left-0 right-0 h-32 z-[200] bg-card/90 backdrop-blur-custom border-t border-cinza/50 px-4 py-3 hidden">
        <p class="text-xs text-gray-400 font-medium mb-1 flex justify-between items-center">
            <span>📢 Espaço Publicitário • Parceiros Rota Brasil</span>
            <button onclick="abrirAds()" class="text-verde text-xs font-bold hover:underline">GERENCIAR</button>
        </p>
        <div class="w-full h-[calc(100%-20px)] bg-cinza/60 rounded-xl flex items-center justify-center border border-cinza/50 overflow-hidden">
            <span class="text-gray-500 font-semibold text-sm">COLOQUE SEUS BANNERS/ANÚNCIOS AQUI 🖼️</span>
        </div>
    </div>

    <script>
        // 🔗 DADOS DO NOSSO SERVIDOR
        const API_URL = "https://rotabrasil-v1cf.onrender.com";
        const socket = io(API_URL, { 
            transports: ['websocket', 'polling'], 
            reconnection: true, 
            timeout: 12000,
            forceNew: true
        });

        // 📊 VARIÁVEIS GLOBAIS
        let usuario = null;
        let token = null;
        let corrida = null;
        let valorFinal = 0;
        let distancia = 0;
        let tempo = 0;
        let mapa = null;
        let marcadorPassageiro = null;
        let marcadorMotorista = null;
        let rotaLinha = null;

        // 🔔 FUNÇÃO AVISO FLUTUANTE
        function mostrarAviso(texto, tipo='sucesso') {
            const el = document.getElementById('aviso');
            el.textContent = texto;
            el.classList.remove('hidden', 'bg-verde/90', 'bg-vermelho/90', 'text-white', 'text-black');
            el.classList.add(tipo==='sucesso' ? 'bg-verde/90' : 'bg-vermelho/90', 'text-white');
            setTimeout(()=> el.classList.add('hidden'), 3500);
        }

        // 🚪 FUNÇÃO SAIR / LOGOUT COMPLETO
        function sair() {
            if(confirm("⚠️ Tem certeza que deseja SAIR da conta?")) {
                localStorage.clear();
                usuario = null; token = null; corrida = null;
                socket.emit('passageiro_desconectado');
                // Reseta tudo para tela inicial
                document.getElementById('telaLogin').classList.remove('hidden');
                document.getElementById('barraBusca').classList.add('hidden');
                document.getElementById('painelBotoes').classList.add('hidden');
                document.getElementById('painelMotorista').classList.add('hidden');
                document.getElementById('areaAds').classList.add('hidden');
                document.getElementById('botoesSuperiores').classList.add('hidden');
                document.getElementById('janelaChat').classList.add('hidden');
                document.getElementById('destinoInput').value = "";
                resetarBotoes();
                mostrarAviso("👋 Você saiu com sucesso! Volte sempre 🇧🇷");
            }
        }

        // 💬 FUNÇÕES CHAT TEMPO REAL
        function abrirChat() { 
            document.getElementById('janelaChat').classList.remove('hidden');
            document.getElementById('notifChat').classList.add('hidden');
        }
        function fecharChat() { document.getElementById('janelaChat').classList.add('hidden'); }
        
        function adicionarMensagem(texto, ehMotorista=false) {
            const div = document.createElement('div');
            div.className = `flex ${ehMotorista ? 'justify-start' : 'justify-end'}`;
            div.innerHTML = `<div class="${ehMotorista ? 'chat-balao-motorista' : 'chat-balao-passageiro'}">${texto}</div>`;
            const caixa = document.getElementById('mensagensChat');
            caixa.appendChild(div);
            caixa.scrollTop = caixa.scrollHeight; // Auto scroll última mensagem
            if(ehMotorista && document.getElementById('janelaChat').classList.contains('hidden')) {
                document.getElementById('notifChat').classList.remove('hidden');
            }
        }
        
        function enviarMsg() {
            const txt = document.getElementById('textoMsg').value.trim();
            if(!txt || !corrida || !corrida.motorista) {
                mostrarAviso("⚠️ Inicie uma corrida primeiro!", 'erro');
                return;
            }
            adicionarMensagem(txt, false);
            socket.emit('chat_mensagem', { corrida_id: corrida.id, remetente: 'passageiro', texto: txt });
            document.getElementById('textoMsg').value = "";
        }

        // 🗺️ INICIALIZAR MAPA AO VIVO
        function inicializarMapa() {
            mapa = L.map('mapa', { zoomControl:false, attributionControl:false, doubleClickZoom:false }).setView([-23.5505, -46.6333], 14);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                subdomains: 'abcd', maxZoom: 19
            }).addTo(mapa);

            // 🟢 MARCADOR PASSAGEIRO
            marcadorPassageiro = L.marker([-23.5505, -46.6333], {
                icon: L.divIcon({
                    html: '<i class="fa fa-user-circle text-verde text-[32px] drop-shadow-lg"></i>',
                    className: 'bg-transparent border-0', iconSize: [32,32], iconAnchor: [16,32]
                })
            }).addTo(mapa);

            // 🔴 MARCADOR MOTORISTA (TÁXI VERMELHO)
            marcadorMotorista = L.marker([0,0], {
                icon: L.divIcon({
                    html: '<i class="fa fa-taxi text-vermelho text-[32px] drop-shadow-lg"></i>',
                    className: 'bg-transparent border-0', iconSize: [32,32], iconAnchor: [16,32]
                })
            });

            // 🟢 LINHA ROTA
            rotaLinha = L.polyline([], {color:'#22C55E', weight:5, opacity:0.8, dashArray: '10, 10', lineCap: 'round'}).addTo(mapa);

            if(navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    pos => {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        marcadorPassageiro.setLatLng([lat, lng]);
                        if(!corrida) mapa.setView([lat, lng], 14);
                        if(usuario && corrida) {
                            socket.emit('passageiro_localizacao', {
                                corrida_id: corrida.id, usuario_id: usuario.id, lat: lat, lng: lng
                            });
                        }
                    },
                    err => { mostrarAviso("📍 Ative a Localização para usar o app!", 'erro'); },
                    { enableHighAccuracy: true, maximumAge: 1000, timeout: 5000 }
                );
            } else {
                mostrarAviso("❌ GPS não suportado no seu aparelho", 'erro');
            }
        }

        // 🔐 CADASTRO E LOGIN
        async function cadastrar() {
            const dados = {
                nome: document.getElementById('nome').value.trim(),
                email: document.getElementById('email').value.trim().toLowerCase(),
                senha: document.getElementById('senha').value.trim(),
                tipo: "passageiro"
            };

            if(!dados.nome || !dados.email || !dados.senha) return mostrarAviso("⚠️ Preencha todos os campos!", 'erro');
            if(dados.senha.length < 6) return mostrarAviso("⚠️ Senha deve ter no mínimo 6 caracteres!", 'erro');

            document.getElementById('statusLogin').textContent = "⏳ Criando conta...";
            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(dados)
                });

                const texto = await res.text();
                let ret;
                try { ret = JSON.parse(texto); } 
                catch(e) { throw new Error("Servidor indisponível, tente novamente"); }

                if(!res.ok) throw new Error(ret.erro || "Falha no cadastro");

                mostrarAviso("✅ Conta criada com sucesso! Entrando...");
                setTimeout(()=> entrar(dados.email, dados.senha), 1200);
            } catch(e) {
                mostrarAviso("❌ " + e.message, 'erro');
                document.getElementById('statusLogin').textContent = "";
            }
        }

        async function entrar(emailTxt=null, senhaTxt=null) {
            const email = emailTxt || document.getElementById('email').value.trim().toLowerCase();
            const senha = senhaTxt || document.getElementById('senha').value.trim();
            if(!email || !senha) return mostrarAviso("⚠️ Digite E-mail e Senha!", 'erro');

            document.getElementById('statusLogin').textContent = "⏳ Entrando...";
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({email, senha})
                });

                const texto = await res.text();
                let ret;
                try { ret = JSON.parse(texto); } 
                catch(e) { throw new Error("Servidor fora do ar, aguarde"); }

                if(!res.ok) throw new Error(ret.erro || "Falha no login");
                if(ret.user.tipo !== "passageiro") throw new Error("❌ Esta conta não é de Passageiro");

                token = ret.token;
                usuario = ret.user;
                localStorage.setItem("token_rota_passageiro", token);
                localStorage.setItem("dados_rota_passageiro", JSON.stringify(usuario));

                document.getElementById('telaLogin').classList.add('hidden');
                document.getElementById('barraBusca').classList.remove('hidden');
                document.getElementById('painelBotoes').classList.remove('hidden');
                document.getElementById('areaAds').classList.remove('hidden');
                document.getElementById('botoesSuperiores').classList.remove('hidden');

                mostrarAviso(`👋 Olá, ${usuario.nome.split(' ')[0]}! Bem-vindo 🇧🇷`);
                socket.emit('passageiro_conectado', {id:usuario.id, nome:usuario.nome});

            } catch(e) {
                mostrarAviso("❌ " + e.message, 'erro');
                document.getElementById('statusLogin').textContent = "";
            }
        }

        // 🔄 RESETAR ESTADO DA CORRIDA
        function resetarBotoes() {
            valorFinal = 0; distancia = 0; tempo = 0;
            document.getElementById('btnPreco').innerHTML = `<i class="fa fa-tag text-2xl text-white"></i><span class="font-bold text-lg">PREÇO</span>`;
            document.getElementById('btnChamar').innerHTML = `<i class="fa fa-taxi text-2xl text-white"></i><span class="font-bold text-lg">CHAMAR CORRIDA</span>`;
            document.getElementById('painelMotorista').classList.add('hidden');
            document.getElementById('painelBotoes').classList.remove('hidden');
            if(marcadorMotorista) marcadorMotorista.removeFrom(mapa);
            if(rotaLinha) rotaLinha.setLatLngs([]);
        }

        // ❌ FUNÇÃO PARA BOTÃO DE CANCELAR DO CARD DO MOTORISTA
        function cancelarCorridaEmAndamento() {
            if(confirm("⚠️ DESEJA CANCELAR A CORRIDA ATUAL?")) {
                if(corrida) {
                    socket.emit('corrida_cancelada', { corrida_id: corrida.id, motivo: "Cancelado pelo Passageiro" });
                }
                corrida = null;
                resetarBotoes();
                mostrarAviso("❌ Corrida cancelada com sucesso!");
            }
        }

        function abrirAds() { mostrarAviso("📢 Área de Publicidade: Totalmente configurável por você! 🇧🇷"); }

        // 🚀 INICIALIZAÇÃO GERAL AO CARREGAR
        window.onload = () => {
            inicializarMapa();
            const tokenSalvo = localStorage.getItem("token_rota_passageiro");
            const dadosSalvos = localStorage.getItem("dados_rota_passageiro");
            
            if(tokenSalvo && dadosSalvos) {
                try {
                    usuario = JSON.parse(dadosSalvos);
                    token = tokenSalvo;
                    document.getElementById('telaLogin').classList.add('hidden');
                    document.getElementById('barraBusca').classList.remove('hidden');
                    document.getElementById('painelBotoes').classList.remove('hidden');
                    document.getElementById('areaAds').classList.remove('hidden');
                    document.getElementById('botoesSuperiores').classList.remove('hidden');
                    socket.emit('passageiro_conectado', {id:usuario.id, nome:usuario.nome});
                } catch {
                    localStorage.clear();
                }
            }

            const inputEndereco = document.getElementById('destinoInput');
            inputEndereco.addEventListener('touchstart', (e) => { e.stopPropagation(); inputEndereco.focus(); });
            inputEndereco.addEventListener('click', (e) => { e.stopPropagation(); inputEndereco.focus(); });

            // 🧮 BOTÃO CALCULAR CORRIDA
            document.getElementById('btnCalcular').addEventListener('click', async ()=>{
                const destino = inputEndereco.value.trim();
                if(!destino) {
                    mostrarAviso("✍️ Digite o destino no campo acima!", 'erro');
                    inputEndereco.focus();
                    return;
                }

                mostrarAviso("🧮 Calculando rota e valor... ⏳");
                try {
                    const res = await fetch(`${API_URL}/calcular_valor`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ destino: destino })
                    });

                    const texto = await res.text();
                    let dados;
                    try { 
                        dados = JSON.parse(texto);
                        if(!res.ok) throw new Error(dados.erro || "Falha no cálculo");
                    } catch(e) {
                        distancia = (Math.random() * 12 + 1.5).toFixed(1);
                        valorFinal = (distancia * 2.90 + 4.00).toFixed(2);
                        tempo = Math.round(distancia * 3.5);
                        document.getElementById('btnPreco').innerHTML = `
                            <i class="fa fa-money text-2xl text-white"></i>
                            <span class="font-bold text-lg">R$ ${valorFinal}</span>
                        `;
                        mostrarAviso("📶 Sem conexão. Valor estimado calculado!", 'erro');
                        return;
                    }
                    
                    distancia = dados.distancia;
                    valorFinal = dados.valor;
                    tempo = dados.tempo;
                    document.getElementById('btnPreco').innerHTML = `
                        <i class="fa fa-money text-2xl text-white"></i>
                        <span class="font-bold text-lg">R$ ${valorFinal}</span>
                    `;
                    mostrarAviso(`✅ Pronto! 📏${distancia}km | ⏱️${tempo}min | 💵R$${valorFinal}`);

                } catch(e) {
                    distancia = (Math.random() * 12 + 1.5).toFixed(1);
                    valorFinal = (distancia * 2.90 + 4.00).toFixed(2);
                    tempo = Math.round(distancia * 3.5);
                    document.getElementById('btnPreco').innerHTML = `
                        <i class="fa fa-money text-2xl text-white"></i>
                        <span class="font-bold text-lg">R$ ${valorFinal}</span>
                    `;
                    mostrarAviso("📶 Modo Offline Ativado 🛟", 'erro');
                }
            });

            // 💰 BOTÃO VER PREÇO DETALHES
            document.getElementById('btnPreco').addEventListener('click', ()=>{
                if(valorFinal === 0) return mostrarAviso("⚠️ Primeiro clique em CALCULAR CORRIDA!", 'erro');
                alert(`💳 DETALHES DA CORRIDA:\n\n💰 VALOR TOTAL: R$ ${valorFinal}\n📏 Distância: ${distancia} km\n⏱️ Tempo estimado: ${tempo} min\n💵 Formas de Pagamento: Dinheiro, Pix, Cartão Crédito/Débito`);
            });

            // ❌ BOTÃO CANCELAR CORRIDA
            document.getElementById('btnCancelar').addEventListener('click', ()=>{
                if(!corrida) {
                    resetarBotoes();
                    mostrarAviso("🔄 Campos limpos! Digite novo endereço.");
                    inputEndereco.focus();
                    return;
                }

                if(confirm("⚠️ TEM CERTEZA?\nDeseja realmente CANCELAR essa corrida?")) {
                    socket.emit('corrida_cancelada', { 
                        corrida_id: corrida.id, 
                        motivo: "Cancelado pelo Passageiro"
                    });
                    corrida = null;
                    resetarBotoes();
                    mostrarAviso("❌ Corrida cancelada com sucesso!");
                }
            });

            // 🚕 BOTÃO CHAMAR CORRIDA
            document.getElementById('btnChamar').addEventListener('click', async ()=>{
                if(valorFinal === 0) return mostrarAviso("⚠️ CALCULE A CORRIDA PRIMEIRO!", 'erro');
                if(corrida) return mostrarAviso("🚕 Você já tem uma corrida em andamento!", 'erro');

                const destino = inputEndereco.value.trim();
                mostrarAviso("🚕 Solicitando motorista... Aguarde um instante ⏳");

                try {
                    const dadosEnvio = {
                        passageiro_id: usuario.id,
                        origem: "Localização Atual",
                        destino: destino,
                        valor: parseFloat(valorFinal),
                        distancia: parseFloat(distancia)
                    };

                    const res = await fetch(`${API_URL}/nova_corrida`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(dadosEnvio)
                    });

                    const textoResposta = await res.text();
                    let ret;
                    
                    try { ret = JSON.parse(textoResposta); } 
                    catch (parseErr) { throw new Error("Erro de comunicação com servidor. Tente novamente."); }

                    if(!res.ok) throw new Error(ret.erro || "Falha ao buscar motoristas");

                    corrida = { id: ret.corrida_id, status: "procurando" };
                    mostrarAviso("🔍 Procurando motoristas próximos...");

                } catch(e) {
                    mostrarAviso("❌ " + e.message, 'erro');
                }
            });

            // 📡 SOCKET.IO - EVENTOS EM TEMPO REAL

            // 🚨 ESCUTA SE UM MOTORISTA ACEITOU A CORRIDA (MUDANÇA DE TELA ATIVADA AQUI) 🤝✨
            socket.on('corrida_aceita', (dados) => {
                if (!corrida || dados.corrida_id != corrida.id) return;
                
                corrida.status = "aceita";
                corrida.motorista = dados.motorista; // Guarda infos do motorista

                // Alimenta os dados do motorista no novo painel da interface
                document.getElementById('nomeMotorista').textContent = dados.motorista.nome || "Motorista Rota Brasil";
                document.getElementById('notaMotorista').textContent = dados.motorista.nota || "4.9";
                document.getElementById('placaCarro').textContent = dados.motorista.placa || "AAA-0000";
                document.getElementById('modeloCarro').textContent = dados.motorista.carro || "Veículo Cadastrado";
                document.getElementById('tempoChegada').textContent = (dados.tempo_chegada || "5") + " min";

                // Executa a mágica: Esconde os botões antigos e exibe o painel do motorista
                document.getElementById('painelBotoes').classList.add('hidden');
                document.getElementById('painelMotorista').classList.remove('hidden');

                mostrarAviso("⚡ Seu motorista aceitou e está a caminho!");
            });

            // 📍 RECEBE LOCALIZAÇÃO DO MOTORISTA E ATUALIZA MAPA
            socket.on('motorista_localizacao', (dados)=>{
                if(!corrida || dados.corrida_id != corrida.id) return;
                
                // Atualiza posição do táxi vindo até você
                marcadorMotorista.setLatLng([dados.lat, dados.lng]).addTo(mapa);
                
                // Redesenha a linha de rota ligando o motorista ao passageiro
                rotaLinha.setLatLngs([
                    marcadorPassageiro.getLatLng(),
                    marcadorMotorista.getLatLng()
                ]);
            });

            // 💬 RECEBER MENSAGENS DO CHAT
            socket.on('chat_mensagem', (dados) => {
                if(!corrida || dados.corrida_id != corrida.id) return;
                if(dados.remetente === 'motorista') {
                    adicionarMensagem(dados.texto, true);
                }
            });

            // ❌ SE O MOTORISTA CANCELAR
            socket.on('corrida_cancelada', (dados) => {
                if(!corrida || dados.corrida_id != dados.corrida_id) return;
                corrida = null;
                resetarBotoes();
                mostrarAviso("❌ O motorista cancelou a viagem. Chame outra!", "erro");
            });
        };
    </script>
</body>
</html>
