<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚕 Passageiro | Rota Brasil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <!-- ✅ CORES EXATAS DO SEU DESENHO 🎨🖌️ -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        escuro: '#12151A',
                        card: '#1E2228',
                        verde: '#22C55E',
                        vermelho: '#EF4444',
                        cinza: '#2D3139',
                        texto: '#F8FAFC',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto { content-visibility: auto; }
            .botao-gradient { background: linear-gradient(145deg, #22C55E, #16A34A); }
            .botao-vermelho { background: linear-gradient(145deg, #EF4444, #DC2626); }
            .sombra-personalizada { box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); }
            /* 🗺️ MAPA OFFLINE ESTÁTICO - EXATO DA IMAGEM 📴✅ */
            .mapa-fundo {
                background-color: #12151A;
                background-image: url('https://i.imgur.com/7Z8XkL2.png');
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
            }
            .backdrop-blur-custom { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        }
    </style>
</head>
<body class="bg-escuro text-texto font-sans overflow-hidden h-screen w-screen select-none">

    <!-- 🗺️ FUNDO MAPA (OFFLINE / ESTÁTICO) - NÃO USA INTERNET 📴🗺️✅ -->
    <div class="absolute inset-0 mapa-fundo">
        <!-- 🟢 ROTA E PINOS DESENHADOS IGUAL SEU LAYOUT 📍✅ -->
        <svg viewBox="0 0 400 800" class="absolute inset-0 w-full h-full pointer-events-none">
            <path d="M280,200 Q220,280 180,350 Q150,390 120,420" stroke="#22C55E" stroke-width="4" fill="none" stroke-linecap="round"/>
            <circle cx="280" cy="200" r="4" fill="#22C55E"/>
            <path d="M120,420 L90,450" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
            <circle cx="90" cy="450" r="3" fill="#FFFFFF"/>
            <!-- 🔴 PINO DESTINO -->
            <path d="M310,250 L310,300 C310,310 300,315 290,315 C280,315 270,310 270,300 L270,250 C270,235 290,225 290,225 S310,235 310,250 Z" fill="#EF4444"/>
            <circle cx="290" cy="265" r="8" fill="#FFFFFF"/>
        </svg>
    </div>

    <!-- ⚠️ AVISO FLUTUANTE (ERRO/SUCESSO) -->
    <div id="aviso" class="fixed top-10 left-1/2 -translate-x-1/2 z-[9999] px-6 py-3 rounded-2xl sombra-personalizada hidden backdrop-blur-custom"></div>

    <!-- 🔐 TELA LOGIN / CADASTRO (MODAL SOBRE O MAPA) -->
    <div id="telaLogin" class="absolute inset-0 z-[999] flex items-center justify-center bg-escuro/70 backdrop-blur-custom px-4">
        <div class="bg-card/95 rounded-3xl p-6 w-full max-w-sm sombra-personalizada border border-cinza/50">
            <div class="text-center mb-6">
                <h1 class="text-[clamp(28px,8vw,42px)] font-black bg-gradient-to-r from-verde to-vermelho bg-clip-text text-transparent">ROTA BRASIL</h1>
                <p class="text-gray-400 text-sm">App Passageiro • Seu transporte seguro</p>
            </div>

            <input type="text" id="nome" placeholder="👤 Nome Completo" class="w-full bg-cinza/70 border border-cinza rounded-xl px-4 py-3 mb-3 outline-none focus:border-verde transition-all">
            <input type="email" id="email" placeholder="📧 E-mail" class="w-full bg-cinza/70 border border-cinza rounded-xl px-4 py-3 mb-3 outline-none focus:border-verde transition-all">
            <input type="password" id="senha" placeholder="🔒 Senha" class="w-full bg-cinza/70 border border-cinza rounded-xl px-4 py-3 mb-4 outline-none focus:border-verde transition-all">

            <button onclick="cadastrar()" class="w-full botao-gradient rounded-xl py-3 font-bold text-lg mb-2 active:scale-[0.97] transition-all">📝 CRIAR CONTA</button>
            <button onclick="entrar()" class="w-full bg-cinza/80 hover:bg-cinza rounded-xl py-3 font-bold text-lg mb-4 border border-verde/30 active:scale-[0.97] transition-all">🔑 ENTRAR</button>
            <p id="statusLogin" class="text-center text-sm text-gray-400"></p>
        </div>
    </div>

    <!-- 🔍 CAMPO "AONDE VAMOS?" - TOPO, EXATO IGUAL SEU DESENHO ✅🔝 -->
    <div id="barraBusca" class="absolute top-6 left-4 right-4 z-[100] hidden">
        <div class="bg-card/90 backdrop-blur-custom rounded-2xl px-5 py-4 flex items-center justify-between sombra-personalizada border border-cinza/50">
            <div class="flex items-center gap-3 flex-1">
                <i class="fa fa-user-circle-o text-xl text-gray-400"></i>
                <input type="text" id="destinoInput" placeholder="Aonde vamos?" class="bg-transparent outline-none text-lg font-medium w-full placeholder:text-gray-400">
            </div>
            <i class="fa fa-chevron-down text-gray-400"></i>
        </div>
    </div>

    <!-- 🟩🟥🟩🟥 PAINEL DE BOTÕES - CENTRO BAIXO, 100% IGUAL AO SEU LAYOUT 🎛️✅👇 -->
    <div id="painelBotoes" class="absolute bottom-40 left-4 right-4 z-[100] hidden">
        <div class="bg-card/85 backdrop-blur-custom rounded-3xl p-4 sombra-personalizada border border-cinza/60">
            <div class="grid grid-cols-2 gap-3">

                <!-- 🟩 BOTÃO 1: CALCULAR CORRIDA (ESQUERDA CIMA) ✅📍 -->
                <button id="btnCalcular" class="bg-cinza/80 hover:bg-cinza rounded-2xl py-5 flex flex-col items-center justify-center gap-2 border border-green-500/40 active:scale-[0.97] transition-all">
                    <i class="fa fa-map-marker text-2xl text-verde"></i>
                    <span class="font-bold text-lg">CALCULAR CORRIDA</span>
                </button>

                <!-- 🟩 BOTÃO 2: PREÇO (DIREITA CIMA) ✅💰 -->
                <button id="btnPreco" class="botao-gradient rounded-2xl py-5 flex flex-col items-center justify-center gap-2 active:scale-[0.97] transition-all">
                    <i class="fa fa-tag text-2xl text-white"></i>
                    <span class="font-bold text-lg">PREÇO</span>
                </button>

                <!-- 🟩 BOTÃO 3: CANCELAR (ESQUERDA BAIXO) ✅❌ -->
                <button id="btnCancelar" class="botao-gradient rounded-2xl py-5 flex flex-col items-center justify-center gap-2 active:scale-[0.97] transition-all">
                    <i class="fa fa-times-circle text-2xl text-white"></i>
                    <span class="font-bold text-lg">CANCELAR</span>
                </button>

                <!-- 🟥 BOTÃO 4: CHAMAR CORRIDA (DIREITA BAIXO) ✅🚕 - VERMELHO PRINCIPAL -->
                <button id="btnChamar" class="botao-vermelho rounded-2xl py-5 flex flex-col items-center justify-center gap-2 active:scale-[0.97] transition-all">
                    <i class="fa fa-taxi text-2xl text-white"></i>
                    <span class="font-bold text-lg">CHAMAR CORRIDA</span>
                </button>

            </div>
        </div>
    </div>

    <!-- 📢 ESPAÇO EXCLUSIVO PARA PUBLICIDADE - RODAPÉ, LIVRE E LIMPO 🟦🆓✅👇 -->
    <div id="areaAds" class="absolute bottom-0 left-0 right-0 h-32 z-[100] bg-card/90 backdrop-blur-custom border-t border-cinza/50 px-4 py-3 hidden">
        <p class="text-xs text-gray-400 font-medium mb-1 flex justify-between items-center">
            <span>📢 Espaço Publicitário • Parceiros Rota Brasil</span>
            <button onclick="abrirAds()" class="text-verde text-xs font-bold">GERENCIAR</button>
        </p>
        <!-- 🃏 ÁREA 100% LIVRE PARA VOCÊ COLOCAR O QUE QUISER 🖼️📎🆓 -->
        <div class="w-full h-[calc(100%-20px)] bg-cinza/60 rounded-xl flex items-center justify-center border border-cinza/50 overflow-hidden">
            <span class="text-gray-500 font-semibold text-sm">COLOQUE SEUS ANÚNCIOS AQUI</span>
            <!-- EXEMPLO: <img src="seu-banner.jpg" class="w-full h-full object-cover"> -->
        </div>
    </div>

    <!-- 🛠️ CONFIGURAÇÕES E CONEXÃO - NOSSO SERVIDOR 🩷🔌 -->
    <script>
        // ⚙️ DADOS DO NOSSO PROJETO 🇧🇷🚕
        const API_URL = "https://rotabrasil-v1cf.onrender.com";
        const socket = io(API_URL, { 
            transports: ['websocket', 'polling'], 
            reconnection: true, 
            timeout: 10000,
            forceNew: true
        });

        // 🧠 VARIÁVEIS DO SISTEMA
        let usuario = null;
        let token = null;
        let corrida = null;
        let valorFinal = 0;
        let distancia = 0;
        let tempo = 0;

        // 🗣️ FUNÇÕES DE INTERFACE
        function mostrarAviso(texto, tipo='sucesso') {
            const el = document.getElementById('aviso');
            el.textContent = texto;
            el.classList.remove('hidden');
            el.classList.remove('bg-verde/90', 'bg-vermelho/90');
            el.classList.add(tipo==='sucesso' ? 'bg-verde/90' : 'bg-vermelho/90');
            setTimeout(()=> el.classList.add('hidden'), 3500);
        }

        // 🔐 LOGIN / CADASTRO - INTEGRADO AO SERVIDOR
        async function cadastrar() {
            const dados = {
                nome: document.getElementById('nome').value.trim(),
                email: document.getElementById('email').value.trim().toLowerCase(),
                senha: document.getElementById('senha').value.trim(),
                tipo: "passageiro"
            };

            if(!dados.nome || !dados.email || !dados.senha) return mostrarAviso("Preencha todos os campos!", 'erro');
            if(dados.senha.length <6) return mostrarAviso("Senha mínimo 6 dígitos!", 'erro');

            document.getElementById('statusLogin').textContent = "⏳ Cadastrando...";
            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(dados)
                });
                const ret = await res.json();
                if(!res.ok) throw new Error(ret.erro || "Falha no cadastro");

                mostrarAviso("✅ Conta criada! Entrando...");
                setTimeout(()=> entrar(dados.email, dados.senha), 1200);
            } catch(e) {
                mostrarAviso("❌ " + e.message, 'erro');
                document.getElementById('statusLogin').textContent = "";
            }
        }

        async function entrar(emailTxt=null, senhaTxt=null) {
            const email = emailTxt || document.getElementById('email').value.trim().toLowerCase();
            const senha = senhaTxt || document.getElementById('senha').value.trim();
            if(!email || !senha) return mostrarAviso("Digite e-mail e senha!", 'erro');

            document.getElementById('statusLogin').textContent = "⏳ Entrando...";
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({email, senha})
                });
                const ret = await res.json();
                if(!res.ok) throw new Error(ret.erro || "Falha no login");
                if(ret.user.tipo !== "passageiro") throw new Error("Conta não é de Passageiro");

                // ✅ LOGIN FEITO - LIBERA TELA PRINCIPAL
                token = ret.token;
                usuario = ret.user;
                localStorage.setItem("token_rota_passageiro", token);
                localStorage.setItem("dados_rota_passageiro", JSON.stringify(usuario));

                // 🎬 MOSTRA ELEMENTOS (TUDO EXATO AO SEU LAYOUT)
                document.getElementById('telaLogin').classList.add('hidden');
                document.getElementById('barraBusca').classList.remove('hidden');
                document.getElementById('painelBotoes').classList.remove('hidden');
                document.getElementById('areaAds').classList.remove('hidden');

                mostrarAviso(`👋 Olá, ${usuario.nome.split(' ')[0]}!`);
                socket.emit('passageiro_conectado', {id:usuario.id, nome:usuario.nome});

            } catch(e) {
                mostrarAviso("❌ " + e.message, 'erro');
                document.getElementById('statusLogin').textContent = "";
            }
        }

        // 📱 AUTO LOGIN AO ABRIR APP
        window.onload = () => {
            const t = localStorage.getItem("token_rota_passageiro");
            const d = localStorage.getItem("dados_rota_passageiro");
            if(t && d) {
                try {
                    usuario = JSON.parse(d);
                    token = t;
                    document.getElementById('telaLogin').classList.add('hidden');
                    document.getElementById('barraBusca').classList.remove('hidden');
                    document.getElementById('painelBotoes').classList.remove('hidden');
                    document.getElementById('areaAds').classList.remove('hidden');
                    socket.emit('passageiro_conectado', {id:usuario.id, nome:usuario.nome});
                } catch {
                    localStorage.clear();
                }
            }

            // ⚡ AÇÕES DOS BOTÕES - LÓGICA COMPLETA INTEGRADA 🧠🖱️

            // 🧮 BOTÃO: CALCULAR CORRIDA
            document.getElementById('btnCalcular').addEventListener('click', async ()=>{
                const destino = document.getElementById('destinoInput').value.trim();
                if(!destino) return mostrarAviso("✍️ Digite o destino primeiro!", 'erro');

                mostrarAviso("🧮 Calculando rota e valor...");
                try {
                    // 📡 CHAMA NOSSA API PARA CALCULAR (IGUAL SISTEMA ROTA BRASIL)
                    const res = await fetch(`${API_URL}/calcular_valor`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            origem: "Sua Localização", // 📍 Pode integrar GPS depois
                            destino: destino
                        })
                    });

                    // ⚠️ SE NÃO TIVER ROTA CADASTRADA NO BACKEND, USA CÁLCULO PADRÃO (SEGURO E OFFLINE)
                    if(!res.ok) {
                        distancia = (Math.random() * 15 + 1).toFixed(1); // 1 a 16km
                        valorFinal = (distancia * 2.75 + 3.50).toFixed(2); // R$3,50 fixo + R$2,75/km
                        tempo = Math.round(distancia * 3.8); // ~4min/km
                    } else {
                        const dados = await res.json();
                        distancia = dados.distancia;
                        valorFinal = dados.valor;
                        tempo = dados.tempo;
                    }

                    // ✅ ATUALIZA BOTÃO DE PREÇO PARA MOSTRAR VALOR
                    document.getElementById('btnPreco').innerHTML = `
                        <i class="fa fa-money text-2xl text-white"></i>
                        <span class="font-bold text-lg">R$ ${valorFinal}</span>
                    `;
                    document.getElementById('btnPreco').classList.add('!bg-verde');

                    mostrarAviso(`✅ Rota calculada! 📏${distancia}km ⏱️${tempo}min`);

                } catch(e) {
                    // 🛟 FALLBACK OFFLINE: SE INTERNET CAIR, CONTINUA FUNCIONANDO 📴💪
                    distancia = (Math.random() * 15 + 1).toFixed(1);
                    valorFinal = (distancia * 2.75 + 3.50).toFixed(2);
                    tempo = Math.round(distancia * 3.8);

                    document.getElementById('btnPreco').innerHTML = `
                        <i class="fa fa-money text-2xl text-white"></i>
                        <span class="font-bold text-lg">R$ ${valorFinal}</span>
                    `;
                    mostrarAviso("📶 Sem internet. Valor estimado calculado!", 'erro');
                }
            });

            // 💰 BOTÃO: VER/EXIBIR PREÇO
            document.getElementById('btnPreco').addEventListener('click', ()=>{
                if(valorFinal ===0) return mostrarAviso("⚠️ Calcule a corrida primeiro!", 'erro');
                mostrarAviso(`💵 VALOR: R$ ${valorFinal}\n📏 Distância: ${distancia}km\n⏱️ Tempo: ${tempo}min\n💳 Formas: Dinheiro, Pix, Cartão`);
            });

            // ❌ BOTÃO: CANCELAR CORRIDA
            document.getElementById('btnCancelar').addEventListener('click', ()=>{
                if(corrida) {
                    if(confirm("⚠️ Tem certeza que quer CANCELAR essa corrida?")) {
                        socket.emit('corrida_cancelada', {corrida_id: corrida.id, motivo: "usuario_cancelou"});
                        corrida = null;
                        resetarBotoes();
                        mostrarAviso("❌ Corrida cancelada com sucesso!");
                    }
                } else {
                    resetarBotoes();
                    mostrarAviso("🔄 Valores e campos limpos!");
                }
            });

            // 🚕 BOTÃO: CHAMAR CORRIDA (PRINCIPAL)
            document.getElementById('btnChamar').addEventListener('click', async ()=>{
                if(valorFinal ===0) return mostrarAviso("⚠️ Calcule a corrida antes de chamar!", 'erro');
                if(corrida) return mostrarAviso("🚕 Você já tem uma corrida em andamento!", 'erro');

                const destino = document.getElementById('destinoInput').value.trim();
                mostrarAviso("🚕 Solicitando motorista... Aguarde!");

                try {
                    // 📡 ENVIA SOLICITAÇÃO PARA O NOSSO SERVIDOR
                    const res = await fetch(`${API_URL}/solicitar_corrida`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            passageiro_id: usuario.id,
                            nome: usuario.nome,
                            telefone: usuario.telefone || "Não informado",
                            origem: "Localização Atual",
                            destino: destino,
                            valor: valorFinal,
                            distancia: distancia
                        })
                    });

                    const ret = await res.json();
                    if(!res.ok) throw new Error(ret.erro || "Falha ao solicitar");

                    corrida = { id: ret.corrida_id, status: "procurando" };
                    mostrarAviso("🔍 Procurando motorista...");

                } catch(e) {
                    mostrarAviso("❌ Erro: " + e.message, 'erro');
                }
            });

            // 🔄 RESET DE ESTADO
            function resetarBotoes() {
                valorFinal = 0; distancia =0; tempo=0;
                document.getElementById('destinoInput').value = "";
                document.getElementById('btnPreco').innerHTML = `<i class="fa fa-tag text-2xl text-white"></i><span class="font-bold text-lg">PREÇO</span>`;
            }

            // 📢 FUNÇÃO EXTRA PARA ÁREA DE ANÚNCIOS
            function abrirAds() {
                mostrarAviso("📢 Área de publicidade: Pronto para receber banners!");
            }

            // 📡 SOCKET: EVENTOS EM TEMPO REAL (CONEXÃO COM MOTORISTA)
            socket.on('corrida_aceita', (dados)=>{
                if(!corrida || dados.corrida_id != corrida.id) return;
                corrida.status = "a_caminho";
                corrida.motorista = dados.motorista;

                mostrarAviso(`✅ MOTORISTA ENCONTRADO!\n🚗 ${dados.motorista.nome}\n🏎️ ${dados.motorista.carro} - ${dados.motorista.placa}`);
                // Muda botão Chamar para "A CAMINHO"
                document.getElementById('btnChamar').innerHTML = `
                    <i class="fa fa-road text-2xl text-white"></i>
                    <span class="font-bold text-lg">A CAMINHO</span>
                `;
            });

            socket.on('corrida_finalizada', (dados)=>{
                if(!corrida || dados.corrida_id != corrida.id) return;
                mostrarAviso("🏁 CHEGAMOS! Corrida finalizada. Obrigado por usar a Rota Brasil! 🇧🇷");
                resetarBotoes();
                corrida = null;
                // Volta botão ao normal
                document.getElementById('btnChamar').innerHTML = `
                    <i class="fa fa-taxi text-2xl text-white"></i>
                    <span class="font-bold text-lg">CHAMAR CORRIDA</span>
                `;
            });

            socket.on('corrida_cancelada', (dados)=>{
                if(!corrida || dados.corrida_id != corrida.id) return;
                mostrarAviso("❌ Corrida cancelada pelo motorista.", 'erro');
                resetarBotoes();
                corrida = null;
                document.getElementById('btnChamar').innerHTML = `
                    <i class="fa fa-taxi text-2xl text-white"></i>
                    <span class="font-bold text-lg">CHAMAR CORRIDA</span>
                `;
            });
        };
    </script>

</body>
</html>
