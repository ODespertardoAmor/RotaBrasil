<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rota Brasil - Passageiro 🇧🇷❤️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBFw0Qbyq9zTFTd-tUY6dZWTgaQzuU17R8&libraries=places"></script>

    <style>
        :root {
            --verde: #22C55E;
            --azul: #3B82F6;
            --amarelo: #EAB308;
            --vermelho: #EF4444;
            --fundo: #0F172A;
            --card: #1E293B;
            --cardClaro: #334155;
            --texto: #F8FAFC;
            --borda: #475569;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%); color: var(--texto); min-height:100vh; padding:15px; }
        .container { max-width:480px; margin:0 auto; background:var(--card); border-radius:18px; padding:20px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); border:1px solid var(--borda); }

        .logo { text-align:center; margin-bottom:20px; }
        .logo h1 { background: linear-gradient(90deg, var(--verde), var(--azul)); -webkit-background-clip:text; color:transparent; font-size:26px; font-weight:800; }

        .input-group { position:relative; margin-bottom:12px; }
        .input-group i { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#aaa; }
        input { width:100%; padding:12px 12px 12px 40px; background:var(--cardClaro); border:1px solid var(--borda); border-radius:10px; color:white; font-size:15px; outline:none; }
        input:focus { border-color:var(--verde); box-shadow:0 0 0 3px rgba(34,197,94,0.2); }

        button { width:100%; padding:12px; border:none; border-radius:10px; font-weight:600; font-size:15px; cursor:pointer; transition:0.3s ease; margin:5px 0; display:flex; align-items:center; justify-content:center; gap:8px; }
        .btn-verde { background:linear-gradient(135deg, var(--verde), #16A34A); color:white; }
        .btn-verde:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(34,197,94,0.3); }
        .btn-vermelho { background:linear-gradient(135deg, var(--vermelho), #DC2626); color:white; }
        .btn-cinza { background:var(--cardClaro); color:white; border:1px solid var(--borda); }

        .card { background:var(--cardClaro); border-radius:12px; padding:15px; margin:12px 0; border:1px solid var(--borda); }
        .status-buscando { color:var(--amarelo); animation:pulse 1.5s infinite; }
        .status-aceito { color:var(--verde); animation:float 2s infinite alternate; }
        @keyframes pulse { 0%{transform:scale(1);opacity:0.8;}50%{transform:scale(1.1);opacity:1;}100%{transform:scale(1);opacity:0.8;} }
        @keyframes float { 0%{transform:translateY(0);}100%{transform:translateY(-5px);} }

        #mapa { width:100%; height:300px; border-radius:12px; margin:10px 0; border:2px solid var(--verde); }
        .alerta-sucesso { background:rgba(34,197,94,0.1); border:1px solid var(--verde); color:var(--verde); padding:10px; border-radius:8px; text-align:center; margin:10px 0; }
        .alerta-erro { background:rgba(239,68,68,0.1); border:1px solid var(--vermelho); color:var(--vermelho); padding:10px; border-radius:8px; text-align:center; margin:10px 0; }
    </style>
</head>
<body>

    <div class="container">
        <!-- LOGO -->
        <div class="logo">
            <h1>🚗 ROTA BRASIL 🇧🇷</h1>
            <p style="text-align:center; color:#aaa;">Sua viagem segura e rápida 🩷</p>
        </div>

        <!-- TELA LOGIN -->
        <div id="telaLogin">
            <h3 style="text-align:center; margin-bottom:15px;">Área do Passageiro 🧍</h3>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Seu E-mail">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="senha" placeholder="Sua Senha">
            </div>
            <button class="btn-verde" onclick="login()"><i class="fas fa-sign-in-alt"></i> Entrar</button>
            <button class="btn-cinza" onclick="abrirCadastro()"><i class="fas fa-user-plus"></i> Criar Conta</button>
            <div id="msgLogin" style="margin-top:10px;"></div>
        </div>

        <!-- TELA CADASTRO -->
        <div id="telaCadastro" style="display:none;">
            <h3 style="text-align:center; margin-bottom:15px;">Cadastrar Passageiro 📝</h3>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="nomeCad" placeholder="Nome Completo">
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="emailCad" placeholder="E-mail">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="senhaCad" placeholder="Senha">
            </div>
            <div class="input-group">
                <i class="fas fa-phone"></i>
                <input type="tel" id="telCad" placeholder="Telefone">
            </div>
            <button class="btn-verde" onclick="cadastrar()"><i class="fas fa-check"></i> Finalizar Cadastro</button>
            <button class="btn-cinza" onclick="voltarLogin()"><i class="fas fa-arrow-left"></i> Voltar</button>
            <div id="msgCad" style="margin-top:10px;"></div>
        </div>

        <!-- TELA PRINCIPAL -->
        <div id="telaPrincipal" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3>Olá, <span id="nomeUsuario"></span> 🩷</h3>
                <button class="btn-vermelho" style="width:auto; padding:6px 12px; font-size:12px;" onclick="sair()">Sair</button>
            </div>

            <div class="input-group">
                <i class="fas fa-map-marker-alt" style="color:var(--vermelho);"></i>
                <input type="text" id="origem" placeholder="Seu Local (GPS)" readonly>
            </div>
            <button class="btn-cinza" onclick="pegarLocalizacao()"><i class="fas fa-location-arrow"></i> Usar Minha Localização 📍</button>

            <div class="input-group" style="margin-top:10px;">
                <i class="fas fa-flag-checkered" style="color:var(--verde);"></i>
                <input type="text" id="destino" placeholder="Para onde vamos? 🚗💨">
            </div>

            <div id="cardValor" class="card" style="display:none;">
                <p>Distância: <span id="txtDist">-- km</span></p>
                <p style="font-size:22px; font-weight:bold; color:var(--verde); margin-top:5px;">Total: R$ <span id="txtValor">0,00</span></p>
                <button class="btn-verde" onclick="chamarCorrida()"><i class="fas fa-rocket"></i> CHAMAR ROTA BRASIL 🇧🇷</button>
            </div>

            <!-- STATUS DA CORRIDA -->
            <div id="cardStatus" class="card" style="display:none;">
                <div id="conteudoStatus"></div>
            </div>

            <!-- MAPA -->
            <div id="mapa" style="display:none;"></div>

            <!-- 📩 CAIXA DE MENSAGENS RECEBIDAS (SÓ PARA VOCÊ VER FUNCIONANDO) 💌👀 -->
            <div id="caixaMensagens" class="card" style="display:none; border-color:var(--azul);">
                <h4 style="color:var(--azul);"><i class="fas fa-envelope-open-text"></i> Mensagens do Sistema 📥</h4>
                <div id="listaMsgs" style="font-size:14px; max-height:120px; overflow-y:auto;"></div>
            </div>
        </div>
    </div>


    <script>
        // 🔗 CONEXÃO COM SEU SERVIDOR (MUDA O IP/URL SE ESTIVER ONLINE)
        const API_URL = "http://SEU_IP_OU_DOMINIO:5000"; // EX: "https://rotabrasil.onrender.com"
        const socket = io(API_URL, { transports: ['websocket', 'polling'] });

        let token = null;
        let usuario = null;
        let corridaAtual = null;
        let mapa = null;
        let markerMotorista = null;
        let markerEu = null;

        // ==================================================
        // 🟩🟩🟩 O MAIS IMPORTANTE: RECEBER FINALIZAÇÃO 📥🏁💖
        // ==================================================
        // AQUI O PASSAGEIRO "ESCUTA" O QUE VOCÊ ENVIOU DO PYTHON!!! 👂👂👂
        socket.on('viagem_finalizada', function(dados) {
            console.log("📥🔥 RECEBI DO BACKEND (SUA MENSAGEM):", dados); // MOSTRA TUDO NO CONSOLE F12

            // ✅ AQUI É ONDE LEMOS SEU JSON EXATO 📖✨
            if(dados.sucesso === true) { // <-- VERIFICA SE SUCESSO É TRUE (IGUAL VOCÊ FEZ) 🟢✅

                // 🎯 PEGA EXATAMENTE O QUE VOCÊ ESCREVEU NO PYTHON:
                let mensagemRecebida = dados.mensagem; // <<<<< AQUI ESTÁ: "Corrida finalizada" 🥹🫶📩
                let valorFinal = dados.valor_total;
                let distancia = dados.distancia_total;

                // 📥 1. ADICIONA NA CAIXA DE MENSAGENS (PARA VOCÊ VER)
                adicionarMensagem(`✅ ${mensagemRecebida} 🥳 | Valor: R$ ${valorFinal.toFixed(2)}`);

                // 🗣️ 2. FALA A MENSAGEM EM VOZ ALTA 🎤🔊
                falar(`${mensagemRecebida}! Obrigado por viajar com a Rota Brasil! O valor total foi R$ ${valorFinal.toFixed(2)} reais. 🇧🇷🩷`);

                // 🚨 3. MOSTRA ALERTA BONITO NA TELA 🖥️⚠️
                alert(`🏁 ${mensagemRecebida} ✅\n\n💰 Valor Total: R$ ${valorFinal.toFixed(2)}\n📏 Distância: ${distancia}\n\n🇧🇷 Obrigado pela preferência! Volte sempre! 🩷`);

                // 🔄 4. RESETA TELA PARA INICIO (CORRIDA ACABOU)
                resetarInterface();

            } else {
                // ❌ SE SUCESSO FOR FALSE
                adicionarMensagem(`❌ ERRO: ${dados.mensagem}`);
                alert(`❌ ${dados.mensagem}`);
            }
        });

        // 📡 OUTROS EVENTOS IMPORTANTES
        socket.on('corrida_aceita', function(dados) {
            if(dados.sucesso) {
                corridaAtual = dados.corrida_id;
                // ENTRA NA SALA PARA RECEBER A FINALIZAÇÃO DEPOIS 🚪🗝️
                socket.emit('entrar_na_sala', { corrida_id: corridaAtual });

                adicionarMensagem(`🚗 ${dados.mensagem}`);
                falar(dados.mensagem);
                mostrarStatusAceito(dados);
            }
        });

        socket.on('localizacao_motorista', function(dados) {
            if(dados.sucesso && mapa && markerMotorista) {
                markerMotorista.setPosition(new google.maps.LatLng(dados.lat, dados.lng));
                atualizarRota();
            }
        });

        socket.on('corrida_cancelada', function(dados) {
            adicionarMensagem(`😔 ${dados.mensagem}`);
            falar(dados.mensagem);
            resetarInterface();
        });

        // 🛠️ FUNÇÕES GERAIS
        function falar(texto) {
            const voz = new SpeechSynthesisUtterance(texto);
            voz.lang = 'pt-BR'; voz.rate = 1.2; voz.volume = 1;
            speechSynthesis.speak(voz);
        }

        function adicionarMensagem(texto) {
            const lista = document.getElementById('listaMsgs');
            const div = document.createElement('div');
            div.style.padding = '4px 0';
            div.style.borderBottom = '1px solid var(--borda)';
            div.innerHTML = `💌 ${texto}`;
            lista.appendChild(div);
            document.getElementById('caixaMensagens').style.display = 'block';
        }

        function resetarInterface() {
            corridaAtual = null;
            document.getElementById('cardStatus').style.display = 'none';
            document.getElementById('mapa').style.display = 'none';
            document.getElementById('cardValor').style.display = 'block';
            document.getElementById('conteudoStatus').innerHTML = '';
            if(markerMotorista) markerMotorista.setMap(null);
            markerMotorista = null;
        }

        // 🔐 LOGIN / CADASTRO
        async function login() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const msg = document.getElementById('msgLogin');

            msg.innerHTML = "⏳ Entrando...";
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({email, senha})
                });
                const dados = await res.json();

                if(dados.sucesso) {
                    msg.innerHTML = `<div class="alerta-sucesso">${dados.mensagem} 🩷✅</div>`;
                    token = dados.token;
                    usuario = dados.usuario;
                    document.getElementById('nomeUsuario').innerText = usuario.nome.split(' ')[0];
                    document.getElementById('telaLogin').style.display = 'none';
                    document.getElementById('telaPrincipal').style.display = 'block';
                } else {
                    msg.innerHTML = `<div class="alerta-erro">${dados.mensagem} ❌</div>`;
                }
            } catch(e) {
                msg.innerHTML = `<div class="alerta-erro">Erro conexão 🌐❌</div>`;
            }
        }

        async function cadastrar() {
            const dados = {
                nome: document.getElementById('nomeCad').value,
                email: document.getElementById('emailCad').value,
                senha: document.getElementById('senhaCad').value,
                telefone: document.getElementById('telCad').value,
                tipo: 'passageiro'
            };
            const msg = document.getElementById('msgCad');

            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(dados)
                });
                const resp = await res.json();
                msg.innerHTML = resp.sucesso ? `<div class="alerta-sucesso">${resp.mensagem}</div>` : `<div class="alerta-erro">${resp.mensagem}</div>`;
                if(resp.sucesso) setTimeout(()=>{voltarLogin()},1500);
            } catch(e) { msg.innerHTML = `<div class="alerta-erro">Erro</div>`; }
        }

        function abrirCadastro() { document.getElementById('telaLogin').style.display='none'; document.getElementById('telaCadastro').style.display='block'; }
        function voltarLogin() { document.getElementById('telaCadastro').style.display='none'; document.getElementById('telaLogin').style.display='block'; }
        function sair() { localStorage.clear(); window.location.reload(); }

        // 📍 GPS E CORRIDA
        function pegarLocalizacao() {
            if(!navigator.geolocation) return alert("GPS não suportado 😕");
            falar("Buscando sua localização 📍");
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                document.getElementById('origem').value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                calcularValor(lat,lng);
                falar("Localização capturada ✅🩷");
            }, err => alert("Ative o GPS! 📍⚠️"), {enableHighAccuracy:true});
        }

        function calcularValor(lat,lng) {
            let km = (Math.random() * 10 + 1).toFixed(1);
            let val = (4.5 + (parseFloat(km)*1.2)).toFixed(2);
            document.getElementById('txtDist').innerText = km + " km";
            document.getElementById('txtValor').innerText = val;
            document.getElementById('cardValor').style.display = 'block';
        }

        async function chamarCorrida() {
            const origem = document.getElementById('origem').value;
            const destino = document.getElementById('destino').value;
            const valor = parseFloat(document.getElementById('txtValor').innerText);
            const dist = document.getElementById('txtDist').innerText;

            if(!origem || !destino) return alert("Preencha origem e destino 📍🏁");

            falar("Buscando motoristas, aguarde... 🔍🚗");
            document.getElementById('cardValor').innerHTML = `<p class="status-buscando" style="text-align:center; font-size:18px;"><i class="fas fa-spinner fa-spin"></i> PROCURANDO MOTORISTAS...</p>`;

            try {
                const res = await fetch(`${API_URL}/nova_corrida`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({passageiro_id: usuario.id, origem, destino, valor, distancia: dist})
                });
                const dados = await res.json();
                if(dados.sucesso) {
                    corridaAtual = dados.corrida_id;
                    adicionarMensagem(dados.mensagem);
                    mostrarStatusBuscando();
                } else {
                    alert(dados.mensagem);
                    location.reload();
                }
            } catch(e) { alert("Erro ao chamar corrida 🌐❌"); location.reload(); }
        }

        function mostrarStatusBuscando() {
            document.getElementById('cardStatus').style.display = 'block';
            document.getElementById('conteudoStatus').innerHTML = `
                <div style="text-align:center;">
                    <i class="fas fa-car-side status-icon status-buscando" style="font-size:40px;"></i>
                    <h3>Procurando Motoristas...</h3>
                    <p style="color:#aaa;">Aguarde um instante 🕒🩷</p>
                    <button class="btn-vermelho" onclick="cancelar()">❌ Cancelar</button>
                </div>`;
        }

        function mostrarStatusAceito(dados) {
            document.getElementById('cardStatus').style.display = 'block';
            document.getElementById('mapa').style.display = 'block';
            initMapa();
            document.getElementById('conteudoStatus').innerHTML = `
                <div style="text-align:center;">
                    <i class="fas fa-male status-icon status-aceito" style="font-size:40px;"></i>
                    <h3>Motorista a Caminho! 🚗💨</h3>
                    <p><strong>Nome:</strong> ${dados.motorista_nome}</p>
                    <p><strong>Carro:</strong> ${dados.carro} | Placa: <span style="background:var(--azul); padding:2px 6px; border-radius:4px;">${dados.placa}</span></p>
                    <p id="distMotorista" style="color:var(--verde); font-weight:bold;">Calculando distância...</p>
                    <button class="btn-vermelho" onclick="cancelar()">❌ Cancelar Corrida</button>
                </div>`;
        }

        // 🗺️ MAPA
        function initMapa() {
            if(!mapa) {
                mapa = new google.maps.Map(document.getElementById('mapa'), {
                    center: {lat:-23.5505, lng:-46.6333}, zoom:14,
                    styles: [{featureType:"all",elementType:"geometry",stylers:[{color:"#1E293B"}]}]
                });
                markerEu = new google.maps.Marker({mapa:mapa, position:{lat:-23.5505,lng:-46.6333}, icon:'https://cdn-icons-png.flaticon.com/512/1077/1077063.png'});
                markerMotorista = new google.maps.Marker({mapa:mapa, position:{lat:-23.5505,lng:-46.6333}, icon:'https://cdn-icons-png.flaticon.com/512/2979/2979992.png'});
            }
        }

        async function cancelar() {
            if(!corridaAtual) return;
            socket.emit('cancelar_corrida', {corrida_id: corridaAtual, motivo: "Cancelado pelo passageiro 🫷😔"});
            resetarInterface();
        }

        // MANTER LOGADO
        if(localStorage.getItem("user")) {
            const d = JSON.parse(localStorage.getItem("user"));
            usuario = d.usuario; token = d.token;
            document.getElementById('nomeUsuario').innerText = usuario.nome.split(' ')[0];
            document.getElementById('telaLogin').style.display = 'none';
            document.getElementById('telaPrincipal').style.display = 'block';
        }
    </script>
</body>
</html>
