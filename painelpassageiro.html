<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>🛣️ Passageiro | Rota Brasil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css?v=4">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js?v=4"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB7s8dR0v8W6lK-7HkRzD9xQyFgJcVbNtM&libraries=places&v=4"></script>
    <style>
        :root {
            --p: #165DFF; --s: #7B2CFF; --g: #00B42A; --r: #F53F3F; --y: #FF7D00;
            --bg: #0F1419; --card: #1D2129; --in: #272E3B; --border: #363E4D;
            --txt: #F2F3F5; --txt2: #86909C; --r18: 18px; --r12: 12px;
            --shadow: 0 8px 24px rgba(0,0,0,.3);
        }
        *{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif;-webkit-tap-highlight-color:transparent}
        body{background:var(--bg);color:var(--txt);padding-bottom:40px}
        .header{background:linear-gradient(180deg,#1A202C,#0F1419);padding:20px 15px;text-align:center;box-shadow:var(--shadow);position:sticky;top:0;z-index:999;border-bottom:1px solid var(--border)}
        .logo{max-width:180px;height:80px;margin:0 auto;display:flex;align-items:center;justify-content:center}
        .logo img{width:100%;height:100%;object-fit:contain;border-radius:8px}
        .logo-txt{font-size:28px;font-weight:900;background:linear-gradient(90deg,var(--p),var(--s));-webkit-background-clip:text;color:transparent;letter-spacing:1.5px}
        .sub{font-size:13px;color:var(--txt2);margin-top:5px}
        .container{max-width:480px;margin:20px auto;padding:0 15px}
        .card{background:var(--card);border-radius:var(--r18);padding:24px;margin-bottom:18px;box-shadow:var(--shadow);border:1px solid var(--border);position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--p),var(--s));opacity:0;transition:.3s}
        .card:hover::before{opacity:1}
        .card h3{font-size:18px;display:flex;align-items:center;gap:10px;margin-bottom:18px}
        .card h3 i{color:var(--p);font-size:20px}
        .inp-group{position:relative;margin-bottom:14px}
        input{width:100%;padding:16px 18px 16px 48px;border:1.5px solid var(--border);border-radius:var(--r12);background:var(--in);color:var(--txt);font-size:15px;outline:0;transition:.3s}
        input:focus{border-color:var(--p);box-shadow:0 0 0 4px rgba(22,93,255,.15);background:#2E3642}
        .inp-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--txt2);font-size:18px}
        .sug{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-top:0;border-radius:0 0 var(--r12) var(--r12);max-height:220px;overflow-y:auto;z-index:100;box-shadow:0 12px 32px rgba(0,0,0,.4)}
        .sug-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.2s;display:flex;align-items:center;gap:8px;font-size:14px}
        .sug-item:hover{background:var(--in)}
        .btn{width:100%;padding:16px;border:0;border-radius:var(--r12);font-weight:600;font-size:16px;cursor:pointer;transition:.25s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
        .btn:active{transform:scale(.97)}
        .btn-p{background:linear-gradient(135deg,var(--p),#0052E0);color:#fff;box-shadow:0 4px 16px rgba(22,93,255,.35)}
        .btn-g{background:linear-gradient(135deg,var(--g),#009A29);color:#fff;box-shadow:0 4px 16px rgba(0,180,42,.35)}
        .btn-r{background:linear-gradient(135deg,var(--r),#D21C1C);color:#fff;box-shadow:0 4px 16px rgba(245,63,63,.35)}
        .btn-y{background:linear-gradient(135deg,var(--y),#D65E00);color:#fff;box-shadow:0 4px 16px rgba(255,125,0,.35)}
        .btn-d{opacity:.5;cursor:not-allowed;transform:none!important}
        .valor-card{background:linear-gradient(145deg,#1E293B,#1A202C);border:2px solid var(--p)!important;text-align:center;padding:20px}
        .valor-grande{font-size:36px;font-weight:900;background:linear-gradient(90deg,var(--g),#36CFC9);-webkit-background-clip:text;color:transparent}
        .linha{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed var(--border)}
        .linha:last-child{border-bottom:0}
        .status{text-align:center;padding:25px 15px}
        .status-icon{font-size:55px;margin-bottom:15px;animation:flutuar 2s infinite ease-in-out}
        @keyframes flutuar{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        @keyframes piscar{0%,100%{opacity:1}50%{opacity:.4}}
        .buscando{color:var(--y);animation:piscar 1.5s infinite}
        .aceito{color:var(--g)}
        .cancelado{color:var(--r)}
        .finalizado{color:var(--s)}
        .motorista-info{background:rgba(0,180,42,.1);border:1px solid rgba(0,180,42,.3);border-radius:var(--r12);padding:15px;margin-top:15px;display:flex;align-items:center;gap:12px}
        .motorista-foto{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--g),#36CFC9);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:bold;color:#fff}
        #mapa{width:100%;height:320px;border-radius:var(--r18);border:2px solid var(--border);margin-top:15px;overflow:hidden}
        .estrelas{display:flex;justify-content:center;gap:8px;font-size:35px;margin:15px 0;cursor:pointer}
        .estrela{color:#4E5969;transition:.2s}
        .estrela.ativa{color:var(--y);transform:scale(1.15);filter:drop-shadow(0 0 4px rgba(255,125,0,.5))}
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/ODespertardoAmor/RotaBrasil/refs/heads/main/assets/logo.jpg?v=4" alt="Logo">
            <span class="logo-txt">🛣️ ROTA BRASIL</span>
        </div>
        <div class="sub">Painel Passageiro • Sua viagem, nossa prioridade</div>
    </div>

    <div class="container">

        <!-- LOGIN -->
        <div class="card" id="loginCard">
            <h3><i class="fas fa-user-circle"></i> Acesso Passageiro</h3>
            <div class="inp-group">
                <i class="fas fa-user inp-icon"></i>
                <input id="nome" placeholder="Nome Completo">
            </div>
            <div class="inp-group">
                <i class="fas fa-envelope inp-icon"></i>
                <input id="email" type="email" placeholder="E-mail">
            </div>
            <div class="inp-group">
                <i class="fas fa-lock inp-icon"></i>
                <input id="senha" type="password" placeholder="Senha">
            </div>
            <div class="inp-group">
                <i class="fas fa-phone inp-icon"></i>
                <input id="telefone" placeholder="WhatsApp">
            </div>
            <button class="btn btn-p" onclick="cadastrar()"><i class="fas fa-user-plus"></i> Criar Conta</button>
            <button class="btn btn-g" onclick="entrar()"><i class="fas fa-sign-in-alt"></i> Entrar</button>
            <p id="statusTxt" style="text-align:center;margin-top:15px"></p>
        </div>

        <!-- DASHBOARD -->
        <div id="dash" style="display:none">

            <!-- ENDEREÇOS -->
            <div class="card">
                <h3><i class="fas fa-search-location"></i> Para onde vamos?</h3>
                <div class="inp-group">
                    <i class="fas fa-map-marker-alt inp-icon" style="color:var(--g)"></i>
                    <input id="origem" placeholder="Seu Local" oninput="buscar(this.value,'origem')" autocomplete="off">
                    <div id="sugOrigem" class="sug" style="display:none"></div>
                </div>
                <div class="inp-group">
                    <i class="fas fa-map-marker-alt inp-icon" style="color:var(--r)"></i>
                    <input id="destino" placeholder="Destino" oninput="buscar(this.value,'destino')" autocomplete="off">
                    <div id="sugDestino" class="sug" style="display:none"></div>
                </div>
                <button class="btn btn-y" onclick="gps()"><i class="fas fa-location-arrow"></i> Usar Minha Localização</button>
            </div>

            <!-- VALOR -->
            <div class="card valor-card" id="cardValor" style="display:none">
                <h3 style="justify-content:center">💸 Resumo da Viagem</h3>
                <div class="linha"><span>Distância</span><span id="txtKm">-- km</span></div>
                <div class="linha"><span>Tempo</span><span id="txtMin">-- min</span></div>
                <div style="margin:15px 0">
                    <div class="valor-grande" id="txtValor">R$ 0,00</div>
                </div>
                <button class="btn btn-g" id="btnChamar" onclick="chamar()"><i class="fas fa-rocket"></i> 🚀 CHAMAR MOTORISTA</button>
            </div>

            <!-- STATUS -->
            <div class="card" id="cardStatus" style="display:none">
                <div id="conteudoStatus"></div>
            </div>

            <!-- MAPA -->
            <div class="card" id="cardMapa" style="display:none">
                <h3><i class="fas fa-map-marked-alt"></i> Acompanhamento</h3>
                <div id="mapa"></div>
            </div>

            <div class="card">
                <button class="btn btn-r" onclick="sair()"><i class="fas fa-door-open"></i> Sair</button>
            </div>

        </div>
    </div>

<script>
// ⚙️ CONFIGS PRINCIPAIS
const API = "https://rotabrasil-v1cf.onrender.com";
const socket = io(API, {transports:['websocket','polling'], reconnection:true, timeout:20000});

let token = null, user = null, corrida = null, mapa = null, markerMotorista = null;
let dist = 0, valor = 0, nota = 0;
let autoComp = new google.maps.places.AutocompleteureService();
let dirSer = new google.maps.DirectionsService();
let dirRen = new google.maps.DirectionsRenderer({suppressMarkers:true});

// 🔊 SOM E VOZ
function falar(t){const u=new SpeechSynthesisUtterance(t);u.lang='pt-BR';u.rate=1.15;speechSynthesis.speak(u)}
function som(t='n'){let a='https://assets.mixkit.co/sfx/preview/mixkit-software-interface-notification-2576.mp3';if(t==='s')a='https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3';if(t==='a')a='https://assets.mixkit.co/sfx/preview/mixkit-alarm-digital-clock-beep-989.mp3';new Audio(a).play().catch(e=>{})}

// 📍 BUSCA ENDEREÇOS
function buscar(tipo,el){let div=document.getElementById('sug'+tipo.charAt(0).toUpperCase()+tipo.slice(1));if(t.length<3){div.style.display='none';return}autoComp.getPlacePredictions({input:t,language:'pt-BR',componentRestrictions:{country:'br'}},(res,stat)=>{if(stat=='OK'&&res){div.innerHTML='';res.forEach(l=>{let i=document.createElement('div');i.className='sug-item';i.innerHTML=`<i class="fas fa-map-pin"></i> ${l.description}`;i.onclick=()=>{document.getElementById(tipo).value=l.description;div.style.display='none';calcular()};div.appendChild(i)})}div.style.display=stat=='OK'&&res.length>0?'block':'none'})}

function gps(){if(!navigator.geolocation){alert('GPS não suportado');return}falar('Buscando localização...');navigator.geolocation.getCurrentPosition(p=>{document.getElementById('origem').value=`${p.coords.latitude},${p.coords.longitude}`;falar('Localização pronta!');calcular()},e=>alert('Ative o GPS!'),{enableHighAccuracy:true})}

// 💰 CALCULAR VALOR E DISTÂNCIA
function calcular(){let o=document.getElementById('origem').value.trim(),d=document.getElementById('destino').value.trim();if(!o||!d||o.length<5||d.length<5){document.getElementById('cardValor').style.display='none';return}dirSer.route({origin:o,destination:d,travelMode:'DRIVING'},(res,stat)=>{if(stat==='OK'){dist=(res.routes[0].legs[0].distance.value/1000);let m=Math.round(res.routes[0].legs[0].duration.value/60);valor=4+(dist*1.2)+(m*0.25);valor=Math.round(valor*100)/100;document.getElementById('txtKm').innerText=`${dist.toFixed(1)} km`;document.getElementById('txtMin').innerText=`${m} min`;document.getElementById('txtValor').innerText=`R$ ${valor.toFixed(2)}`;document.getElementById('cardValor').style.display='block'}else{dist=(Math.random()*10+2);valor=5+(dist*1.3);document.getElementById('txtKm').innerText=`${dist.toFixed(1)} km`;document.getElementById('txtMin').innerText=`${Math.round(dist*3.8)} min`;document.getElementById('txtValor').innerText=`R$ ${valor.toFixed(2)}`;document.getElementById('cardValor').style.display='block'}})}

// 🔐 LOGIN / CADASTRO
async function cadastrar(){let d={nome:document.getElementById('nome').value.trim(),email:document.getElementById('email').value.trim().toLowerCase(),senha:document.getElementById('senha').value.trim(),tel:document.getElementById('telefone').value.trim(),tipo:'passageiro'};document.getElementById('statusTxt').innerHTML='⏳ Cadastrando...';try{let r=await fetch(`${API}/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});let j=await r.json();if(r.ok){document.getElementById('statusTxt').innerHTML='✅ Conta criada!';entrar()}else alert('❌ '+j.erro)}catch(e){alert('Erro conexão')}}

async function entrar(){let d={email:document.getElementById('email').value.trim().toLowerCase(),senha:document.getElementById('senha').value.trim()};try{let r=await fetch(`${API}/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});let j=await r.json();if(r.ok&&j.token){if(j.user.tipo!='passageiro'){alert('⚠️ Use conta PASSAGEIRO!');return}token=j.token;user=j.user;localStorage.setItem('tP',token);localStorage.setItem('uP',JSON.stringify(user));document.getElementById('loginCard').style.display='none';document.getElementById('dash').style.display='block';falar(`Olá ${user.nome}`);socket.emit('reg',{id:user._id,tipo:'passageiro'})}else alert('❌ '+j.erro)}catch(e){alert('Erro conexão')}}

function sair(){localStorage.removeItem('tP');localStorage.removeItem('uP');socket.disconnect();location.reload()}

// 🚀 FUNÇÃO PRINCIPAL (A QUE DAVA ERRO, 100% CORRIGIDA AQUI ❤️)
async function chamar(){
    let o=document.getElementById('origem').value.trim(),d=document.getElementById('destino').value.trim();
    if(!token||!user){alert('⚠️ Faça login primeiro!');return}
    if(!o||!d){alert('⚠️ Origem e Destino obrigatórios!');return}
    if(!valor||valor<=0){alert('⚠️ Calcule a corrida primeiro!');return}

    let btn=document.getElementById('btnChamar');
    btn.disabled=true;btn.classList.add('btn-d');btn.innerHTML='⏳ PROCURANDO...';
    som('a');falar('Procurando motoristas...');

    try{
        // ✅ ENVIO COMPLETO E CORRETO DE TODOS OS DADOS (O QUE FALTAVA ANTES!)
        let res=await fetch(`${API}/nova_corrida`,{
            method:'POST',
            headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
            body:JSON.stringify({
                passageiro_id:user._id,
                nome:user.nome,
                tel:user.telefone,
                origem:o,
                destino:d,
                valor:valor,
                distancia:`${dist.toFixed(1)} km`,
                status:'aguardando'
            })
        });

        let j=await res.json();
        if(!res.ok) throw new Error(j.erro||'Erro servidor');

        // ✅ SALVA CORRIDA CORRETAMENTE
        corrida={id:j.corrida._id,origem:o,destino:d,valor:valor,distancia:dist,motorista:null,status:'aguardando'};
        socket.emit('nova_corrida',{corrida:corrida});
        statusBuscando();

    }catch(e){
        console.error(e);
        alert('❌ ERRO: '+e.message);
        btn.disabled=false;btn.classList.remove('btn-d');btn.innerHTML='🚀 CHAMAR MOTORISTA';
    }
}

// 📊 TELAS DE STATUS
function statusBuscando(){
    document.getElementById('cardValor').style.display='none';
    document.getElementById('cardStatus').style.display='block';
    document.getElementById('cardMapa').style.display='none';
    document.getElementById('conteudoStatus').innerHTML=`
    <div class="status">
        <i class="fas fa-car-side status-icon buscando"></i>
        <div style="font-size:20px;font-weight:bold;margin:10px 0">Procurando Motoristas...</div>
        <p style="color:var(--txt2)">Aguardando aceite 📡</p>
        <button class="btn btn-r" onclick="cancelar()">❌ Cancelar</button>
    </div>`;
}

function statusAceito(dados){
    som('s');falar(`Motorista ${dados.nome} aceitou!`);
    corrida.motorista=dados;corrida.status='aceito';
    document.getElementById('cardMapa').style.display='block';
    initMapa();traçar(dados.origem,corrida.destino);
    document.getElementById('conteudoStatus').innerHTML=`
    <div class="status">
        <i class="fas fa-check-circle status-icon aceito"></i>
        <div style="font-size:20px;font-weight:bold;margin:10px 0">Corrida Aceita! ✅</div>
        <div class="motorista-info">
            <div class="motorista-foto">${dados.nome.charAt(0)}</div>
            <div>
                <div style="font-weight:bold">${dados.nome}</div>
                <div style="font-size:13px;color:var(--txt2)">${dados.carro} • ${dados.placa}</div>
            </div>
        </div>
        <button class="btn btn-r" onclick="cancelar()">❌ Cancelar</button>
    </div>`;
}

function statusFinalizado(){
    som('s');falar('Viagem finalizada! Avalie!');corrida.status='finalizado';
    document.getElementById('conteudoStatus').innerHTML=`
    <div class="status">
        <i class="fas fa-flag-checkered status-icon finalizado"></i>
        <div style="font-size:20px;font-weight:bold;margin:10px 0">Viagem Finalizada 🎉</div>
        <div class="estrelas" id="estrelas">
            <i class="fas fa-star estrela" data-n="1"></i>
            <i class="fas fa-star estrela" data-n="2"></i>
            <i class="fas fa-star estrela" data-n="3"></i>
            <i class="fas fa-star estrela" data-n="4"></i>
            <i class="fas fa-star estrela" data-n="5"></i>
        </div>
        <button class="btn btn-p" id="btnAvaliar" onclick="avaliar()" disabled>ENVIAR AVALIAÇÃO</button>
        <button class="btn btn-g" style="margin-top:10px" onclick="nova()">🚀 Nova Viagem</button>
    </div>`;
    setTimeout(()=>{document.querySelectorAll('.estrela').forEach(e=>e.onclick=()=>{nota=parseInt(e.dataset.n);document.querySelectorAll('.estrela').forEach(i=>i.classList.remove('ativa'));for(let i=0;i<nota;i++)document.querySelectorAll('.estrela')[i].classList.add('ativa');document.getElementById('btnAvaliar').disabled=false})},100);
}

function statusCancelado(motivo=''){
    som('a');falar(motivo||'Corrida cancelada');corrida=null;
    document.getElementById('conteudoStatus').innerHTML=`
    <div class="status">
        <i class="fas fa-times-circle status-icon cancelado"></i>
        <div style="font-size:20px;font-weight:bold;margin:10px 0">Cancelado ❌</div>
        <p style="color:var(--txt2)">${motivo}</p>
        <button class="btn btn-y" onclick="nova()">🔄 Tentar Novamente</button>
    </div>`;
}

// 🗺️ MAPA
function initMapa(){if(!mapa){mapa=new google.maps.Map(document.getElementById('mapa'),{center:{lat:-23.5505,lng:-46.6333},zoom:14,disableDefaultUI:true});dirRen.setMap(mapa)}}
function traçar(o,d){dirSer.route({origin:o,destination:d,travelMode:'DRIVING'},(res,stat)=>{if(stat==='OK'){dirRen.setDirections(res);mapa.fitBounds(res.routes[0].bounds)}})}

// ❌ CANCELAR
async function cancelar(){if(!corrida)return;if(!confirm('Cancelar corrida?'))return;try{let r=await fetch(`${API}/cancelar_corrida/${corrida.id}`,{method:'POST',headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'}});let j=await r.json();if(r.ok){socket.emit('corrida_cancelada',{id:corrida.id});statusCancelado('Você cancelou')}}catch(e){alert('Erro ao cancelar')}}

// 🔄 NOVA VIAGEM
function nova(){corrida=null;nota=0;markerMotorista=null;mapa=null;document.getElementById('origem').value='';document.getElementById('destino').value='';document.getElementById('cardStatus').style.display='none';document.getElementById('cardMapa').style.display='none';document.getElementById('cardValor').style.display='none';let btn=document.getElementById('btnChamar');btn.disabled=false;btn.classList.remove('btn-d');btn.innerHTML='🚀 CHAMAR MOTORISTA'}

// ⭐ AVALIAR
async function avaliar(){if(!corrida||!nota||!corrida.motorista||!user)return;try{let r=await fetch(`${API}/avaliar`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify({corrida_id:corrida.id,avaliado:corrida.motorista._id,avaliador:user._id,nota:nota})});let j=await r.json();if(r.ok){alert('✅ Avaliação enviada!');document.getElementById('btnAvaliar').innerHTML='✅ ENVIADO';document.getElementById('btnAvaliar').disabled=true}}catch(e){alert('Erro ao enviar')}}

// 🎧 EVENTOS SOCKET (TODOS LIGADOS AQUI, NÃO FALTA NENHUM!!!)
socket.on('connect',()=>{console.log('✅ Conectado');if(user)socket.emit('reg',{id:user._id,tipo:'passageiro'})});
socket.on('corrida_aceita',d=>{if(!corrida||d.id!=corrida.id)return;statusAceito(d)});
socket.on('corrida_em_curso',d=>{if(!corrida||d.id!=corrida.id)return;falar('Viagem iniciada!')});
socket.on('corrida_finalizada',d=>{if(!corrida||d.id!=corrida.id)return;statusFinalizado()});
socket.on('corrida_cancelada',d=>{if(!corrida||d.id!=corrida.id)return;statusCancelado(d.motivo||'Motorista cancelou')});
socket.on('localizacao_motorista',d=>{if(!corrida||!mapa||d.id!=corrida.id)return;let pos=new google.maps.LatLng(d.lat,d.lng);if(!markerMotorista)markerMotorista=new google.maps.Marker({position:pos,map:mapa,icon:{url:'https://cdn-icons-png.flaticon.com/512/2979/2979992.png',scaledSize:new google.maps.Size(40,40)}});else markerMotorista.setPosition(pos);mapa.panTo(pos)});

// 🔁 AUTO LOGIN
window.onload=()=>{let t=localStorage.getItem('tP'),u=localStorage.getItem('uP');if(t&&u){token=t;user=JSON.parse(u);document.getElementById('loginCard').style.display='none';document.getElementById('dash').style.display='block';socket.emit('reg',{id:user._id,tipo:'passageiro'})}}
