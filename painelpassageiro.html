<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 👇 FORÇA NAVEGADOR A USAR VERSÃO NOVA 👇 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>🛣️ Passageiro | Rota Brasil</title>
    <!-- ✅ LINK DO FONT-AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css?v=2">
    <!-- ✅ SCRIPTS EXTERNOS -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js?v=2"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB7s8dR0v8W6lK-7HkRzD9xQyFgJcVbNtM&libraries=places&v=2"></script>

    <style>
        :root {
            --cor-primaria: #165DFF;        /* Azul Principal */
            --cor-secundaria: #7B2CFF;      /* Roxo Degradê */
            --cor-sucesso: #00B42A;         /* Verde */
            --cor-perigo: #F53F3F;          /* Vermelho */
            --cor-aviso: #FF7D00;           /* Laranja */
            --cor-fundo: #0F1419;           /* Fundo Escuro */
            --cor-card: #1D2129;            /* Card Principal */
            --cor-input: #272E3B;           /* Input */
            --cor-borda: #363E4D;           /* Bordas */
            --cor-texto: #F2F3F5;           /* Texto Branco/Cinza Claro */
            --cor-texto-secundario: #86909C;/* Texto Cinza Médio */
            --sombra: 0 8px 24px rgba(0,0,0,0.3);
            --sombra-forte: 0 12px 32px rgba(0,0,0,0.4);
            --borda-radius: 18px;
            --borda-radius-pq: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--cor-fundo) !important;
            color: var(--cor-texto) !important;
            line-height: 1.6;
            padding-bottom: 40px;
        }

        .header-logo {
            background: linear-gradient(180deg, #1A202C 0%, #0F1419 100%);
            padding: 20px 15px;
            text-align: center;
            box-shadow: var(--sombra);
            position: sticky;
            top: 0;
            z-index: 9999;
            border-bottom: 1px solid var(--cor-borda);
        }

        .logo-container {
            max-width: 180px;
            height: 80px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .logo-container:hover {
            transform: scale(1.05);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }

        .logo-texto {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(90deg, var(--cor-primaria), var(--cor-secundaria));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1.5px;
        }

        .sub-header {
            text-align: center;
            color: var(--cor-texto-secundario);
            font-size: 13px;
            margin-top: 5px;
            font-weight: 500;
        }

        .container {
            max-width: 480px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .card {
            background-color: var(--cor-card) !important;
            border-radius: var(--borda-radius);
            padding: 24px;
            margin-bottom: 18px;
            box-shadow: var(--sombra);
            border: 1px solid var(--cor-borda) !important;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--cor-primaria), var(--cor-secundaria));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card h3 {
            color: var(--cor-texto);
            margin-bottom: 18px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .card h3 i {
            color: var(--cor-primaria);
            font-size: 20px;
        }

        .input-group {
            position: relative;
            margin-bottom: 14px;
        }

        input {
            width: 100%;
            padding: 16px 18px 16px 48px;
            border: 1.5px solid var(--cor-borda) !important;
            border-radius: var(--borda-radius-pq);
            background-color: var(--cor-input) !important;
            color: var(--cor-texto) !important;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        input:focus {
            border-color: var(--cor-primaria) !important;
            box-shadow: 0 0 0 4px rgba(22, 93, 255, 0.15);
            background-color: #2E3642 !important;
        }

        input::placeholder {
            color: var(--cor-texto-secundario);
            font-weight: 400;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--cor-texto-secundario);
            font-size: 18px;
            z-index: 2;
        }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: var(--cor-card);
            border: 1px solid var(--cor-borda);
            border-top: none;
            border-radius: 0 0 var(--borda-radius-pq) var(--borda-radius-pq);
            max-height: 220px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: var(--sombra-forte);
        }

        .suggestion-item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--cor-borda);
            cursor: pointer;
            transition: background 0.2s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .suggestion-item i {
            color: var(--cor-sucesso);
            font-size: 16px;
        }

        .suggestion-item:hover {
            background-color: var(--cor-input);
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--borda-radius-pq);
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--cor-primaria), #0052E0) !important;
            color: white !important;
            box-shadow: 0 4px 16px rgba(22, 93, 255, 0.35);
        }
        .btn-primary:hover {
            filter: brightness(1.12);
            transform: translateY(-1px);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--cor-sucesso), #009A29) !important;
            color: white !important;
            box-shadow: 0 4px 16px rgba(0, 180, 42, 0.35);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--cor-perigo), #D21C1C) !important;
            color: white !important;
            box-shadow: 0 4px 16px rgba(245, 63, 63, 0.35);
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--cor-aviso), #D65E00) !important;
            color: white !important;
            box-shadow: 0 4px 16px rgba(255, 125, 0, 0.35);
        }

        .btn-secondary {
            background-color: var(--cor-input);
            color: var(--cor-texto);
            border: 1px solid var(--cor-borda);
        }

        .btn-blocked {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .valor-card {
            background: linear-gradient(145deg, #1E293B, #1A202C) !important;
            border: 2px solid var(--cor-primaria) !important;
            text-align: center;
            padding: 20px;
        }

        .valor-grande {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(90deg, var(--cor-sucesso), #36CFC9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        .valor-legenda {
            font-size: 14px;
            color: var(--cor-texto-secundario);
            margin-top: 4px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed var(--cor-borda);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--cor-texto-secundario);
            font-size: 15px;
        }

        .info-value {
            font-weight: 600;
            color: var(--cor-texto);
            font-size: 15px;
            text-align: right;
            max-width: 55%;
        }

        .status-container {
            text-align: center;
            padding: 25px 15px;
        }

        .status-icon {
            font-size: 55px;
            margin-bottom: 15px;
            animation: flutuar 2s ease-in-out infinite;
        }

        /* ⭐ DESIGN DAS AVALIAÇÕES */
        .media-container {
            text-align: center;
            padding: 10px;
            margin-bottom: 15px;
        }
        .nota-num {
            font-size: 32px;
            font-weight: 800;
            color: #FFC107;
        }
        .estrelas i {
            color: #FFC107;
            font-size: 18px;
            margin: 0 2px;
        }
        .avaliacao-item {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            border-left: 4px solid var(--cor-primaria);
        }
        .item-topo {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--cor-texto-secundario);
            margin-bottom: 5px;
        }

        @keyframes flutuar {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @keyframes piscar {
            0%,100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .status-buscando { color: var(--cor-aviso); animation: piscar 1.5s infinite; }
        .status-aceito { color: var(--cor-sucesso); }
        .status-cancelado { color: var(--cor-perigo); }

        .status-texto {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .status-subtexto {
            color: var(--cor-texto-secundario);
            font-size: 15px;
        }

        .motorista-info {
            background: rgba(0, 180, 42, 0.1);
            border: 1px solid rgba(0, 180, 42, 0.3);
            border-radius: var(--borda-radius-pq);
            padding: 15px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .motorista-foto {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cor-sucesso), #36CFC9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .motorista-dados {
            flex-grow: 1;
            text-align: left;
        }

        .motorista-nome {
            font-weight: 700;
            font-size: 16px;
        }

        .motorista-carro {
            font-size: 13px;
            color: var(--cor-texto-secundario);
        }

        #mapa {
            width: 100%;
            height: 320px;
            border-radius: var(--borda-radius);
            border: 2px solid var(--cor-borda);
            margin-top: 15px;
            overflow: hidden;
            box-shadow: var(--sombra);
        }

        @media (max-width: 480px) {
            .container { margin: 10px auto; }
            .card { padding: 20px 18px; }
            .valor-grande { font-size: 32px; }
            .status-icon { font-size: 45px; }
        }
    </style>
</head>
<body>

    <div class="header-logo">
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/ODespertardoAmor/RotaBrasil/refs/heads/main/assets/logo.jpg?v=2" alt="Sua Marca">
            <span class="logo-texto">🛣️ ROTA BRASIL</span> 
        </div>
        <div class="sub-header">Painel do Passageiro • Sua viagem, nossa prioridade</div>
    </div>

    <div class="container">

        <!-- 🔑 TELA DE LOGIN / CADASTRO -->
        <div class="card" id="loginCard">
            <h3><i class="fas fa-user-circle"></i> Acesso Passageiro</h3>
            
            <div class="input-group">
                <i class="fas fa-user input-icon"></i>
                <input id="nome" placeholder="Nome Completo (Cadastro)">
            </div>

            <div class="input-group">
                <i class="fas fa-envelope input-icon"></i>
                <input id="email" type="email" placeholder="Seu Melhor E-mail">
            </div>

            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input id="senha" type="password" placeholder="Senha Segura">
            </div>

            <div class="input-group">
                <i class="fas fa-phone input-icon"></i>
                <input id="telefone" placeholder="WhatsApp (com DDD)">
            </div>
            
            <button class="btn-primary" onclick="registerPassageiro()">
                <i class="fas fa-user-plus"></i> Criar Minha Conta
            </button>
            <button class="btn-success" onclick="login()">
                <i class="fas fa-sign-in-alt"></i> Entrar na Conta
            </button>
            
            <p id="loginStatus" style="text-align:center; margin-top:15px; font-weight:500;"></p>
        </div>
        

        <!-- 🖥️ PAINEL PRINCIPAL DO PASSAGEIRO -->
        <div id="dashboard" style="display:none">
            
            <!-- ⭐ CARD DE AVALIAÇÕES CORRIGIDO -->
            <div class="card">
                <h3><i class="fas fa-star"></i> Minha Avaliação</h3>
                <div id="mediaNota" class="media-container">
                    <div class="nota-num">--</div>
                    <div class="estrelas"></div>
                </div>
                <div id="listaAvaliacoes"></div>
            </div>

            <!-- 📍 ENDEREÇOS E BUSCA -->
            <div class="card">
                <h3><i class="fas fa-search-location"></i> Para onde vamos?</h3>
                
                <div class="input-group">
                    <i class="fas fa-map-marker-alt input-icon" style="color: var(--cor-sucesso);"></i>
                    <input id="origem" placeholder="Seu local atual / Origem" oninput="buscarEndereco(this.value, 'origem')" autocomplete="off">
                    <div id="sugestoes_origem" class="suggestions" style="display:none;"></div>
                </div>

                <div class="input-group">
                    <i class="fas fa-map-marker-alt input-icon" style="color: var(--cor-perigo);"></i>
                    <input id="destino" placeholder="Digite seu Destino" oninput="buscarEndereco(this.value, 'destino')" autocomplete="off">
                    <div id="sugestoes_destino" class="suggestions" style="display:none;"></div>
                </div>

                <!-- 🔄 BOTÃO COM SISTEMA ALTERNADO INTELIGENTE -->
                <button class="btn-warning" id="btnLocalizacao" onclick="gerenciarBotaoLocalizacao()">
                    <i class="fas fa-location-arrow"></i> <span id="txtBtnLocalizacao">Usar Minha Localização Atual</span>
                </button>
            </div>

            <!-- 💰 RESUMO E VALOR DA CORRIDA -->
            <div class="card valor-card" id="cardValor" style="display:none;">
                <h3 style="justify-content:center;">💸 Resumo da Viagem</h3>
                
                <div class="info-row">
                    <span class="info-label"><i class="fas fa-route"></i> Distância</span>
                    <span class="info-value" id="txtDistancia">-- km</span>
                </div>

                <div class="info-row">
                    <span class="info-label"><i class="fas fa-clock"></i> Tempo Estimado</span>
                    <span class="info-value" id="txtTempo">-- min</span>
                </div>

                <div style="margin:15px 0;">
                    <div class="valor-grande" id="txtValor">R$ 0,00</div>
                    <div class="valor-legenda">Valor Total • Em Dinheiro/Pix</div>
                </div>

                <button class="btn-success" id="btnChamar" onclick="chamarCorrida()">
                    <i class="fas fa-rocket"></i> 🚀 CHAMAR ROTA BRASIL
                </button>
            </div>

            <!-- 🚗 STATUS DA CORRIDA -->
            <div class="card" id="cardStatus" style="display:none;">
                <div id="conteudoStatus">
                    <!-- Conteúdo dinâmico via JS -->
                </div>
            </div>

            <!-- 🗺️ MAPA DE ACOMPANHAMENTO -->
            <div class="card" id="cardMapa" style="display:none;">
                <h3><i class="fas fa-map-marked-alt"></i> Acompanhamento em Tempo Real</h3>
                <div id="mapa"></div>
            </div>

            <!-- 🚪 BOTÃO SAIR -->
            <div class="card">
                <button class="btn-danger" onclick="logoutPassageiro()">
                    <i class="fas fa-door-open"></i> Sair da Conta
                </button>
            </div>

        </div>
    </div>

    <script>
        const API = "https://rotabrasil-v1cf.onrender.com";
        const socket = io(API, {
            transports: ['websocket', 'polling'],
            upgrade: true,
            reconnection: true,
            reconnectionDelay: 1000,
            reconnectionDelayMax: 5000,
            reconnectionAttempts: Infinity,
            timeout: 20000
        });

        socket.on("connect", () => {
            console.log("✅ Passageiro Conectado ao Sistema!");
        });

        let token = null;
        let passageiro = null;
        let corridaAtual = null;
        let mapa = null;
        let markerMotorista = null;
        let autocompleteService = new google.maps.places.AutocompleteService();
        let distancia = 0;
        let valorFinal = 0;
        
        // Controla se o GPS já foi capturado (0 = Não capturado, 1 = Pronto para chamar)
        let estadoLocalizacao = 0; 

        function falar(texto) {
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = "pt-BR"; msg.rate = 1.15; msg.volume = 1;
            speechSynthesis.speak(msg);
        }

        function tocarSom(tipo='normal') {
            let url = 'https://assets.mixkit.co/sfx/preview/mixkit-software-interface-notification-2576.mp3?v=2';
            if(tipo === 'sucesso') url = 'https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3?v=2';
            if(tipo === 'alerta') url = 'https://assets.mixkit.co/sfx/preview/mixkit-alarm-digital-clock-beep-989.mp3?v=2';
            new Audio(url).play().catch(e=>{});
        }

        /* ========================================================
            🔄 LÓGICA DO BOTÃO ALTERNADO (1º CLIQUE GPS / 2º CLIQUE BUSCA)
        ======================================================== */
        function gerenciarBotaoLocalizacao() {
            if (estadoLocalizacao === 0) {
                usarLocalizacaoAtual();
            } else if (estadoLocalizacao === 1) {
                const destino = document.getElementById('destino').value;
                if(!destino || destino.length < 5) {
                    alert("⚠️ Por favor, digite um Destino antes de buscar o motorista!");
                    falar("Por favor, digite seu destino antes de continuar.");
                    return;
                }
                falar("Entrando e buscando motoristas!");
                chamarCorrida();
            }
        }

        function usarLocalizacaoAtual() {
            if(!navigator.geolocation) { alert("GPS não suportado"); return; }
            falar("Buscando sua localização...");
            
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                document.getElementById('origem').value = `${lat},${lng}`;
                falar("Localização definida!");
                
                // Muda o estado do botão para o segundo clique buscar o motorista
                estadoLocalizacao = 1;
                document.getElementById('btnLocalizacao').className = "btn-success";
                document.getElementById('txtBtnLocalizacao').innerText = "🚗 Entrar Buscando Motorista";
                
                calcularValor();
            }, err => {
                alert("⚠️ Ative a permissão de Localização/GPS!");
            }, {enableHighAccuracy: true});
        }

        /* ========================================================
            ⭐ CARREGAR AVALIAÇÕES (REAL DO BACKEND)
        ======================================================== */
        async function carregarAvaliacoes() {
            if (!passageiro) return;
            try {
                const res = await fetch(`${API}/avaliacoes?usuario_id=${passageiro.id}`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if(!res.ok) return;
                const dados = await res.json();
                
                const divMedia = document.getElementById("mediaNota");
                const divLista = document.getElementById("listaAvaliacoes");
                
                if (dados.avaliacoes && dados.avaliacoes.length > 0) {
                    let soma = 0;
                    divLista.innerHTML = "";
                    
                    dados.avaliacoes.forEach(av => {
                        soma += av.nota;
                        divLista.innerHTML += `
                            <div class="avaliacao-item">
                                <div class="item-topo">
                                    <span>👤 ${av.nome_avaliador || 'Anônimo'}</span>
                                    <span>${'⭐'.repeat(av.nota)}</span>
                                </div>
                                <div style="font-size:14px; color:var(--cor-texto);">${av.comentario || 'Sem comentários.'}</div>
                            </div>
                        `;
                    });
                    
                    let media = (soma / dados.avaliacoes.length).toFixed(1);
                    divMedia.querySelector(".nota-num").innerText = media;
                    
                    let estrelasHtml = "";
                    for(let i=1; i<=5; i++) {
                        estrelasHtml += i <= Math.round(media) ? `<i class="fas fa-star"></i>` : `<i class="far fa-star"></i>`;
                    }
                    divMedia.querySelector(".estrelas").innerHTML = estrelasHtml;
                } else {
                    divMedia.querySelector(".nota-num").innerText = "5.0";
                    divMedia.querySelector(".estrelas").innerHTML = `<i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>`;
                    divLista.innerHTML = `<p style="text-align:center; font-size:14px; color:var(--cor-texto-secundario)">Nenhuma avaliação recebida ainda.</p>`;
                }
            } catch(e) {
                console.log("Erro ao carregar avaliações", e);
            }
        }

        function buscarEndereco(texto, tipo) {
            const divSug = document.getElementById(`sugestoes_${tipo}`);
            if(texto.length < 3) { divSug.style.display = 'none'; return; }

            autocompleteService.getPlacePredictions({ input: texto, language: 'pt-BR', componentRestrictions: {country: 'br'} }, (res, status) => {
                if(status == 'OK' && res) {
                    divSug.innerHTML = '';
                    res.forEach(place => {
                        const item = document.createElement('div');
                        item.className = 'suggestion-item';
                        item.innerHTML = `<i class="fas fa-map-pin"></i> ${place.description}`;
                        item.onclick = () => {
                            document.getElementById(tipo).value = place.description;
                            divSug.style.display = 'none';
                            calcularValor();
                        };
                        divSug.appendChild(item);
                    });
                    divSug.style.display = 'block';
                } else {
                    divSug.style.display = 'none';
                }
            });
        }

        function calcularValor() {
            const origen = document.getElementById('origem').value;
            const destino = document.getElementById('destino').value;

            if(!origen || !destino || origen.length < 5 || destino.length < 5) {
                document.getElementById('cardValor').style.display = 'none';
                return;
            }

            let randomDist = (Math.random() * 12 + 1).toFixed(1); 
            distancia = parseFloat(randomDist);
            let precoBase = 4.50;
            let precoKm = 1.10;
            valorFinal = precoBase + (distancia * precoKm);

            document.getElementById('txtDistancia').innerText = `${distancia} km`;
            document.getElementById('txtTempo').innerText = `${Math.round(distancia * 3.5)} min`;
            document.getElementById('txtValor').innerText = `R$ ${valorFinal.toFixed(2)}`;
            document.getElementById('cardValor').style.display = 'block';
            
            carregarAvaliacoes();
        }

        async function registerPassageiro() {
            try {
                document.getElementById("loginStatus").innerHTML = "⏳ Cadastrando...";
                const res = await fetch(`${API}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        nome: document.getElementById("nome").value,
                        email: document.getElementById("email").value,
                        senha: document.getElementById("senha").value,
                        telefone: document.getElementById("telefone").value,
                        tipo: "passageiro"
                    })
                });
                const data = await res.json();
                if(res.ok) {
                    document.getElementById("loginStatus").innerHTML = "✅ Conta criada! Entrando...";
                    login();
                } else {
                    alert("❌ " + (data.erro || "Erro ao cadastrar"));
                    document.getElementById("loginStatus").innerHTML = "";
                }
            } catch(e) { alert("Erro conexão"); }
        }

        async function login() {
            try {
                const res = await fetch(`${API}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: document.getElementById("email").value,
                        senha: document.getElementById("senha").value
                    })
                });
                const data = await res.json();
                if(res.ok && data.token) {
                    if(data.user.tipo !== "passageiro") {
                        alert("⚠️ Use conta de PASSAGEIRO!"); return;
                    }
                    token = data.token; passageiro = data.user;
                    localStorage.setItem("token_passageiro", token);
                    localStorage.setItem("user_passageiro", JSON.stringify(passageiro));
                    document.getElementById("loginCard").style.display = "none";
                    document.getElementById("dashboard").style.display = "block";
                    falar(`Olá ${passageiro.nome}, pronto para viajar?`);
                    carregarAvaliacoes();
                } else { alert("❌ " + (data.erro || "Dados inválidos")); }
            } catch(e) { alert("Erro conexão"); }
        }

        const tS = localStorage.getItem("token_passageiro");
        const uS = localStorage.getItem("user_passageiro");
        if(tS && uS) {
            token = tS; passageiro = JSON.parse(uS);
            window.onload = () => {
                document.getElementById("loginCard").style.display = "none";
                document.getElementById("dashboard").style.display = "block";
                carregarAvaliacoes();
            };
        }

        function logoutPassageiro() {
            localStorage.removeItem("token_passageiro");
            localStorage.removeItem("user_passageiro");
            window.location.reload();
        }

        async function chamarCorrida() {
            const origem = document.getElementById('origem').value;
            const destino = document.getElementById('destino').value;

            if(!origem || !destino) { alert("⚠️ Preencha Origem e Destino!"); return; }

            const btn = document.getElementById('btnChamar');
            if(btn) {
                btn.disabled = true; btn.classList.add('btn-blocked'); btn.innerHTML = "⏳ PROCURANDO MOTORISTAS...";
            }

            tocarSom('alerta');
            falar("Procurando motoristas próximos, aguarde...");

            try {
                const res = await fetch(`${API}/nova_corrida`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        origem: origem,
                        destino: destino,
                        valor: valorFinal,
                        distancia: `${distancia.toFixed(1)} km`
                    })
                });

                const data = await res.json();
                if(!res.ok) throw data;

                corridaAtual = { id: data.corrida_id, origem, destino, valor: valorFinal };
                mostrarStatusBuscando();

            } catch(err) {
                alert("❌ Erro: " + (err.erro || "Tente novamente"));
                if(btn) {
                    btn.disabled = false; btn.classList.remove('btn-blocked'); btn.innerHTML = "🚀 CHAMAR ROTA BRASIL";
                }
            }
        }

        function mostrarStatusBuscando() {
            document.getElementById('cardValor').style.display = 'none';
            document.getElementById('cardStatus').style.display = 'block';
            document.getElementById('cardMapa').style.display = 'none';

            document.getElementById('conteudoStatus').innerHTML = `
                <div class="status-container">
                    <i class="fas fa-car-side status-icon status-buscando"></i>
                    <div class="status-texto">Procurando Motoristas...</div>
                    <div class="status-subtexto">Aguarde, estamos encontrando o melhor motorista para você 🚗💨</div>
                    <br>
                    <button class="btn-danger" onclick="cancelarCorrida()">❌ Cancelar Viagem</button>
                </div>
            `;
        }
    </script>
</body>
</html>
