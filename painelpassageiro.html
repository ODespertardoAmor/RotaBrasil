<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rota Brasil - Passageiro</title>
    
    <!-- Ícones e Fontes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Socket.io e Google Maps API -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=SUA_CHAVE_API_AQUI&libraries=places"></script>

    <style>
        :root {
            --cor-primaria: #2ecc71;
            --cor-segunda: #27ae60;
            --cor-fundo: #f5f6fa;
            --cor-card: #ffffff;
            --cor-texto: #2c3e50;
            --cor-texto-secundario: #7f8c8d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--cor-card);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 25px;
            box-sizing: border-box;
        }

        h2, h3 {
            text-align: center;
            margin-top: 0;
        }

        .form-group {
            position: relative;
            margin-bottom: 15px;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--cor-texto-secundario);
        }

        input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--cor-primaria);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-success { background-color: var(--cor-primaria); color: white; }
        .btn-success:hover { background-color: var(--cor-segunda); }
        .btn-danger { background-color: #e74c3c; color: white; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-secondary { background-color: #95a5a6; color: white; }
        .btn-blocked { background-color: #bdc3c7; color: #7f8c8d; cursor: not-allowed; }

        /* Sugestões do Autocomplete */
        .suggestions {
            border: 1px solid #ddd;
            border-top: none;
            background: white;
            position: absolute;
            width: 100%;
            z-index: 1000;
            max-height: 200px;
            overflow-y: auto;
            border-radius: 0 0 8px 8px;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .suggestion-item {
            padding: 12px;
            cursor: pointer;
            font-size: 14px;
        }

        .suggestion-item:hover { background-color: #f1f2f6; }

        /* Status Container */
        .status-container {
            text-align: center;
            padding: 20px;
        }

        .status-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .status-buscando {
            color: #f1c40f;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.6; }
        }

        .status-texto { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .status-subtexto { color: var(--cor-texto-secundario); font-size: 14px; }

        /* Card de Avaliações */
        .avaliacoes-container {
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .media-nota {
            text-align: center;
            margin-bottom: 15px;
        }

        .nota-num { font-size: 32px; font-weight: bold; color: #f1c40f; }
        .estrelas { color: #f1c40f; margin-left: 5px; }
        
        .avaliacao-item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .item-topo {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 4px;
        }

        #mapa {
            width: 100%;
            height: 250px;
            border-radius: 8px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- ==========================================
            🔐 TELA DE LOGIN / CADASTRO
        =========================================== -->
        <div class="logo-container" style="max-width: 120px; height: 50px; margin: 0 auto; display: flex; align-items: center; justify-content: center;">
    <img src="https://raw.githubusercontent.com/ODespertardoAmor/RotaBrasil/refs/heads/main/assets/logo.jpg" alt="Sua Marca" style="width: 100%; height: 100%; object-fit: contain;">
    <span class="logo-texto" style="display: none;">🚗 ROTA BRASIL</span> 
</div>
        <div id="loginCard">
            
            <h2>🚗 Seja bem-vindo Passageiro!</h2>
            <div>Este é um app de teste </div>
            <div class="form-group">
                <i class="fas fa-user"></i>
                <input type="text" id="nome" placeholder="Nome Completo (Apenas p/ Cadastro)">
            </div>
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Seu E-mail">
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="senha" placeholder="Sua Senha">
            </div>
            <div class="form-group">
                <i class="fas fa-phone"></i>
                <input type="text" id="telefone" placeholder="Telefone (Apenas p/ Cadastro)">
            </div>
            
            <button class="btn-success" onclick="login()">🔑 Entrar</button>
            <button class="btn-secondary" onclick="registerPassageiro()">📝 Cadastrar Nova Conta</button>
            <div id="loginStatus" style="text-align:center; margin-top:10px; font-weight:bold;"></div>
        </div>

        <!-- ==========================================
            🏠 DASHBOARD PRINCIPAL
        =========================================== -->
        <div id="dashboard" style="display: none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0;">Para onde vamos?</h3>
                <button class="btn-danger" onclick="logoutPassageiro()" style="width:auto; padding:5px 10px; margin:0; font-size:12px;">Sair</button>
            </div>

            <!-- Endereços -->
            <div class="form-group">
                <i class="fas fa-location-dot" style="color:#e74c3c;"></i>
                <input type="text" id="origem" placeholder="Local de Origem (Aguardando GPS...)" oninput="buscarEndereco(this.value, 'origem')">
                <div id="sugestoes_origem" class="suggestions"></div>
            </div>

            <div class="form-group">
                <i class="fas fa-flag-checkered" style="color:#2ecc71;"></i>
                <input type="text" id="destino" placeholder="Digite o endereço de destino..." oninput="buscarEndereco(this.value, 'destino')">
                <div id="sugestoes_destino" class="suggestions"></div>
            </div>

            <!-- Botão Multifunção (GPS / Busca) -->
            <button id="btnLocalizacao" class="btn-secondary" onclick="gerenciarBotaoLocalizacao()">
                <span id="txtBtnLocalizacao">📍 Capturar Minha Localização Atual</span>
            </button>

            <!-- Card de Preço / Detalhes -->
            <div id="cardValor" style="display: none; background:#f9f9f9; padding:15px; border-radius:8px; margin-top:15px; border-left:5px solid var(--cor-primaria);">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>Distância estimada:</span> <strong id="txtDistancia">0.0 km</strong>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>Tempo estimado:</span> <strong id="txtTempo">0 min</strong>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:18px; margin-top:8px; padding-top:8px; border-top:1px dashed #ddd;">
                    <span>Preço da Corrida:</span> <strong id="txtValor" style="color:var(--cor-segunda)">R$ 0,00</strong>
                </div>
                <button id="btnChamar" class="btn-success" style="margin-top:15px;" onclick="gerenciarBotaoLocalizacao()">🚀 CHAMAR ROTA BRASIL</button>
            </div>

            <!-- Card dinâmico de Monitoramento / Buscando / Aceito -->
            <div id="cardStatus" style="display: none; background:#fff; border:1px solid #eee; padding:15px; border-radius:8px; margin-top:15px;">
                <div id="conteudoStatus"></div>
            </div>

            <!-- Área do Google Maps -->
            <div id="cardMapa" style="display: none;">
                <div id="mapa"></div>
            </div>

            <!-- Seção de Avaliações Recebidas -->
            <div class="avaliacoes-container">
                <h4>Minhas Avaliações como Passageiro</h4>
                <div id="mediaNota" class="media-nota">
                    <span class="nota-num">--</span>
                    <span class="estrelas"></span>
                </div>
                <div id="listaAvaliacoes"></div>
            </div>

        </div>

    </div>

    <!-- ==========================================
        ⚙️ LÓGICA JAVASCRIPT ATUALIZADA (FRONT)
    =========================================== -->
    <script>
        const API = "https://rotabrasil-v1cf.onrender.com";
        const socket = io(API, {
            transports: ['websocket', 'polling'],
            upgrade: true,
            reconnection: true,
            reconnectionDelay: 1000,
            reconnectionDelayMax: 5000,
            reconnectionAttempts: Infinity,
            timeout: 20000
        });

        let token = null;
        let passageiro = null;
        let corridaAtual = null;
        let mapa = null;
        let markerMotorista = null;
        let autocompleteService = new google.maps.places.AutocompleteService();
        let distancia = 0;
        let valorFinal = 0;
        let estadoLocalizacao = 0; 

        // Conexão Inicial
        socket.on("connect", () => {
            console.log("✅ Passageiro Conectado ao Sistema!");
        });

        /* ========================================================
            📡 ESCUTA DO SOCKET COM AS CHAVES REAIS DO FLASK
        ======================================================== */
        socket.on("corrida_aceita", (dadosCorrida) => {
            console.log("🚗 Motorista aceitou a corrida!", dadosCorrida);
            
            corridaAtual = { ...corridaAtual, ...dadosCorrida }; 
            
            tocarSom('sucesso');
            falar(`Motorista ${dadosCorrida.motorista_nome || 'parceiro'} aceitou sua corrida e está a caminho!`);
            
            // Dispara a montagem da tela ajustada ao Flask
            mostrarStatusCorridaAceita(dadosCorrida);
        });

        function falar(texto) {
            const msg = new SpeechSynthesisUtterance(texto);
            msg.lang = "pt-BR"; msg.rate = 1.15; msg.volume = 1;
            speechSynthesis.speak(msg);
        }

        function tocarSom(tipo='normal') {
            let url = 'https://assets.mixkit.co/sfx/preview/mixkit-software-interface-notification-2576.mp3?v=2';
            if(tipo === 'sucesso') url = 'https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3?v=2';
            if(tipo === 'alerta') url = 'https://assets.mixkit.co/sfx/preview/mixkit-alarm-digital-clock-beep-989.mp3?v=2';
            new Audio(url).play().catch(e=>{});
        }

        function gerenciarBotaoLocalizacao() {
            if (estadoLocalizacao === 0) {
                usarLocalizacaoAtual();
            } else if (estadoLocalizacao === 1) {
                const destino = document.getElementById('destino').value;
                if(!destino || destino.length < 5) {
                    alert("⚠️ Por favor, digite um Destino antes de buscar o motorista!");
                    falar("Por favor, digite seu destino antes de continuar.");
                    return;
                }
                falar("Entrando e buscando motoristas!");
                chamarCorrida();
            }
        }

        function usarLocalizacaoAtual() {
            if(!navigator.geolocation) { alert("GPS não suportado"); return; }
            falar("Buscando sua localização...");
            
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                document.getElementById('origem').value = `${lat},${lng}`;
                falar("Localização definida!");
                
                estadoLocalizacao = 1;
                document.getElementById('btnLocalizacao').className = "btn-success";
                document.getElementById('txtBtnLocalizacao').innerText = "🚗 Entrar Buscando Motorista";
                
                calcularValor();
            }, err => {
                alert("⚠️ Ative a permissão de Localização/GPS!");
            }, {enableHighAccuracy: true});
        }

        async function carregarAvaliacoes() {
            if (!passageiro) return;
            try {
                const res = await fetch(`${API}/avaliacoes?usuario_id=${passageiro.id}`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if(!res.ok) return;
                const dados = await res.json();
                
                const divMedia = document.getElementById("mediaNota");
                const divLista = document.getElementById("listaAvaliacoes");
                
                if (dados.avaliacoes && dados.avaliacoes.length > 0) {
                    let soma = 0;
                    divLista.innerHTML = "";
                    
                    dados.avaliacoes.forEach(av => {
                        soma += av.nota;
                        divLista.innerHTML += `
                            <div class="avaliacao-item">
                                <div class="item-topo">
                                    <span>👤 ${av.nome_avaliador || 'Anônimo'}</span>
                                    <span>${'⭐'.repeat(av.nota)}</span>
                                </div>
                                <div style="font-size:14px; color:var(--cor-texto);">${av.comentario || 'Sem comentários.'}</div>
                            </div>
                        `;
                    });
                    
                    let media = (soma / dados.avaliacoes.length).toFixed(1);
                    divMedia.querySelector(".nota-num").innerText = media;
                    
                    let estrelasHtml = "";
                    for(let i=1; i<=5; i++) {
                        estrelasHtml += i <= Math.round(media) ? `<i class="fas fa-star"></i>` : `<i class="far fa-star"></i>`;
                    }
                    divMedia.querySelector(".estrelas").innerHTML = estrelasHtml;
                } else {
                    divMedia.querySelector(".nota-num").innerText = "5.0";
                    divMedia.querySelector(".estrelas").innerHTML = `<i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>`;
                    divLista.innerHTML = `<p style="text-align:center; font-size:14px; color:var(--cor-texto-secundario)">Nenhuma avaliação recebida ainda.</p>`;
                }
            } catch(e) { console.log("Erro ao carregar avaliações", e); }
        }

        function buscarEndereco(texto, tipo) {
            const divSug = document.getElementById(`sugestoes_${tipo}`);
            if(texto.length < 3) { divSug.style.display = 'none'; return; }

            autocompleteService.getPlacePredictions({ input: texto, language: 'pt-BR', componentRestrictions: {country: 'br'} }, (res, status) => {
                if(status == 'OK' && res) {
                    divSug.innerHTML = '';
                    res.forEach(place => {
                        const item = document.createElement('div');
                        item.className = 'suggestion-item';
                        item.innerHTML = `<i class="fas fa-map-pin"></i> ${place.description}`;
                        item.onclick = () => {
                            document.getElementById(tipo).value = place.description;
                            divSug.style.display = 'none';
                            calcularValor();
                        };
                        divSug.appendChild(item);
                    });
                    divSug.style.display = 'block';
                } else { divSug.style.display = 'none'; }
            });
        }

        function calcularValor() {
            const origen = document.getElementById('origem').value;
            const destino = document.getElementById('destino').value;

            if(!origen || !destino || origen.length < 5 || destino.length < 5) {
                document.getElementById('cardValor').style.display = 'none';
                return;
            }

            let randomDist = (Math.random() * 12 + 1).toFixed(1); 
            distancia = parseFloat(randomDist);
            let precoBase = 4.50;
            let precoKm = 1.10;
            valorFinal = precoBase + (distancia * precoKm);

            document.getElementById('txtDistancia').innerText = `${distancia} km`;
            document.getElementById('txtTempo').innerText = `${Math.round(distancia * 3.5)} min`;
            document.getElementById('txtValor').innerText = `R$ ${valorFinal.toFixed(2)}`;
            document.getElementById('cardValor').style.display = 'block';
            
            carregarAvaliacoes();
        }

        async function registerPassageiro() {
            try {
                document.getElementById("loginStatus").innerHTML = "⏳ Cadastrando...";
                const res = await fetch(`${API}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        nome: document.getElementById("nome").value,
                        email: document.getElementById("email").value,
                        senha: document.getElementById("senha").value,
                        telefone: document.getElementById("telefone").value,
                        tipo: "passageiro"
                    })
                });
                const data = await res.json();
                if(res.ok) {
                    document.getElementById("loginStatus").innerHTML = "✅ Conta criada! Entrando...";
                    login();
                } else {
                    alert("❌ " + (data.erro || "Erro ao cadastrar"));
                    document.getElementById("loginStatus").innerHTML = "";
                }
            } catch(e) { alert("Erro conexão"); }
        }

        async function login() {
            try {
                const res = await fetch(`${API}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: document.getElementById("email").value,
                        senha: document.getElementById("senha").value
                    })
                });
                const data = await res.json();
                if(res.ok && data.token) {
                    if(data.user.tipo !== "passageiro") {
                        alert("⚠️ Use conta de PASSAGEIRO!"); return;
                    }
                    token = data.token; passageiro = data.user;
                    localStorage.setItem("token_passageiro", token);
                    localStorage.setItem("user_passageiro", JSON.stringify(passageiro));
                    document.getElementById("loginCard").style.display = "none";
                    document.getElementById("dashboard").style.display = "block";
                    falar(`Olá ${passageiro.nome}, pronto para viajar?`);
                    carregarAvaliacoes();
                } else { alert("❌ " + (data.erro || "Dados inválidos")); }
            } catch(e) { alert("Erro conexão"); }
        }

        const tS = localStorage.getItem("token_passageiro");
        const uS = localStorage.getItem("user_passageiro");
        if(tS && uS) {
            token = tS; passageiro = JSON.parse(uS);
            window.onload = () => {
                document.getElementById("loginCard").style.display = "none";
                document.getElementById("dashboard").style.display = "block";
                carregarAvaliacoes();
            };
        }

        function logoutPassageiro() {
            localStorage.removeItem("token_passageiro");
            localStorage.removeItem("user_passageiro");
            window.location.reload();
        }

        async function chamarCorrida() {
            const origen = document.getElementById('origem').value;
            const destino = document.getElementById('destino').value;

            if(!origen || !destino) { alert("⚠️ Preencha Origem e Destino!"); return; }

            const btn = document.getElementById('btnChamar');
            if(btn) {
                btn.disabled = true; btn.classList.add('btn-blocked'); btn.innerHTML = "⏳ PROCURANDO MOTORISTAS...";
            }

            tocarSom('alerta');
            falar("Procurando motoristas próximos, aguarde...");

            try {
                const res = await fetch(`${API}/nova_corrida`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        origem: origen,
                        destino: destino,
                        valor: valorFinal,
                        distancia: `${distancia.toFixed(1)} km`
                    })
                });

                const data = await res.json();
                if(!res.ok) throw data;

                corridaAtual = { id: data.corrida_id, origem: origen, destino, valor: valorFinal };
                mostrarStatusBuscando();

            } catch(err) {
                alert("❌ Erro: " + (err.erro || "Tente novamente"));
                if(btn) {
                    btn.disabled = false; btn.classList.remove('btn-blocked'); btn.innerHTML = "🚀 CHAMAR ROTA BRASIL";
                }
            }
        }

        function mostrarStatusBuscando() {
            document.getElementById('cardValor').style.display = 'none';
            document.getElementById('cardStatus').style.display = 'block';
            document.getElementById('cardMapa').style.display = 'none';

            document.getElementById('conteudoStatus').innerHTML = `
                <div class="status-container">
                    <i class="fas fa-car-side status-icon status-buscando"></i>
                    <div class="status-texto">Procurando Motoristas...</div>
                    <div class="status-subtexto">Aguarde, estamos encontrando o melhor motorista para você 🚗💨</div>
                    <br>
                    <button class="btn-danger" onclick="cancelarCorrida()">❌ Cancelar Viagem</button>
                </div>
            `;
        }

        /* ========================================================
            🖥️ TELA DINÂMICA MAPEADA COM OS DADOS REAIS DO FLASK
        ======================================================== */
        function mostrarStatusCorridaAceita(dados) {
            document.getElementById('cardValor').style.display = 'none';
            document.getElementById('cardStatus').style.display = 'block';
            document.getElementById('cardMapa').style.display = 'none';

            document.getElementById('conteudoStatus').innerHTML = `
                <div style="text-align: center; padding: 10px;">
                    <div style="font-size: 24px; color: var(--cor-segunda); font-weight: bold; margin-bottom: 15px;">
                        <i class="fas fa-check-circle"></i> Motorista a Caminho!
                    </div>
                    
                    <!-- Lendo os dados direto do dicionário Python Flask -->
                    <div style="background: #f8f9fa; border-radius: 10px; padding: 15px; margin-bottom: 15px; text-align: left;">
                        <p style="margin: 5px 0; font-size:15px;"><strong><i class="fas fa-user"></i> Motorista:</strong> ${dados.motorista_nome || 'Confirmado'}</p>
                        <p style="margin: 5px 0; font-size:15px;"><strong><i class="fas fa-car"></i> Veículo:</strong> ${dados.carro || 'Carro Executivo'}</p>
                        <p style="margin: 5px 0; font-size:15px;"><strong><i class="fas fa-id-card"></i> Placa Real:</strong> <span style="background:#2c3e50; color:#fff; padding:3px 8px; border-radius:4px; font-weight:bold; font-family:monospace;">${dados.placa || '---'}</span></p>
                        <p style="margin: 5px 0; font-size:15px;"><strong><i class="fas fa-star" style="color:#f1c40f"></i> Avaliação:</strong> ${dados.nota_motorista || '5.0'}</p>
                    </div>

                    <div class="status-subtexto">Por favor, aguarde no local de origem indicado.</div>
                    <br>
                    <button class="btn-danger" onclick="cancelarCorrida()">❌ Cancelar Viagem</button>
                </div>
            `;
        }

        async function cancelarCorrida() {
            falar("Cancelando sua viagem.");

            if(!corridaAtual || !corridaAtual.id) {
                resetarInterfaceAposCancelamento();
                return;
            }

            try {
                const res = await fetch(`${API}/cancelar_corrida`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({ corrida_id: corridaAtual.id })
                });

                if(res.ok) {
                    alert("🚫 Viagem cancelada com sucesso!");
                } else {
                    console.log("Aviso: Corrida já alterada no servidor.");
                }
            } catch(e) {
                console.error("Erro na rota de cancelamento", e);
            } finally {
                resetarInterfaceAposCancelamento();
            }
        }

        function resetarInterfaceAposCancelamento() {
            corridaAtual = null;
            document.getElementById('cardStatus').style.display = 'none';
            document.getElementById('cardMapa').style.display = 'none';
            
            calcularValor();

            const btn = document.getElementById('btnChamar');
            if(btn) {
                btn.disabled = false;
                btn.classList.remove('btn-blocked');
                btn.innerHTML = `🚀 CHAMAR ROTA BRASIL`;
            }
        }
    </script>
</body>
</html>
