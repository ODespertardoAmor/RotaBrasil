<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Motorista - Rota Brasil</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#111827;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:#1f2937;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

input{
width:100%;
padding:15px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:#111827;
color:white;
outline:none;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
transition:0.2s;
}

button:hover{
transform:scale(1.02);
}

.primary{
background:#2563eb;
color:white;
}

.success{
background:#10b981;
color:white;
}

.danger{
background:#ef4444;
color:white;
}

.warning{
background:#f59e0b;
color:white;
}

.status{
text-align:center;
margin-top:10px;
font-weight:bold;
}

.corrida{
background:#111827;
padding:15px;
border-radius:12px;
margin-top:15px;
border:1px solid #374151;
}

img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
margin-top:10px;
border:3px solid #22c55e;
}

iframe{
width:100%;
height:250px;
border:none;
border-radius:15px;
margin-top:15px;
}

</style>

</head>

<body>

<header>
🚗 Motorista Rota Brasil
</header>

<div class="container">

<!-- LOGIN -->

<div class="card" id="loginCard">

<h2>Login Motorista</h2>

<input id="email" placeholder="Email">

<input id="senha" type="password" placeholder="Senha">

<button class="primary" onclick="login()">
Entrar
</button>

<p id="loginStatus" class="status"></p>

</div>

<!-- DASHBOARD -->

<div
class="card"
id="dashboard"
style="display:none"
>

<h2>Painel do Motorista</h2>

<button
class="success"
onclick="ficarOnline()"
>
Ficar Online
</button>

<button
class="danger"
onclick="ficarOffline()"
>
Ficar Offline
</button>

<p id="status" class="status">
Offline
</p>

<div id="corridasArea">

Nenhuma corrida disponível

</div>

</div>

</div>
  
<script>

const API =
"https://rotabrasil-v1cf.onrender.com";

const socket = io(API);

let user = null;

let corridaAtual = null;
// Variáveis para armazenar dados da corrida
let dadosCorrida = null;

/* SOM */

function tocarSom(){

const audio = new Audio(
"https://www.soundjay.com/buttons/sounds/button-3.mp3"
);

audio.play();

}

/* FALAR */

function falar(texto){

const voz =
new SpeechSynthesisUtterance(
texto
);

voz.lang = "pt-BR";

voz.rate = 1;

speechSynthesis.speak(
voz
);

}

/* LOGIN */

async function login(){

const res = await fetch(

API+"/login",

{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:
document.getElementById(
"email"
).value,

senha:
document.getElementById(
"senha"
).value

})

}

);

const data =
await res.json();

console.log(data);

if(data.token){

localStorage.setItem(
"token",
data.token
);

localStorage.setItem(
"user",
JSON.stringify(data.user)
);

user = data.user;

document.getElementById(
"loginCard"
).style.display = "none";

document.getElementById(
"dashboard"
).style.display = "block";

document.getElementById(
"status"
).innerHTML =
"Logado como "+user.nome;

}else{

document.getElementById(
"loginStatus"
).innerHTML =
"Erro login";

}

}

/* ONLINE */

async function ficarOnline(){

await fetch(

API+"/ficar_online/"+user.id,

{
method:"POST"
}

);

document.getElementById(
"status"
).innerHTML =
"🟢 Online";

navigator.geolocation.watchPosition(

(pos)=>{

fetch(

API+"/atualizar_localizacao",

{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

motorista_id:user.id,

latitude:
pos.coords.latitude,

longitude:
pos.coords.longitude

})

}

);

}

);

}

/* OFFLINE */

async function ficarOffline(){

document.getElementById(
"status"
).innerHTML =
"🔴 Offline";

}

/* NOVA CORRIDA */

socket.on(

"nova_corrida",

(data)=>{

console.log(
"NOVA CORRIDA",
data
);

corridaAtual =
data.corrida_id;
// Guardar dados da corrida
dadosCorrida = data;

/* SOM */

tocarSom();

/* VOZ */

falar(
"Nova corrida recebida"
);

document.getElementById(
"corridasArea"
).innerHTML = `

<div class="corrida">

<h2>
🚗 Nova Corrida
</h2>

<p>
👤 ${data.passageiro_nome}
</p>

<p>
📍 ${data.origem}
</p>

<p>
🏁 ${data.destino}
</p>

<p>
💰 R$ ${data.valor}
</p>

<button
class="primary"
onclick="aceitarCorrida(${data.corrida_id})"
>
Aceitar Corrida
</button>

</div>

`;

}

);

/* ACEITAR */

async function aceitarCorrida(id){

const token =
localStorage.getItem(
"token"
);

const res = await fetch(

API+"/aceitar_corrida/"+id,

{
method:"POST",

headers:{

"Authorization":
"Bearer "+token

}

}

);

const data =
await res.json();

console.log(data);
  /* ENVIAR GPS EM TEMPO REAL */

navigator.geolocation.watchPosition(

(pos)=>{

console.log(
"ENVIANDO GPS"
);

fetch(

API+"/atualizar_localizacao",

{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

motorista_id:user.id,

latitude:
pos.coords.latitude,

longitude:
pos.coords.longitude

})

}

);

},

(err)=>{

console.log(err);

},

{
enableHighAccuracy:true,
maximumAge:0,
timeout:5000
}

);

falar(
"Corrida aceita, vá até o passageiro"
);

document.getElementById(
"corridasArea"
).innerHTML += `

<div class="corrida">

<h2 style="
color:#22c55e;
">
✅ Corrida Aceita
</h2>

<iframe

src="https://maps.google.com/maps?q=-23.55052,-46.633308&z=15&output=embed"

style="
width:100%;
height:250px;
border:none;
border-radius:15px;
margin-top:15px;
"

>

</iframe>

<a

href="google.navigation:q=${encodeURIComponent(data.origem)}"

>

<button class="success">

🛰️ Navegar até Passageiro

</button>

</a>

<!-- NOVO BOTÃO: INICIAR CORRIDA -->
<button
class="warning"
onclick="iniciarCorrida()"
>
🚀 Iniciar Corrida (chegou ao passageiro)
</button>

<button
class="danger"
onclick="cancelarCorrida(${id})"
>
Cancelar Corrida
</button>

</div>

`;

}

// FUNÇÃO: INICIAR CORRIDA
async function iniciarCorrida() {
    falar("Corrida iniciada, seguindo para o destino");
    
    // Atualiza interface e coloca destino no GPS
    document.getElementById("corridasArea").innerHTML += `
    <div class="corrida">
        <h2 style="color:#f59e0b;">🚀 Corrida em Andamento</h2>
        
        <iframe
            src="https://maps.google.com/maps?q=${encodeURIComponent(dadosCorrida.destino)}&z=15&output=embed"
            style="width:100%;height:250px;border:none;border-radius:15px;margin-top:15px;"
        >
        </iframe>

        <a href="google.navigation:q=${encodeURIComponent(dadosCorrida.destino)}">
            <button class="success">🛰️ Navegar até Destino</button>
        </a>

        <!-- NOVO BOTÃO: FINALIZAR CORRIDA -->
        <button class="danger" onclick="finalizarCorrida()">🏁 Finalizar Corrida</button>
    </div>
    `;

    // Aqui você pode adicionar chamada para API para avisar que corrida começou
    await fetch(API+"/iniciar_corrida/"+corridaAtual, { method:"POST" });
}

// FUNÇÃO: FINALIZAR CORRIDA
async function finalizarCorrida() {
    falar("Corrida finalizada, obrigado por usar a Rota Brasil");

    document.getElementById("corridasArea").innerHTML = `
    <div class="corrida">
        <h2 style="color:#22c55e;">🏁 Corrida Finalizada com Sucesso</h2>
        <p>Valor recebido: R$ ${dadosCorrida.valor}</p>
    </div>
    `;

    // Resetar variáveis
    corridaAtual = null;
    dadosCorrida = null;

    // Aqui você pode adicionar chamada para API para avisar que corrida foi finalizada
    await fetch(API+"/finalizar_corrida/"+corridaAtual, { method:"POST" });
}

/* CANCELAR */

async function cancelarCorrida(id){

await fetch(

API+"/cancelar_corrida/"+id,

{
method:"POST"
}

);

document.getElementById(
"corridasArea"
).innerHTML = `

<div class="corrida">

<h2 style="
color:red;
">
❌ Corrida Cancelada
</h2>

</div>

`;

// Resetar variáveis
corridaAtual = null;
dadosCorrida = null;

}

/* SOCKET CANCELAMENTO */

socket.on(

"corrida_cancelada",

(data)=>{

if(data.corrida_id == corridaAtual){

/* SOM */

tocarSom();

/* VOZ */

falar(
"Rota Brasil, corrida cancelada"
);

document.getElementById(
"corridasArea"
).innerHTML = `

<div class="corrida">

<h2 style="
color:red;
">
❌ Passageiro cancelou
</h2>

</div>

`;

// Resetar variáveis
corridaAtual = null;
dadosCorrida = null;

}

}

);

/* GPS */

socket.on(

"localizacao_motorista",

(data)=>{

console.log(
"GPS RECEBIDO",
data
);

document.getElementById(
"mapaMotorista"
).innerHTML = `

<div style="
background:#111827;
padding:20px;
border-radius:15px;
margin-top:15px;
text-align:center;
">

<h2 style="
color:#22c55e;
">
🛰️ Motorista em movimento
</h2>

<br>

<p>
Latitude:
${data.latitude}
</p>

<p>
Longitude:
${data.longitude}
</p>

<iframe

style="
width:100%;
height:250px;
border:none;
border-radius:15px;
margin-top:15px;
"

src="https://maps.google.com/maps?q=${data.latitude},${data.longitude}&z=15&output=embed"

>

</iframe>

</div>

`;

}

);

</script>

</body>
</html>
