<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Motorista - Rota Brasil</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
padding:20px;
background:#111827;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:#1f2937;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

input{
width:100%;
padding:15px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:#111827;
color:white;
outline:none;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
transition:0.2s;
font-size:16px;
}

button:hover{
transform:scale(1.02);
}

.primary{
background:#2563eb;
color:white;
}

.success{
background:#10b981;
color:white;
}

.danger{
background:#ef4444;
color:white;
}

.accept{
background:#22c55e;
color:white;
}

.status{
text-align:center;
margin-top:15px;
font-weight:bold;
}

.corrida{
background:#111827;
padding:15px;
border-radius:15px;
margin-top:15px;
border:1px solid #374151;
}

iframe{
width:100%;
height:300px;
border:none;
border-radius:15px;
margin-top:15px;
}

</style>

</head>

<body>

<header>
🚗 Motorista - Rota Brasil
</header>

<div class="container">

<!-- LOGIN -->

<div
class="card"
id="loginCard">

<h3>
Login motorista
</h3>

<input
id="email"
placeholder="Email">

<input
id="senha"
type="password"
placeholder="Senha">

<button
class="success"
onclick="login()">

Entrar

</button>

<p
id="loginStatus"
class="status"></p>

</div>

<!-- DASHBOARD -->

<div
class="card"
id="dashboard"
style="display:none">

<h3>
Painel motorista
</h3>

<button
class="primary"
onclick="ficarOnline()">

Ficar online

</button>

<button
class="danger"
onclick="cancelarCorridaMotorista()">

Cancelar corrida

</button>

<div id="corridasArea">

Nenhuma corrida no momento

</div>

<div id="mapaArea"></div>

</div>

</div>

<script>

const API =
"https://rotabrasil-v1cf.onrender.com";

const socket =
io(API);

let token = null;

let motorista = null;

let corridaAtual = null;

/* VOZ */

function falarMensagem(texto){

const msg =
new SpeechSynthesisUtterance(texto);

msg.lang = "pt-BR";

speechSynthesis.speak(msg);

}

/* LOGIN */

async function login(){

const res =
await fetch(
API+"/login",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:
document.getElementById(
"email"
).value,

senha:
document.getElementById(
"senha"
).value

})

}

);

const data =
await res.json();

if(data.token){

token =
data.token;

motorista =
data.user;

localStorage.setItem(
"token_motorista",
token
);

localStorage.setItem(
"user_motorista",
JSON.stringify(motorista)
);

document.getElementById(
"loginCard"
).style.display =
"none";

document.getElementById(
"dashboard"
).style.display =
"block";

}else{

alert(
"Erro login"
);

}

}

/* AUTO LOGIN */

const tokenSalvo =
localStorage.getItem(
"token_motorista"
);

const userSalvo =
localStorage.getItem(
"user_motorista"
);

if(
tokenSalvo &&
userSalvo
){

token =
tokenSalvo;

motorista =
JSON.parse(userSalvo);

window.addEventListener(
"load",
()=>{

document.getElementById(
"loginCard"
).style.display =
"none";

document.getElementById(
"dashboard"
).style.display =
"block";

}
);

}

/* ONLINE */

async function ficarOnline(){

await fetch(
API+"/ficar_online/"+motorista.id,
{
method:"POST"
}
);

alert(
"Você está online"
);

}

/* NOVA CORRIDA */

socket.on(

"nova_corrida",

(data)=>{

console.log(
"NOVA CORRIDA",
data
);

/* GUARDA OBJETO */

corridaAtual = data;

/* SOM */

const audio = new Audio(
"https://raw.githubusercontent.com/ODespertardoAmor/RotaBrasil/main/static/sounds/chamada.mp3"
);

audio.play();

/* VOZ */

falarMensagem(
"Nova corrida recebida"
);

document.getElementById(
"corridasArea"
).innerHTML = `

<div class="corrida">

<h3>
🚗 Nova corrida
</h3>

<p>
👤 ${data.passageiro_nome}
</p>

<p>
📍 Origem:
${data.origem}
</p>

<p>
🎯 Destino:
${data.destino}
</p>

<p>
💰 R$ ${data.valor}
</p>

<button
class="accept"
onclick="aceitar(${data.corrida_id})">

Aceitar corrida

</button>

<button
class="primary"
onclick="navegar()">

Navegar até passageiro

</button>

</div>

`;

}
);

/* ACEITAR */

async function aceitar(id){

try{

const res =
await fetch(
API+"/aceitar_corrida/"+id,
{

method:"POST",

headers:{
Authorization:
"Bearer "+token
}

}
);

const data =
await res.json();

console.log(data);

falarMensagem(
"Corrida aceita"
);

/* GPS TEMPO REAL */

navigator.geolocation.watchPosition(

async(pos)=>{

console.log(
"ENVIANDO GPS"
);

await fetch(
API+"/atualizar_localizacao",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

motorista_id:
motorista.id,

latitude:
pos.coords.latitude,

longitude:
pos.coords.longitude

})

}

);

},

(err)=>{

console.log(err);

},

{

enableHighAccuracy:true,
maximumAge:0,
timeout:10000

}

);

}catch(err){

console.log(err);

alert(
"Erro aceitar corrida"
);

}

}

/* NAVEGAR */

function navegar(){

if(!corridaAtual){
return;
}

const partes =
corridaAtual.origem.split(",");

const latitude =
partes[0];

const longitude =
partes[1];

window.open(

`https://www.google.com/maps/dir/?api=1&destination=${latitude},${longitude}&travelmode=driving`

);

}

/* MAPA TEMPO REAL */

socket.on(
"localizacao_motorista",
(data)=>{

if(
!corridaAtual
){
return;
}

if(
data.motorista_id !=
motorista.id
){
return;
}

document.getElementById(
"mapaArea"
).innerHTML = `

<iframe

src="https://maps.google.com/maps?q=${data.latitude},${data.longitude}&z=15&output=embed"

>

</iframe>

`;

}
);

/* CANCELAR MOTORISTA */

async function cancelarCorridaMotorista(){

if(!corridaAtual){

alert(
"Nenhuma corrida ativa"
);

return;

}

try{

await fetch(
API+"/cancelar_corrida/"+corridaAtual.corrida_id,
{
method:"POST"
}
);

document.getElementById(
"corridasArea"
).innerHTML = `

<div class="corrida">

❌ Corrida cancelada

</div>

`;

document.getElementById(
"mapaArea"
).innerHTML = "";

corridaAtual = null;

}catch(err){

console.log(err);

alert(
"Erro cancelar corrida"
);

}

}

/* RECEBER CANCELAMENTO */

socket.on(
"corrida_cancelada",
(data)=>{

console.log(
"CORRIDA CANCELADA",
data
);

if(
!corridaAtual
){
return;
}

if(
data.corrida_id ==
corridaAtual.corrida_id
){

falarMensagem(
"Passageiro cancelou a corrida"
);

const audio = new Audio(
"https://raw.githubusercontent.com/ODespertardoAmor/RotaBrasil/main/static/sounds/chamada.mp3"
);

audio.play();

document.getElementById(
"corridasArea"
).innerHTML = `

<div class="corrida">

<h2 style="
color:#ef4444;
">

❌ Corrida cancelada

</h2>

<p>
O passageiro cancelou.
</p>

</div>

`;

document.getElementById(
"mapaArea"
).innerHTML = "";

corridaAtual = null;

}

}
);

</script>

</body>
</html>
