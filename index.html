<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Teste API</title>
</head>

<body>

  <button onclick="testar()">
    Testar API
  </button>

  <script>

    async function testar(){

      try{

        const response = await fetch(

          "https://rotabrasil-v1cf.onrender.com/criar_banco"
        )

        const data =
        await response.json()

        console.log(data)

        alert(JSON.stringify(data))

      }catch(error){

        console.log(error)

        alert("erro")
      }
    }

  </script>

</body>

</html>
