<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motorista - Rota Brasil</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
padding:20px;
background:#111827;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:#1f2937;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
transition:0.2s;
}

.online{
background:#10b981;
color:white;
}

.offline{
background:#ef4444;
color:white;
}

.accept{
background:#2563eb;
color:white;
}

button:hover{
transform:scale(1.02);
}

.corrida{
background:#111827;
padding:15px;
border-radius:12px;
margin-top:10px;
border:1px solid #374151;
}

.badge{
display:inline-block;
padding:5px 10px;
border-radius:10px;
background:#22c55e;
font-size:12px;
margin-bottom:10px;
}

.status{
text-align:center;
margin-top:10px;
font-weight:bold;
}

/* Estilo para o mapa */
.mapa-ilustrativo {
    width: 100%;
    height: 200px;
    border-radius: 12px;
    margin-top: 10px;
    border: none;
}

</style>

</head>

<body>

<header>
🚗 Motorista Rota Brasil
</header>

<div class="container">

<div class="card">

<div class="badge" id="statusBadge">OFFLINE</div>

<button class="online" onclick="ficarOnline()">
Ficar Online
</button>

<button class="offline" onclick="ficarOffline()">
Ficar Offline
</button>

<p class="status" id="statusText">
Aguardando ação...
</p>

</div>

<div class="card">

<h3>Corridas disponíveis</h3>

<div id="corridasArea">
Nenhuma corrida no momento
</div>

</div>

</div>

<script>

const API = "https://rotabrasil-v1cf.onrender.com";
const socket = io(API);

let user = JSON.parse(localStorage.getItem("user"));

// Função para reproduzir a voz
function falarMensagem(texto) {
    if ('speechSynthesis' in window) {
        const synth = window.speechSynthesis;
        const utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = 'pt-BR'; // Define o idioma para português do Brasil
        utterance.volume = 1; // Volume máximo
        utterance.rate = 1; // Velocidade normal
        utterance.pitch = 1; // Tom normal
        synth.speak(utterance);
    }
}

/* ONLINE */
async function ficarOnline(){

await fetch(API+"/ficar_online/"+user.id,{
method:"POST"
});

document.getElementById("statusBadge").innerText = "ONLINE";
document.getElementById("statusBadge").style.background = "#10b981";

document.getElementById("statusText").innerText =
"Você está recebendo corridas 🚗";
}

/* OFFLINE */
async function ficarOffline(){

document.getElementById("statusBadge").innerText = "OFFLINE";
document.getElementById("statusBadge").style.background = "#ef4444";

document.getElementById("statusText").innerText =
"Você está offline ❌";
}

/* NOVA CORRIDA */
socket.on("nova_corrida",(data)=>{

    // Toca a voz quando chega uma nova corrida
    falarMensagem("Você recebeu uma corrida");

    document.getElementById("corridasArea").innerHTML = `

    <div class="corrida">

    <h3>🚗 Nova corrida</h3>

    <p><b>Passageiro:</b> ${data.passageiro_nome}</p>

    <p><b>Origem:</b> ${data.origem}</p>

    <p><b>Destino:</b> ${data.destino}</p>

    <p><b>Valor:</b> R$ ${data.valor}</p>

    <!-- Mapa ilustrativo -->
    <iframe 
        class="mapa-ilustrativo"
        src="https://www.google.com/maps/embed/v1/directions?key=AIzaSyDyJPPlnIMOLp20Ef1LlTong8rYtTaNJNc&origin=${encodeURIComponent(data.origem)}&destination=${encodeURIComponent(data.destino)}&language=pt-BR"
        allowfullscreen>
    </iframe>

    <button class="accept"
    onclick="aceitar(${data.corrida_id})">
    Aceitar corrida
    </button>

    </div>

    `;

});



/* ACEITAR */
async function aceitar(id){

const token = localStorage.getItem("token");

const res = await fetch(API+"/aceitar_corrida/"+id,{
method:"POST",
headers:{
"Authorization":"Bearer "+token
}
});

const data = await res.json();

document.getElementById("statusText").innerText =
"🚗 Corrida aceita com sucesso!";
}

</script>

</body>
</html>
