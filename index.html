<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Motorista - Rota Brasil</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
padding:20px;
background:#111827;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:#1f2937;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
transition:0.2s;
font-size:16px;
}

button:hover{
transform:scale(1.02);
}

.online{
background:#10b981;
color:white;
}

.offline{
background:#ef4444;
color:white;
}

.accept{
background:#2563eb;
color:white;
}

.route{
background:#f59e0b;
color:white;
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:10px;
background:#ef4444;
font-size:12px;
margin-bottom:10px;
font-weight:bold;
}

.status{
text-align:center;
margin-top:10px;
font-weight:bold;
}

.corrida{
background:#111827;
padding:15px;
border-radius:12px;
margin-top:10px;
border:1px solid #374151;
}

.mapa-ilustrativo{
width:100%;
height:180px;
border-radius:12px;
margin-top:10px;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:18px;
text-align:center;
padding:10px;
box-sizing:border-box;
border:1px solid #374151;
}

.info{
margin-top:10px;
line-height:1.7;
}

.rota-box{
background:#0f172a;
padding:15px;
border-radius:12px;
margin-top:15px;
text-align:center;
border:1px solid #374151;
}

</style>

</head>

<body>

<header>
🚗 Motorista Rota Brasil
</header>

<div class="container">

<div class="card">

<div class="badge" id="statusBadge">
OFFLINE
</div>

<button class="online" onclick="ficarOnline()">
Ficar Online
</button>

<button class="offline" onclick="ficarOffline()">
Ficar Offline
</button>

<p class="status" id="statusText">
Aguardando ação...
</p>

</div>

<div class="card">

<h3>Corridas disponíveis</h3>

<div id="corridasArea">
Nenhuma corrida no momento
</div>

</div>

</div>

<script>

const API =
"https://rotabrasil-v1cf.onrender.com";

const socket = io(API);

let user =
JSON.parse(localStorage.getItem("user"));

let corridaAtual = null;

/* LOGIN */

if(!user){

alert("Faça login primeiro");

}

/* VOZ */

function falarMensagem(texto){

if ('speechSynthesis' in window){

const synth =
window.speechSynthesis;

const utterance =
new SpeechSynthesisUtterance(texto);

utterance.lang = 'pt-BR';

synth.speak(utterance);

}

}

/* ONLINE */

async function ficarOnline(){

try{

await fetch(
API+"/ficar_online/"+user.id,
{
method:"POST"
}
);
async function ficarOnline(){

await fetch(
API+"/ficar_online/"+user.id,
{
method:"POST"
}
);

iniciarGPS();

}
document.getElementById(
"statusBadge"
).innerText = "ONLINE";

document.getElementById(
"statusBadge"
).style.background = "#10b981";

document.getElementById(
"statusText"
).innerText =
"Recebendo corridas 🚗";

}catch(error){

console.log(error);

}

}

/* OFFLINE */

function ficarOffline(){

document.getElementById(
"statusBadge"
).innerText = "OFFLINE";

document.getElementById(
"statusBadge"
).style.background = "#ef4444";

document.getElementById(
"statusText"
).innerText =
"Você está offline ❌";

}

/* CANCELAMENTO */

socket.on(
"corrida_cancelada",
(data)=>{
falarMensagem(
"a corrida foi cancelada pelo passageiro"
);
  
if(
corridaAtual &&
corridaAtual.id == data.corrida_id
){

document.getElementById(
"corridasArea"
).innerHTML = `

<div class="corrida">

<h3 style="color:#ef4444;">
❌ Corrida cancelada
</h3>

<p>
O passageiro cancelou a corrida
</p>

</div>

`;

document.getElementById(
"statusText"
).innerText =
"Corrida cancelada";

corridaAtual = null;

}

}
);

/* NOVA CORRIDA */

socket.on(
"nova_corrida",
(data)=>{

falarMensagem(
"Você recebeu uma nova corrida"
);

corridaAtual = {
id:data.corrida_id,
origem:data.origem,
destino:data.destino
};

document.getElementById(
"corridasArea"
).innerHTML = `

<div class="corrida">

<h3>
🚗 Nova corrida
</h3>

<div class="info">

<p>
<b>Passageiro:</b>
${data.passageiro_nome || "Passageiro"}
</p>

<p>
<b>Origem:</b>
${data.origem}
</p>

<p>
<b>Destino:</b>
${data.destino}
</p>

<p>
<b>Valor:</b>
R$ ${data.valor}
</p>

</div>

<div class="mapa-ilustrativo">

🗺️ Nova rota

<br><br>

${data.origem}

⬇️

${data.destino}

</div>

<button
class="accept"
onclick="aceitar(${data.corrida_id})"
>

Aceitar corrida

</button>

</div>

`;

}
);

/* ACEITAR */

async function aceitar(id){
  iniciarGPS();

try{

const token =
localStorage.getItem("token");

await fetch(

API+"/aceitar_corrida/"+id,

{
method:"POST",

headers:{
"Authorization":
"Bearer "+token
}
}

);

document.getElementById(
"statusText"
).innerText =
"🚗 Indo buscar passageiro";

document.getElementById(
"corridasArea"
).innerHTML = `

<div class="corrida">

<h2 style="
color:#22c55e;
text-align:center;
">
🚗 Corrida Aceita
</h2>

<div class="rota-box">

<h3>
📍 Vá até a origem
</h3>

<p style="
font-size:18px;
margin-top:15px;
">
${corridaAtual.origem}
</p>

</div>

<button
class="route"
onclick="abrirRota()"
>

🗺️ Buscar passageiro.

</button>

</div>

`;

}catch(error){

console.log(error);

}

}

/* ABRIR MAPA */
function abrirRota(){

if(!corridaAtual) return;

/*
Origem atual do motorista
*/
navigator.geolocation.getCurrentPosition(

(position)=>{

const lat =
position.coords.latitude;

const lng =
position.coords.longitude;

/*
Destino = origem da corrida
*/
const destino =
encodeURIComponent(
corridaAtual.origem
);

/*
Abre navegação real
*/
const url =

`https://www.google.com/maps/dir/?api=1&origin=${lat},${lng}&destination=${destino}&travelmode=driving`;

window.open(
url,
"_blank"
);

},

(error)=>{

alert(
"Permita acesso à localização"
);

}

);

}
/* GPS TEMPO REAL */

function iniciarGPS(){

navigator.geolocation.watchPosition(

async(position)=>{

const latitude =
position.coords.latitude;

const longitude =
position.coords.longitude;

await fetch(
API+"/atualizar_localizacao",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

motorista_id:user.id,
latitude,
longitude

})

}
);

},

(error)=>{

console.log(error);

},

{
enableHighAccuracy:true
}

);

}

</script>

</body>
</html>
