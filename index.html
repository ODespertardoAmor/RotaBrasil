<!DOCTYPE html><html>
<head>
<title>Motorista</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body><h2>Motorista</h2><button onclick="online()">Ficar online</button> <button onclick="offline()">Ficar offline</button>

<div id="corridas"></div><script>

const API="https://rotabrasil-v1cf.onrender.com"
const socket=io(API)
const user=JSON.parse(localStorage.getItem("user"))

async function online(){
await fetch(API+"/ficar_online/"+user.id,{method:"POST"})
}

socket.on("nova_corrida",(d)=>{

document.getElementById("corridas").innerHTML=`
<p>${d.origem} → ${d.destino} R$${d.valor}</p>
<button onclick="aceitar(${d.corrida_id})">Aceitar</button>
`
})

async function aceitar(id){

const token=localStorage.getItem("token")

await fetch(API+"/aceitar_corrida/"+id,{
method:"POST",
headers:{"Authorization":"Bearer "+token}
})

alert("aceita")
}

</script></body>
</html>
