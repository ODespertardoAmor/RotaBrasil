<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Motorista - Rota Brasil</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
padding:20px;
background:#111827;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:#1f2937;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
transition:0.2s;
font-size:16px;
}

button:hover{
transform:scale(1.02);
}

.online{
background:#10b981;
color:white;
}

.offline{
background:#ef4444;
color:white;
}

.accept{
background:#2563eb;
color:white;
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:10px;
background:#ef4444;
font-size:12px;
margin-bottom:10px;
font-weight:bold;
}

.status{
text-align:center;
margin-top:10px;
font-weight:bold;
}

.corrida{
background:#111827;
padding:15px;
border-radius:12px;
margin-top:10px;
border:1px solid #374151;
}

.mapa-ilustrativo{
width:100%;
height:180px;
border-radius:12px;
margin-top:10px;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:18px;
text-align:center;
padding:10px;
box-sizing:border-box;
}

.info{
margin-top:10px;
line-height:1.7;
}

</style>

</head>

<body>

<header>
🚗 Motorista Rota Brasil
</header>

<div class="container">

<div class="card">

<div class="badge" id="statusBadge">
OFFLINE
</div>

<button class="online" onclick="ficarOnline()">
Ficar Online
</button>

<button class="offline" onclick="ficarOffline()">
Ficar Offline
</button>

<p class="status" id="statusText">
Aguardando ação...
</p>

</div>

<div class="card">

<h3>Corridas disponíveis</h3>

<div id="corridasArea">
Nenhuma corrida no momento
</div>

</div>

</div>

<script>

const API =
"https://rotabrasil-v1cf.onrender.com";

const socket = io(API);

let user =
JSON.parse(localStorage.getItem("user"));

/* VERIFICAR LOGIN */

if(!user){

alert("Faça login primeiro");

}

/* VOZ */

function falarMensagem(texto){

if ('speechSynthesis' in window){

const synth =
window.speechSynthesis;

const utterance =
new SpeechSynthesisUtterance(texto);

utterance.lang = 'pt-BR';
utterance.volume = 1;
utterance.rate = 1;
utterance.pitch = 1;

synth.speak(utterance);

}

}

/* ONLINE */

async function ficarOnline(){

try{

await fetch(
API+"/ficar_online/"+user.id,
{
method:"POST"
}
);

document.getElementById(
"statusBadge"
).innerText = "ONLINE";

document.getElementById(
"statusBadge"
).style.background = "#10b981";

document.getElementById(
"statusText"
).innerText =
"Você está recebendo corridas 🚗";

}catch(error){

console.log(error);

}

}

/* OFFLINE */

function ficarOffline(){

document.getElementById(
"statusBadge"
).innerText = "OFFLINE";

document.getElementById(
"statusBadge"
).style.background = "#ef4444";

document.getElementById(
"statusText"
).innerText =
"Você está offline ❌";

}

/* CORRIDA CANCELADA */

socket.on(
"corrida_cancelada",
(data)=>{

document.getElementById(
"corridasArea"
).innerHTML = `

<div class="corrida">

<h3 style="color:#ef4444;">
❌ Corrida cancelada
</h3>

<p>
O passageiro cancelou a corrida
</p>

</div>

`;

document.getElementById(
"statusText"
).innerText =
"Corrida cancelada";

}
);

/* NOVA CORRIDA */

socket.on(
"nova_corrida",
(data)=>{

falarMensagem(
"Você recebeu uma nova corrida"
);

document.getElementById(
"corridasArea"
).innerHTML = `

<div class="corrida">

<h3>
🚗 Nova corrida
</h3>

<div class="info">

<p>
<b>Passageiro:</b>
${data.passageiro_nome || "Passageiro"}
</p>

<p>
<b>Origem:</b>
${data.origem}
</p>

<p>
<b>Destino:</b>
${data.destino}
</p>

<p>
<b>Valor:</b>
R$ ${data.valor}
</p>

</div>

<div class="mapa-ilustrativo">

🗺️ Rota da corrida

<br><br>

${data.origem}

⬇️

${data.destino}

</div>

<button
class="accept"
onclick="aceitar(${data.corrida_id})"
>

Aceitar corrida

</button>

</div>

`;

}
);

/* ACEITAR */

async function aceitar(id){

try{

const token =
localStorage.getItem("token");

const response =
await fetch(

API+"/aceitar_corrida/"+id,

{
method:"POST",

headers:{
"Authorization":
"Bearer "+token
}
}

);

const data =
await response.json();

console.log(data);

document.getElementById(
"statusText"
).innerText =
"🚗 Corrida aceita com sucesso";

}catch(error){

console.log(error);

}

}

</script>

</body>
</html>
