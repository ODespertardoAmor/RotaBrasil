<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Teste Register</title>
</head>

<body>

  <button onclick="register()">
    Criar Conta
  </button>

  <script>

    async function register(){

      try{

        const response = await fetch(

          "https://rotabrasil-v1cf.onrender.com/register",

          {

            method:"POST",

            headers:{
              "Content-Type":
              "application/json"
            },

            body: JSON.stringify({

              nome:"Joao",

              email:"joao@gmail.com",

              senha:"123",

              telefone:"99999",

              tipo:"motorista"
            })
          }
        )

        const text =
        await response.text()

        console.log(text)

        alert(text)

      }catch(error){

        console.log(error)

        alert("erro")
      }
    }

  </script>

</body>

</html>
